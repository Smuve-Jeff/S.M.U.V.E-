services:
  - type: web
    name: smuve-v4-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install --legacy-peer-deps
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        value: https://www.smuvejeffpresents.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 22.12.0

  - type: static
    name: S.M.U.V.E-2.0-Frontend
    env: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishPath: Build/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
