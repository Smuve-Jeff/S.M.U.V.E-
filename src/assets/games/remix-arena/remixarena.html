<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remix Arena - Real-Time Collaborative Sequencer</title>
    <style>
        :root {
            --emerald: #10b981;
            --emerald-glow: rgba(16, 185, 129, 0.4);
            --slate: #020617;
            --zinc: #18181b;
        }

        body {
            background: var(--slate);
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 1rem;
            background: linear-gradient(to right, #fff, var(--emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--emerald-glow);
        }

        .sequencer-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            background: var(--zinc);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .node {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .node:hover {
            background: rgba(255,255,255,0.1);
        }

        .node.active {
            background: var(--emerald);
            box-shadow: 0 0 15px var(--emerald-glow);
            border-color: #fff;
        }

        .node.playhead {
            border: 2px solid #fff;
            transform: scale(1.05);
        }

        .node.trigger {
            animation: trigger-pulse 0.2s ease;
        }

        @keyframes trigger-pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(2); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            align-items: center;
        }

        .bpm-display {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--emerald);
            min-width: 120px;
        }

        button {
            background: transparent;
            border: 1px solid var(--emerald);
            color: var(--emerald);
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--emerald);
            color: var(--slate);
        }

        .status {
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .label {
            position: absolute;
            left: -60px;
            font-size: 0.6rem;
            color: #64748b;
        }

        .track {
            position: relative;
            display: contents;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Remix Arena</h1>
        <div class="sequencer-grid" id="grid">
            <!-- Grid generated by JS -->
        </div>

        <div class="controls">
            <div class="bpm-display">128 BPM</div>
            <button onclick="togglePlayback()" id="playBtn">STOP</button>
            <button onclick="clearGrid()">CLEAR</button>
            <button onclick="randomize()">RANDOMIZE</button>
        </div>

        <div class="status" id="status">SYNCED WITH LOBBY: ALPHA-01</div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const rows = 4;
        const cols = 16;
        let isPlaying = true;
        let currentStep = 0;
        let score = 0;
        let health = 100;
        let multiplier = 1.0;

        // Create Grid
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const node = document.createElement('div');
                node.className = 'node';
                node.dataset.row = r;
                node.dataset.col = c;
                node.onclick = () => {
                    node.classList.toggle('active');
                    if (node.classList.contains('active')) {
                        score += 50;
                        multiplier = Math.min(8.0, multiplier + 0.05);
                        sendUpdate('PAD_ACTIVATE');
                    }
                };
                grid.appendChild(node);
            }
        }

        function togglePlayback() {
            isPlaying = !isPlaying;
            document.getElementById('playBtn').innerText = isPlaying ? 'STOP' : 'START';
        }

        function clearGrid() {
            document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
        }

        function randomize() {
            document.querySelectorAll('.node').forEach(n => {
                if (Math.random() > 0.8) n.classList.add('active');
            });
        }

        function step() {
            if (!isPlaying) return;

            const nodes = document.querySelectorAll('.node');
            nodes.forEach(n => n.classList.remove('playhead'));

            const colNodes = document.querySelectorAll(`.node[data-col="${currentStep}"]`);
            colNodes.forEach(n => {
                n.classList.add('playhead');
                if (n.classList.contains('active')) {
                    n.classList.add('trigger');
                    score += Math.floor(10 * multiplier);
                    setTimeout(() => n.classList.remove('trigger'), 200);
                }
            });

            currentStep = (currentStep + 1) % cols;

            // Health slowly drains if no activity
            health = Math.max(10, health - 0.1);

            if (currentStep === 0) {
                sendUpdate('LOOP_COMPLETE');
            }
        }

        setInterval(step, 125); // 120 BPM approx

        function sendUpdate(event) {
            window.parent.postMessage({
                type: 'GAME_UPDATE',
                data: {
                    score: Math.floor(score),
                    multiplier: parseFloat(multiplier.toFixed(2)),
                    health: Math.floor(health),
                    event: event,
                    step: currentStep
                }
            }, '*');
        }

        // Listen for parent messages (e.g. AI interventions)
        window.addEventListener('message', (event) => {
            if (event.data.type === 'AI_INTERVENTION') {
                document.getElementById('status').innerText = 'S.M.U.V.E 4.0 INTERVENTION: ' + event.data.payload;
                multiplier += 0.5;
            }
        });
    </script>
</body>
</html>
