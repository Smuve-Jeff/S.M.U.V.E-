<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #020617; color: #10b981; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .sequencer { display: grid; grid-template-columns: repeat(8, 40px); gap: 10px; border: 1px solid #10b98133; padding: 20px; background: #000; border-radius: 10px; }
        .node { width: 40px; height: 40px; border: 1px solid #10b98155; }
        .node.active { background: #10b981; box-shadow: 0 0 15px #10b981; }
        .node.pulse { animation: pulse 0.5s; }
        @keyframes pulse { 0% { background: #fff; } 100% { background: #10b981; } }
        h1 { margin-bottom: 30px; font-style: italic; }
    </style>
</head>
<body>
    <h1>REMIX ARENA PvP</h1>
    <div class="sequencer" id="grid"></div>
    <p style="margin-top: 20px;">SYNCED WITH OPPONENT: DJ_ZENITH</p>
    <script>
        const grid = document.getElementById('grid');
        for(let i=0; i<32; i++) {
            const n = document.createElement('div');
            n.className = 'node';
            if(Math.random() > 0.7) n.classList.add('active');
            grid.appendChild(n);
        }
        let playhead = 0;
        setInterval(() => {
            const nodes = document.querySelectorAll('.node');
            nodes.forEach(n => n.classList.remove('pulse'));
            for(let i=0; i<4; i++) {
                const idx = (playhead % 8) + (i * 8);
                nodes[idx].classList.add('pulse');
            }
            playhead++;
        }, 250);
    </script>
</body>
</html>
