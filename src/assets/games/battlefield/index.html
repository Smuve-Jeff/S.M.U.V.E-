<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #10b981; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .arena { border: 2px solid #10b981; width: 80%; height: 60%; position: relative; display: flex; align-items: flex-end; justify-content: space-around; padding-bottom: 20px; box-shadow: 0 0 50px rgba(16,185,129,0.2); }
        .player { width: 50px; height: 100px; background: #10b981; position: relative; }
        .player.opponent { background: #f43f5e; }
        .mic { width: 10px; height: 30px; background: #fff; margin: -40px auto 0; }
        .lyric-bubble { position: absolute; top: -50px; background: #fff; color: #000; padding: 5px 10px; border-radius: 10px; font-weight: bold; white-space: nowrap; font-size: 12px; }
        .crowd { position: absolute; bottom: 0; width: 100%; height: 40px; background: repeating-linear-gradient(90deg, #111 0px, #111 10px, #000 10px, #000 20px); }
        h1 { text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Tha Battlefield PvP</h1>
    <div class="arena">
        <div class="player">
            <div class="lyric-bubble">SPITTING FIRE...</div>
            <div class="mic"></div>
        </div>
        <div class="player opponent">
            <div class="lyric-bubble">NO CHANCE...</div>
            <div class="mic"></div>
        </div>
        <div class="crowd"></div>
    </div>
    <p>WAITING FOR PLAYER INPUT...</p>
    <script>
        setInterval(() => {
            const bubbles = document.querySelectorAll('.lyric-bubble');
            const lines = ["STRATEGIC DOMINANCE", "VIRTUAL ENHANCER", "SYSTEM OVERLOAD", "BEAT DROP", "MIC CHECK 1-2"];
            bubbles.forEach(b => {
                b.innerText = lines[Math.floor(Math.random() * lines.length)];
            });
        }, 3000);
    </script>
</body>
</html>
