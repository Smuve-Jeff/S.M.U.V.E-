<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cipher Surge</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #030712;
        --panel: rgba(17, 24, 39, 0.92);
        --accent: #8b5cf6;
        --accent-soft: rgba(139, 92, 246, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: white;
        background:
          radial-gradient(
            circle at top,
            rgba(139, 92, 246, 0.18),
            transparent 34%
          ),
          linear-gradient(180deg, #030712, #111827);
        font-family: Inter, system-ui, sans-serif;
      }

      .shell {
        width: min(92vw, 900px);
        padding: 24px;
        border-radius: 28px;
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      }

      .header,
      .controls {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        flex-wrap: wrap;
        align-items: center;
      }

      h1 {
        margin: 6px 0 0;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      .eyebrow,
      .status {
        color: rgba(255, 255, 255, 0.72);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.82rem;
      }

      .stats {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .stat {
        min-width: 118px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
      }

      .stat label {
        display: block;
        color: rgba(255, 255, 255, 0.48);
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .stat strong {
        display: block;
        margin-top: 6px;
        font-size: 1.28rem;
      }

      .pads {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin: 28px 0;
      }

      .pad {
        aspect-ratio: 1.15;
        border-radius: 26px;
        border: 0;
        cursor: pointer;
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: white;
        opacity: 0.88;
        transition:
          transform 150ms ease,
          box-shadow 150ms ease,
          opacity 150ms ease;
      }

      .pad.active {
        transform: scale(1.03);
        opacity: 1;
        box-shadow: 0 0 32px currentColor;
      }

      .pad:nth-child(1) {
        background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      }
      .pad:nth-child(2) {
        background: linear-gradient(135deg, #ec4899, #be185d);
      }
      .pad:nth-child(3) {
        background: linear-gradient(135deg, #22c55e, #15803d);
      }
      .pad:nth-child(4) {
        background: linear-gradient(135deg, #38bdf8, #2563eb);
      }

      button.primary {
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        cursor: pointer;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        background: linear-gradient(135deg, #c084fc, #8b5cf6);
        color: #030712;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="header">
        <div>
          <div class="eyebrow">Offline AI Puzzle</div>
          <h1>Cipher Surge</h1>
        </div>
        <div class="stats">
          <div class="stat">
            <label>Round</label><strong id="round">1</strong>
          </div>
          <div class="stat">
            <label>Score</label><strong id="score">0</strong>
          </div>
          <div class="stat">
            <label>Integrity</label><strong id="health">100%</strong>
          </div>
        </div>
      </div>

      <div class="pads">
        <button class="pad" data-pad="0">Pulse</button>
        <button class="pad" data-pad="1">Vocal</button>
        <button class="pad" data-pad="2">Bass</button>
        <button class="pad" data-pad="3">Lead</button>
      </div>

      <div class="controls">
        <div class="status" id="status">
          Watch the sequence, then play it back perfectly.
        </div>
        <button class="primary" id="startBtn">Start Cipher</button>
      </div>
    </div>

    <script>
      const pads = Array.from(document.querySelectorAll('.pad'));
      const roundEl = document.getElementById('round');
      const scoreEl = document.getElementById('score');
      const healthEl = document.getElementById('health');
      const statusEl = document.getElementById('status');
      const startBtn = document.getElementById('startBtn');

      let sequence = [];
      let input = [];
      let round = 1;
      let score = 0;
      let health = 100;
      let acceptingInput = false;

      function report(lastAction, gameOver = false) {
        roundEl.textContent = String(round);
        scoreEl.textContent = String(score);
        healthEl.textContent = `${health}%`;
        window.parent.postMessage(
          {
            type: gameOver ? 'GAME_OVER' : 'GAME_UPDATE',
            data: {
              score,
              combo: round - 1,
              health,
              lastAction,
            },
          },
          '*'
        );
      }

      function flash(index) {
        return new Promise((resolve) => {
          const pad = pads[index];
          pad.classList.add('active');
          setTimeout(() => {
            pad.classList.remove('active');
            setTimeout(resolve, 120);
          }, 360);
        });
      }

      async function showSequence() {
        acceptingInput = false;
        statusEl.textContent = 'AI pattern incoming...';
        for (const index of sequence) {
          await flash(index);
        }
        input = [];
        acceptingInput = true;
        statusEl.textContent = 'Replay the pattern.';
      }

      function nextRound() {
        sequence.push(Math.floor(Math.random() * pads.length));
        showSequence();
      }

      function reset() {
        sequence = [];
        input = [];
        round = 1;
        score = 0;
        health = 100;
        acceptingInput = false;
        statusEl.textContent =
          'Watch the sequence, then play it back perfectly.';
        report('RESET');
      }

      function fail() {
        health = Math.max(0, health - 35);
        acceptingInput = false;
        statusEl.textContent =
          health > 0
            ? 'Breach detected. Rebuild the cipher.'
            : 'System lockout. Restart to try again.';
        report('MISS', health <= 0);
        if (health > 0) {
          input = [];
          setTimeout(showSequence, 700);
        }
      }

      pads.forEach((pad, index) => {
        pad.addEventListener('click', async () => {
          if (!acceptingInput) return;
          await flash(index);
          input.push(index);
          if (sequence[input.length - 1] !== index) {
            fail();
            return;
          }
          if (input.length === sequence.length) {
            score += 150 * round;
            round += 1;
            report('ROUND_CLEAR');
            statusEl.textContent =
              'Cipher cleared. Stand by for the next layer.';
            setTimeout(nextRound, 650);
          }
        });
      });

      startBtn.addEventListener('click', () => {
        reset();
        nextRound();
      });

      window.parent.postMessage({ type: 'GAME_READY' }, '*');
      reset();
    </script>
  </body>
</html>
