<div class="fixed bottom-6 right-6 z-50">
  <!-- Floating Action Button to open the Advisor -->
  <button
    *ngIf="!isOpen()"
    (click)="toggleOpen()"
    class="w-16 h-16 rounded-full bg-brand-primary text-white flex items-center justify-center shadow-lg hover:bg-brand-primary-dark transition-transform transform hover:scale-105 animate-in fade-in zoom-in-50"
    aria-label="Open S.M.U.V.E. Advisor"
  >
    <span class="material-symbols-outlined text-3xl">assistant</span>
  </button>

  <!-- Main Advisor Panel -->
  <div
    *ngIf="isOpen()"
    class="w-96 rounded-2xl glass-v42 border border-border shadow-2xl flex flex-col animate-in fade-in slide-in-from-bottom-5 duration-300"
  >
    <!-- Header -->
    <div class="p-4 border-b border-border flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-brand-primary">assistant</span>
        <h3 class="text-sm font-bold uppercase tracking-widest text-text-main">
          S.M.U.V.E. Advisor
        </h3>
      </div>
      <div class="flex items-center gap-2">
         <button
          (click)="refreshAdvice()"
          class="w-8 h-8 rounded-full hover:bg-background-alt flex items-center justify-center text-text-dim transition-colors"
          aria-label="Refresh advice"
        >
          <span class="material-symbols-outlined text-xl">refresh</span>
        </button>
        <button
          (click)="toggleOpen()"
          class="w-8 h-8 rounded-full hover:bg-background-alt flex items-center justify-center text-text-dim transition-colors"
          aria-label="Close advisor"
        >
          <span class="material-symbols-outlined text-xl">close</span>
        </button>
      </div>
    </div>

    <!-- Advice List -->
    <div class="p-2 max-h-96 overflow-y-auto space-y-2">
      <ng-container *ngIf="advice().length > 0; else noAdvice">
        <div
          *ngFor="let item of advice(); trackBy: trackById"
          (click)="executeAction(item)"
          class="w-full text-left p-4 rounded-lg cursor-pointer transition-all border hover:border-brand-primary/50 hover:bg-brand-primary/10"
          [ngClass]="getPriorityColor(item.priority)"
        >
          <div class="flex items-start justify-between gap-2">
            <p class="text-sm font-semibold pr-2">{{ item.title }}</p>
            <button 
              (click)="$event.stopPropagation(); dismissAdvice(item)"
              class="w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center hover:bg-white/10 transition-colors"
              aria-label="Dismiss advice"
            >
              <span class="material-symbols-outlined text-base">close</span>
            </button>
          </div>
          <p class="text-xs opacity-80 mt-1">{{ item.description }}</p>
        </div>
      </ng-container>

      <!-- No Advice Template -->
      <ng-template #noAdvice>
        <div class="p-8 text-center">
          <p class="text-sm text-text-dim">No active advice.</p>
          <p class="text-xs text-text-dim/70 mt-1">Your workspace is looking clear!</p>
        </div>
      </ng-template>
    </div>
  </div>
</div>
