<div class="fixed bottom-24 right-6 z-[9999] flex flex-col items-end pointer-events-none">
  <!-- Advice Popover -->
  <div *ngIf="isOpen()"
       class="mb-4 w-80 max-h-[500px] overflow-y-auto bg-brand-surface/95 backdrop-blur-xl border border-brand-surface-light rounded-2xl shadow-2xl pointer-events-auto transition-all duration-300 animate-in slide-in-from-bottom-4">
    <div class="p-4 border-b border-white/10 flex justify-between items-center bg-brand-brand-primary/10">
      <div class="flex items-center gap-2">
        <i class="fas fa-robot text-brand-primary"></i>
        <h3 class="font-bold text-xs uppercase tracking-widest text-brand-primary">S.M.U.V.E 4.2 Advisor</h3>
      </div>
      <button (click)="toggleOpen()" class="text-slate-500 hover:text-white transition-colors">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="p-4 space-y-4">
      <div *ngIf="advice().length === 0" class="text-center py-8">
        <p class="text-slate-500 text-sm">Analyzing current environment...</p>
      </div>

      <div *ngFor="let item of advice()"
           class="p-3 bg-white/5 border rounded-xl space-y-2 transition-all hover:bg-white/10"
           [ngClass]="getPriorityClass(item.priority)">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <i class="fas" [ngClass]="getIcon(item.type)"></i>
            <span class="text-[10px] font-bold uppercase tracking-tighter">{{ item.type }}</span>
          </div>
          <div *ngIf="item.priority === 'high'" class="flex gap-1">
            <div class="w-1 h-1 rounded-full bg-emerald-400 animate-pulse-subtle"></div>
            <div class="w-1 h-1 rounded-full bg-emerald-400 animate-pulse-subtle delay-75"></div>
          </div>
        </div>

        <h4 class="text-sm font-bold text-slate-100">{{ item.title }}</h4>
        <p class="text-xs text-slate-400 leading-relaxed">{{ item.content }}</p>

        <button *ngIf="item.actionLabel"
                (click)="handleAction(item)"
                class="w-full mt-2 py-2 px-3 bg-brand-brand-primary/20 border border-brand-brand-primary/30 rounded-xl text-brand-primary text-[10px] font-bold uppercase tracking-widest hover:bg-brand-primary hover:text-white transition-all">
          {{ item.actionLabel }}
        </button>
      </div>
    </div>
  </div>

  <!-- Trigger Button -->
  <button (click)="toggleOpen()"
          class="pointer-events-auto smuve-advisor-trigger group relative flex items-center justify-center w-14 h-14 bg-brand-primary rounded-full shadow-[0_0_20px_rgba(16,185,129,0.4)] hover:scale-110 active:scale-95 transition-all duration-300">
    <div class="absolute inset-0 rounded-full bg-brand-primary animate-ping opacity-20"></div>
    <i class="fas fa-robot text-brand-surface text-xl group-hover:rotate-12 transition-transform"></i>

    <!-- Notification Badge -->
    <div *ngIf="advice().length > 0"
         class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 border-2 border-brand-surface rounded-full flex items-center justify-center text-[10px] font-bold text-white">
      {{ advice().length }}
    </div>
  </button>
</div>
