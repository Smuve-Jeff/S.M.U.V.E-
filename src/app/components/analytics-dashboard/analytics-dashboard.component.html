<div class="analytics-container">
  <header class="analytics-header">
    <h1 class="title">DATA PULSE</h1>
    <div class="time-range">LAST 30 DAYS</div>
  </header>

  <div class="stats-grid">
    <div class="stat-card streams">
      <div class="label">TOTAL STREAMS</div>
      <div class="value">{{ analytics.totalStreams() }}</div>
      <div class="trend positive">+12.4%</div>
    </div>
    <div class="stat-card revenue">
      <div class="label">EST. REVENUE</div>
      <div class="value">$4,120</div>
      <div class="trend positive">+8.2%</div>
    </div>
    <div class="stat-card listeners">
      <div class="label">MONTHLY LISTENERS</div>
      <div class="value">12.5K</div>
      <div class="trend negative">-2.1%</div>
    </div>
  </div>

  <div class="main-grid">
    <section class="superfans-section">
      <h2 class="section-title">TOP SUPERFANS</h2>
      <div class="superfan-list">
        <div *ngFor="let fan of superfans()" class="fan-item">
          <div class="fan-info">
            <div class="fan-name">{{ fan.name }}</div>
            <div class="fan-meta">{{ fan.location }}</div>
          </div>
          <div class="fan-streams">{{ fan.streams }} STREAMS</div>
        </div>
      </div>
    </section>

    <section class="insights-section">
      <h2 class="section-title">SMART TACTICS</h2>
      <div class="tactic-cards">
        <div *ngFor="let tactic of engagementTactics" class="tactic-card">
          <i class="fas fa-lightbulb"></i>
          <p>{{ tactic }}</p>
        </div>
      </div>
      <button class="action-button" routerLink="/strategy">EXECUTE STRATEGY</button>
    </section>
  </div>
</div>
