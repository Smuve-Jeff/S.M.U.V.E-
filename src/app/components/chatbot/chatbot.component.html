<div class="chat-header flex items-center gap-4">
  <div class="relative">
    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-700 p-[1px]">
      <div class="w-full h-full rounded-xl bg-slate-950 flex items-center justify-center overflow-hidden">
        <i class="fas fa-robot text-emerald-500 text-xl"></i>
      </div>
    </div>
    <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-500 border-4 border-slate-950 rounded-full"></div>
  </div>
  <div>
    <h2 class="text-sm font-black text-white uppercase tracking-widest m-0">S.M.U.V.E Assistant</h2>
    <span class="text-[10px] text-emerald-500 font-bold uppercase tracking-tighter">Strategic Intelligence Active</span>
  </div>
</div>

<div class="chat-history scrollbar-hide">
  <div
    *ngFor="let message of messages()"
    class="message wow animate__animated animate__fadeInUp animate__faster"
    [ngClass]="{
      'user-message': message.role === 'user',
      'bot-message': message.role !== 'user'
    }"
  >
    <div class="text-[10px] uppercase font-black opacity-40 mb-1" *ngIf="message.role !== 'user'">S.M.U.V.E</div>
    <div class="text-[10px] uppercase font-black opacity-60 mb-1 text-right" *ngIf="message.role === 'user'">You</div>
    {{ message.content }}
  </div>
</div>

<div class="chat-input-container">
  <div class="input-wrapper">
    <input
      [(ngModel)]="userMessage"
      (keyup.enter)="sendMessage()"
      placeholder="Ask S.M.U.V.E anything..."
      aria-label="Chat message input"
    />
    <button class="send-btn" (click)="sendMessage()" aria-label="Send message">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>
  <div class="mt-3 flex justify-between items-center px-1">
    <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Neural Link 1.5 Flash</span>
    <div class="flex gap-2">
      <i class="fas fa-bolt text-[10px] text-emerald-500 opacity-50"></i>
      <i class="fas fa-shield-alt text-[10px] text-emerald-500 opacity-50"></i>
    </div>
  </div>
</div>
