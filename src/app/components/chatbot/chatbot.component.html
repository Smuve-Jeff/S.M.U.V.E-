<div class="h-full flex flex-col bg-brand-dark overflow-hidden">
  <div class="p-6 border-b border-white/10 flex items-center justify-between bg-brand-surface/40">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 rounded-xl bg-brand-primary/10 border border-brand-primary/20 flex items-center justify-center text-brand-primary">
        <i class="fas fa-microchip animate-pulse-subtle"></i>
      </div>
      <div>
        <h3 class="text-sm font-bold text-white uppercase tracking-widest">S.M.U.V.E 4.0 AI</h3>
        <span class="text-[9px] font-black text-brand-primary uppercase tracking-[0.2em]">Omniscient Mode</span>
      </div>
    </div>
    <button (click)="onClose()" class="w-8 h-8 rounded-xl hover:bg-white/5 text-silver-dim hover:text-white transition-all">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="flex-grow p-6 overflow-y-auto space-y-6 custom-scrollbar" #scrollContainer>
    @for (message of messages(); track message.content) {
      <div class="flex flex-col" [class.items-end]="message.role === 'user'">
        <div class="text-[8px] font-black text-silver-dim uppercase tracking-widest mb-2 px-1">
          {{ message.role === 'model' ? '[SYSTEM_DECREE]' : '[SUBJECT_INPUT]' }}
        </div>
        <div class="max-w-[85%] p-4 rounded-2xl text-xs leading-relaxed"
             [class.bg-brand-surface]="message.role === 'model'"
             [class.text-silver-bright]="message.role === 'model'"
             [class.border]="message.role === 'model'"
             [class.border-white/10]="message.role === 'model'"
             [class.bg-brand-primary]="message.role === 'user'"
             [class.text-black]="message.role === 'user'"
             [class.font-bold]="message.role === 'user'">
          {{ message.content }}
        </div>
      </div>
    }

    @if (isLoading()) {
      <div class="flex items-center gap-3 text-[9px] font-black text-brand-primary uppercase tracking-widest animate-pulse-subtle">
         <i class="fas fa-spinner fa-spin"></i> Analyzing Vectors...
      </div>
    }
  </div>

  <div class="p-6 bg-brand-surface/20 border-t border-white/10">
    <div class="relative group">
       <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()"
              placeholder="Command S.M.U.V.E..."
              class="w-full bg-black/40 border border-white/10 rounded-2xl pl-4 pr-12 py-4 text-xs focus:border-brand-primary outline-none transition-all placeholder:text-silver-dim">
       <button (click)="sendMessage()" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-xl bg-brand-primary text-black flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
          <i class="fas fa-terminal text-sm"></i>
       </button>
    </div>
    <div class="mt-4 flex justify-between items-center opacity-40">
       <div class="flex gap-4 text-[7px] font-black text-brand-primary uppercase tracking-widest">
          <span>Latency: 1.2ms</span>
          <span>Integrity: 100%</span>
       </div>
       <div class="flex gap-2 text-brand-primary">
          <i class="fas fa-wifi text-[8px]"></i>
          <i class="fas fa-fingerprint text-[8px]"></i>
       </div>
    </div>
  </div>
</div>
