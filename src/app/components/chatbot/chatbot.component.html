<div class="chatbot-container h-full flex flex-col glass-card border-none selection:bg-primary/20 animate-enter no-scrollbar overflow-hidden">
  <header class="h-20 shrink-0 border-b border-white/5 px-8 flex items-center justify-between bg-black/40">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 rounded-2xl bg-primary/10 border border-primary/20 flex items-center justify-center text-primary group">
        <span class="material-symbols-outlined text-2xl group-hover:scale-125 transition-transform duration-500">neurology</span>
      </div>
      <div class="flex flex-col">
        <h3 class="text-sm font-black text-white uppercase italic tracking-tighter">Strategic<span class="text-primary">Commander</span></h3>
        <span class="text-[8px] font-black text-primary uppercase tracking-[0.4em]">S.M.U.V.E v4.0</span>
      </div>
    </div>
    <div class="flex items-center gap-3">
       <button (click)="toggleKbWriteAccess()" class="p-2 rounded-xl transition-all" [class.text-primary]="profile().settings.ai.kbWriteAccess" [class.text-slate-600]="!profile().settings.ai.kbWriteAccess" [title]="profile().settings.ai.kbWriteAccess ? 'Neural Vault: Write Access Granted' : 'Neural Vault: Read Only'">
          <span class="material-symbols-outlined text-lg">{{ profile().settings.ai.kbWriteAccess ? 'lock_open' : 'lock' }}</span>
       </button>
       <button (click)="close.emit()" class="w-8 h-8 rounded-xl hover:bg-white/5 text-slate-500 hover:text-white transition-all flex items-center justify-center">
          <span class="material-symbols-outlined">close</span>
       </button>
    </div>
  </header>

  <div class="messages-viewport flex-grow overflow-y-auto no-scrollbar p-8 space-y-6" #messageViewport>
    <div *ngFor="let msg of messages()" class="flex flex-col gap-2" [class.items-end]="msg.role === 'user'">
      <div class="flex items-center gap-2 mb-1" *ngIf="msg.role === 'assistant'">
         <div class="size-1.5 rounded-full bg-primary animate-pulse"></div>
         <span class="text-[8px] font-black text-slate-600 uppercase tracking-widest">Commander_Uplink</span>
      </div>
      <div class="max-w-[85%] p-5 rounded-3xl text-xs font-medium leading-relaxed transition-all shadow-lg"
           [class.bg-black/60]="msg.role === 'assistant'"
           [class.text-slate-300]="msg.role === 'assistant'"
           [class.border]="msg.role === 'assistant'"
           [class.border-white/5]="msg.role === 'assistant'"
           [class.bg-primary]="msg.role === 'user'"
           [class.text-white]="msg.role === 'user'"
           [class.font-black]="msg.role === 'user'">
        {{ msg.text }}
      </div>
      <span class="text-[7px] font-black text-slate-700 uppercase tracking-widest px-2">{{ msg.timestamp | date:'HH:mm:ss' }}_UTC</span>
    </div>
    <div *ngIf="isTyping()" class="flex items-center gap-3 p-4 bg-black/40 rounded-2xl w-max animate-pulse">
       <div class="flex gap-1">
          <div class="size-1 bg-primary rounded-full"></div>
          <div class="size-1 bg-primary rounded-full"></div>
          <div class="size-1 bg-primary rounded-full"></div>
       </div>
       <span class="text-[8px] font-black text-primary uppercase tracking-widest">Neural Processing...</span>
    </div>
  </div>

  <footer class="p-8 border-t border-white/5 bg-black/40">
    <div class="relative flex items-center">
      <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()"
             placeholder="Command Strategic Core..."
             class="w-full bg-black/60 border border-white/10 rounded-2xl pl-6 pr-16 py-4 text-xs font-bold text-white placeholder:text-slate-700 focus:border-primary/40 focus:bg-black/80 transition-all outline-none">
      <button (click)="sendMessage()" class="absolute right-3 w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/20 hover:scale-110 active:scale-95 transition-all">
        <span class="material-symbols-outlined text-lg">bolt</span>
      </button>
    </div>
    <div class="mt-4 flex flex-wrap gap-2">
       <button *ngFor="let cmd of ['/audit', '/sync_kb', '/intel']" (click)="userInput = cmd; sendMessage()" class="px-3 py-1 rounded-lg bg-white/5 border border-white/5 text-[8px] font-black text-slate-500 uppercase tracking-widest hover:border-primary/40 hover:text-primary transition-all">
          {{ cmd }}
       </button>
    </div>
  </footer>
</div>
