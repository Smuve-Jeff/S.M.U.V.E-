<div class="px-6 py-8 animate-fade-in film-grain">
  <div class="flex justify-between items-end mb-10 border-b-2 border-[#3d2b1f] pb-6 wood-edge bg-black/20 p-6 rounded-2xl shadow-xl">
    <div>
      <h1 class="text-4xl font-black tracking-tighter bg-gradient-to-r from-white via-gold to-orange-500 bg-clip-text text-transparent uppercase italic">
        Artist Identity
      </h1>
      <p class="text-[10px] text-gold uppercase tracking-[0.4em] mt-2 font-black">Strategic Profile // Domain Metadata</p>
    </div>
    <div class="flex gap-4">
       <button (click)="saveProfile()" class="px-10 py-3 bg-gold text-black font-black uppercase text-[10px] rounded-xl shadow-lg shadow-gold/20 hover:scale-105 transition-all italic">
         Execute Global Update
       </button>
    </div>
  </div>

  <div class="grid grid-cols-12 gap-10">
    <!-- Sidebar Navigation: Executive Gold -->
    <div class="col-span-12 lg:col-span-3">
      <div class="glass-panel-executive rounded-[2rem] border-gold/20 p-8 shadow-2xl relative overflow-hidden flex flex-col gap-4">
         <div class="absolute inset-0 scanline opacity-5"></div>
         <button *ngFor="let section of sections"
                 (click)="activeSection.set(section.id)"
                 [class.bg-gold]="activeSection() === section.id"
                 [class.text-black]="activeSection() === section.id"
                 class="w-full p-4 rounded-xl glass-panel border-white/5 hover:border-gold/40 transition-all flex items-center gap-4 group">
            <i class="fas {{ section.icon }} text-lg" [class.text-gold]="activeSection() !== section.id"></i>
            <span class="text-[10px] font-black uppercase tracking-widest italic">{{ section.label }}</span>
         </button>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="col-span-12 lg:col-span-9">
      <div class="glass-panel-executive rounded-[2.5rem] border-gold/20 p-12 shadow-2xl bg-black/40 relative overflow-hidden min-h-[600px] wood-edge">
        <div class="absolute inset-0 scanline opacity-10 pointer-events-none"></div>

        <div class="relative z-10">
          <ng-container [ngSwitch]="activeSection()">

            <!-- BASIC INFO -->
            <div *ngSwitchCase="'basic'" class="space-y-12 animate-fade-in">
               <div class="flex items-center gap-12 border-b border-white/5 pb-10">
                  <div class="relative size-32">
                     <div class="absolute inset-0 bg-gold/20 rounded-full blur-2xl animate-pulse"></div>
                     <img src="assets/avatar.jpg" class="size-32 rounded-full border-4 border-gold/30 object-cover relative z-10">
                     <button class="absolute bottom-0 right-0 size-10 rounded-full bg-gold text-black flex items-center justify-center shadow-2xl hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined text-sm">photo_camera</span>
                     </button>
                  </div>
                  <div class="flex-grow space-y-4">
                     <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-500 italic ml-2">Artist Legal Designation</label>
                        <input type="text" [(ngModel)]="editableProfile().artistName" class="w-full bg-black/60 border border-white/5 p-4 rounded-xl text-white font-black italic uppercase tracking-widest outline-none focus:border-gold/40 transition-all">
                     </div>
                  </div>
               </div>

               <div class="grid grid-cols-2 gap-10">
                  <div class="space-y-2">
                     <label class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-500 italic ml-2">Primary Domain (Genre)</label>
                     <select [(ngModel)]="editableProfile().primaryGenre" class="w-full bg-black/60 border border-white/5 p-4 rounded-xl text-white font-bold uppercase outline-none focus:border-gold/40 transition-all appearance-none">
                        <option value="Hip Hop">HIP_HOP_CORE</option>
                        <option value="R&B">RHYTHM_AND_SOUL</option>
                        <option value="Electronic">NEURAL_ELECTRONIC</option>
                     </select>
                  </div>
                  <div class="space-y-2">
                     <label class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-500 italic ml-2">Experience Delta (Years)</label>
                     <input type="number" [(ngModel)]="editableProfile().yearsActive" class="w-full bg-black/60 border border-white/5 p-4 rounded-xl text-white font-mono font-bold outline-none focus:border-gold/40 transition-all">
                  </div>
               </div>
            </div>

            <!-- CATALOG & ASSETS -->
            <div *ngSwitchCase="'catalog'" class="animate-fade-in h-full">
               <app-catalog-manager></app-catalog-manager>
            </div>

            <!-- PROFESSIONAL ID -->
            <div *ngSwitchCase="'professional'" class="space-y-10 animate-fade-in">
               <div class="grid grid-cols-2 gap-8">
                  <div *ngFor="let field of [{l:'PRO_NAME', k:'proName'}, {l:'PRO_IPI', k:'proIpi'}, {l:'SOUNDEXCHANGE_ID', k:'soundExchangeId'}, {l:'MLC_ID', k:'mlcId'}]" class="space-y-2">
                     <label class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-500 italic ml-2">{{ field.l }}</label>
                     <input type="text" [ngModel]="editableProfile()[field.k]" (ngModelChange)="updateProfileField(field.k, $event)" class="w-full bg-black/60 border border-white/5 p-4 rounded-xl text-white font-mono outline-none focus:border-gold/40 transition-all uppercase">
                  </div>
               </div>

               <div class="p-8 rounded-[2rem] bg-gold/5 border border-gold/20 shadow-inner mt-10">
                  <h4 class="text-[10px] font-black uppercase tracking-widest text-gold mb-6 italic">Strategic Deployment Logic</h4>
                  <div class="grid grid-cols-2 gap-10">
                     <div class="space-y-2">
                        <label class="text-[8px] font-black uppercase tracking-widest text-slate-500">Distribution_Hub</label>
                        <input type="text" [(ngModel)]="editableProfile().preferredDistributor" class="w-full bg-black/40 border border-white/5 p-3 rounded-lg text-white text-xs outline-none">
                     </div>
                     <div class="space-y-2">
                        <label class="text-[8px] font-black uppercase tracking-widest text-slate-500">Current_Deployment_State</label>
                        <select [(ngModel)]="editableProfile().distributionStatus" class="w-full bg-black/40 border border-white/5 p-3 rounded-lg text-white text-xs outline-none">
                           <option value="Not Started">STATIONARY</option>
                           <option value="In Progress">ACTIVE_UPLOAD</option>
                           <option value="Distributed">SATURATED</option>
                        </select>
                     </div>
                  </div>
               </div>
            </div>

            <!-- Default Placeholder -->
            <div *ngSwitchDefault class="flex flex-col items-center justify-center py-20 opacity-20">
               <span class="material-symbols-outlined text-9xl text-gold mb-8">engineering</span>
               <h2 class="text-2xl font-black uppercase tracking-[0.4em] text-white italic">Protocol Initializing</h2>
            </div>

          </ng-container>
        </div>
      </div>
    </div>
  </div>
</div>

<div *ngIf="showLegalEditor()" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl flex items-center justify-center p-12 animate-fade-in">
   <div class="w-full max-w-4xl h-full">
      <app-legal-document-editor
        [document]="editingDocument()"
        (save)="saveLegalDocument($event)"
        (cancel)="showLegalEditor.set(false)"
      ></app-legal-document-editor>
   </div>
</div>
