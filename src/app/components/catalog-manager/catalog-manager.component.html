<div class="catalog-container space-y-6">
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="p-4 bg-slate-900/50 border border-white/5 rounded-2xl">
      <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total Assets</div>
      <div class="text-2xl font-black text-white">{{ stats().total }}</div>
    </div>
    <div class="p-4 bg-slate-900/50 border border-white/5 rounded-2xl">
      <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Demos</div>
      <div class="text-2xl font-black text-amber-400">{{ stats().demos }}</div>
    </div>
    <div class="p-4 bg-slate-900/50 border border-white/5 rounded-2xl">
      <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Released</div>
      <div class="text-2xl font-black text-emerald-400">{{ stats().released }}</div>
    </div>
    <div class="p-4 bg-slate-900/50 border border-white/5 rounded-2xl">
      <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Resources</div>
      <div class="text-2xl font-black text-blue-400">{{ stats().assets }}</div>
    </div>
  </div>

  <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-900/30 p-2 rounded-xl border border-white/5">
    <div class="flex gap-1">
      <button *ngFor="let f of ['all', 'demo', 'completed', 'released']"
              (click)="activeFilter.set(f)"
              class="px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all"
              [ngClass]="activeFilter() === f ? 'bg-emerald-500 text-slate-900' : 'text-slate-400 hover:text-white'">
        {{ f }}
      </button>
    </div>

    <div class="flex gap-2">
      <button (click)="addItem('track')" class="action-btn">
        <i class="fas fa-plus mr-2"></i> MASTER
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
    <div *ngFor="let item of filteredCatalog()"
         class="group bg-slate-900/80 border border-white/10 rounded-2xl p-4 hover:border-emerald-500/30 transition-all">
      <div class="flex gap-4">
        <div class="w-20 h-20 rounded-xl bg-slate-800 flex items-center justify-center border border-white/5 group-hover:border-emerald-500/20 transition-all">
          <i class="fas fa-music text-2xl text-slate-600 group-hover:text-emerald-400"></i>
        </div>
        <div class="flex-1 space-y-3">
          <input [(ngModel)]="item.title" (blur)="updateItem(item)"
                 class="bg-transparent border-none text-lg font-bold text-white focus:ring-0 w-full">
          <div class="flex flex-wrap gap-2">
            <select [(ngModel)]="item.status" (change)="updateItem(item)"
                    [ngClass]="getStatusColor(item.status)"
                    class="text-[10px] font-bold uppercase px-2 py-1 rounded border appearance-none cursor-pointer">
              <option value="demo">Demo</option>
              <option value="completed">Completed</option>
              <option value="released">Released</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
