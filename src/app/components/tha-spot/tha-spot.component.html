<div class="gaming-hub-container" [class.dark-mode]="isDarkMode()">
  <!-- Background Layer -->
  <div class="hub-background-fx">
    <div class="scanlines"></div>
    <div class="energy-grid"></div>
    <div class="ambient-glow"></div>
  </div>

  <!-- Tactical Navigation Dock (Physical UI Element) -->
  <nav class="tactical-dock">
    <div class="dock-inner glass-v42">
      <div class="dock-segment section-label">
        <span class="glitch-text" data-text="GAMING HUB">GAMING HUB</span>
      </div>
      <div class="dock-divider"></div>
      <div class="dock-actions">
        <button
          *ngFor="let room of gamingRooms"
          (click)="setActiveRoom(room.id)"
          [class.active]="activeRoom() === room.id"
          class="dock-btn"
          [attr.data-tooltip]="room.name">
          <span class="material-symbols-outlined">{{ room.icon }}</span>
          <span class="btn-label">{{ room.name }}</span>
        </button>
      </div>
      <div class="dock-divider"></div>
      <div class="dock-meta">
        <div class="status-indicator online">
          <span class="pulse-dot"></span>
          <span class="status-text">SYSTEM LIVE</span>
        </div>
      </div>
    </div>
  </nav>

  <!-- Immersive Content Area -->
  <main class="hub-main" [class.room-transitioning]="isTransitioning()">

    <!-- Room Header -->
    <header class="room-header animate-slide-down">
      <div class="room-info">
        <h1 class="room-title">{{ getActiveRoomName() }}</h1>
        <p class="room-desc text-secondary/70">{{ getActiveRoomDesc() }}</p>
      </div>
      <div class="room-stats glass-v42">
        <div class="stat-item">
          <span class="stat-label">AVAILABLE</span>
          <span class="stat-value">{{ filteredGames().length }} TITLES</span>
        </div>
      </div>
    </header>

    <!-- Game Selection Grid (Scrollable directly) -->
    <div class="game-library-scroll custom-scrollbar">
      <div class="game-grid">
        <div
          *ngFor="let game of filteredGames(); let i = index"
          class="game-card-wrapper"
          [style.animation-delay]="i * 0.05 + 's'">

          <div class="game-card glass-v42" (click)="playGame(game)">
            <div class="card-media">
              <img [src]="game.image" [alt]="game.name" class="game-thumb">
              <div class="card-overlay">
                <button class="play-action-btn">
                  <span class="material-symbols-outlined">play_arrow</span>
                  LAUNCH
                </button>
              </div>
              <div class="availability-badge" [attr.data-type]="game.availability">
                {{ game.availability }}
              </div>
            </div>

            <div class="card-content">
              <div class="card-header">
                <h3 class="game-name">{{ game.name }}</h3>
                <div class="game-rating">
                  <span class="material-symbols-outlined">star</span>
                  {{ game.rating }}
                </div>
              </div>
              <p class="game-genre">{{ game.genre }}</p>
              <div class="game-tags">
                <span *ngFor="let tag of getVisibleTags(game)" class="tag">{{ tag }}</span>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

  </main>

  <!-- Immersive Game Overlay -->
  <div class="immersive-overlay" *ngIf="currentGame()" [class.active]="currentGame()">
    <div class="overlay-backdrop" (click)="closeGame()"></div>

    <div class="game-console-window glass-v42">
      <header class="console-header">
        <div class="console-title">
          <span class="material-symbols-outlined">videogame_asset</span>
          {{ currentGame()?.name }}
        </div>
        <div class="console-controls">
          <button class="control-btn" (click)="closeGame()" title="Exit Game">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
      </header>

      <div class="console-body">
        <iframe
          #gameIframe
          [src]="getSafeUrl(currentGame()?.url || '')"
          frameborder="0"
          allowfullscreen
          class="game-frame">
        </iframe>
      </div>

      <footer class="console-footer">
        <div class="telemetry-bar">
          <div class="telemetry-item">
            <span class="label">STATUS:</span>
            <span class="value success">EXECUTING</span>
          </div>
          <div class="telemetry-item">
            <span class="label">SIGNAL:</span>
            <span class="value">STABLE</span>
          </div>
        </div>
        <div class="footer-actions">
          <button class="footer-btn" (click)="closeGame()">
            <span class="material-symbols-outlined">eject</span>
            TERMINATE SESSION
          </button>
        </div>
      </footer>
    </div>
  </div>
</div>
