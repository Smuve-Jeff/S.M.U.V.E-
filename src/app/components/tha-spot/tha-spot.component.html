<div class="tha-spot-container p-8">
  <header class="spot-header mb-12">
    <h1 class="text-5xl font-black italic tracking-tighter text-emerald-500 uppercase">Tha Spot</h1>
    <p class="text-slate-400 mt-2">The Ultimate Interactive Gaming & Jam Hub</p>
  </header>

  <!-- Gaming Hub Section -->
  <section class="gaming-hub-section wow animate__animated animate__fadeIn">
    <div class="hub-controls mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div class="search-bar relative flex-1 max-w-md">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
        <input
          type="text"
          placeholder="Search games..."
          (input)="onSearch($event)"
          class="bg-slate-900/50 border border-slate-800 text-white pl-12 pr-4 py-3 rounded-xl w-full focus:border-emerald-500 outline-none transition-all"
          aria-label="Search games"
        />
      </div>
      <div class="genre-filters flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
        <button
          *ngFor="let genre of genres"
          (click)="setGenre(genre)"
          [class.active]="activeFilters().genre === genre"
          class="px-4 py-2 rounded-full border border-slate-800 text-xs font-bold uppercase tracking-widest whitespace-nowrap transition-all hover:border-emerald-500/50"
          [ngClass]="activeFilters().genre === genre ? 'bg-emerald-500 text-black border-emerald-500' : 'text-slate-400'"
          [attr.aria-label]="'Filter by ' + genre"
        >
          {{ genre }}
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div
        *ngFor="let game of games()"
        class="bg-slate-900/50 p-4 rounded-2xl border border-white/5 hover:border-emerald-500/30 transition-all cursor-pointer group"
        (click)="selectGame(game)"
      >
        <div class="relative h-44 mb-4 overflow-hidden rounded-xl">
          <img
            [src]="game.image"
            [alt]="game.name"
            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
          />
          <div class="absolute top-3 right-3 bg-black/60 backdrop-blur-md px-2 py-1 rounded-lg text-[10px] font-black text-white flex items-center gap-1">
            <i class="fas fa-users text-emerald-400"></i> {{ game.playersOnline || 0 }}
          </div>
          <div class="absolute bottom-3 left-3">
             <span class="bg-emerald-500 text-black px-2 py-1 rounded-md text-[10px] font-black uppercase tracking-tighter">{{ game.genre }}</span>
          </div>
        </div>

        <div class="flex justify-between items-start mb-2">
          <h3 class="text-lg font-black text-white uppercase tracking-tight">{{ game.name }}</h3>
          <div class="flex items-center gap-1 text-yellow-500 text-xs font-bold">
            <i class="fas fa-star"></i> {{ game.rating }}
          </div>
        </div>

        <p class="text-xs text-slate-400 mb-6 line-clamp-2 leading-relaxed">{{ game.description }}</p>

        <button class="w-full py-3 bg-slate-800 group-hover:bg-emerald-500 text-slate-300 group-hover:text-black font-black uppercase tracking-widest text-[10px] rounded-xl transition-all" [attr.aria-label]="'Play ' + game.name">
          PLAY NOW
        </button>
      </div>
    </div>
  </section>

  <!-- Visualizer & AI Jam Section -->
  <section class="jam-section mt-20 p-12 bg-slate-900/30 rounded-[3rem] border border-white/5 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-96 h-96 bg-emerald-500/5 blur-[120px] rounded-full -mr-48 -mt-48"></div>

    <div class="relative z-10">
      <h2 class="text-3xl font-black text-white mb-10 flex items-center gap-4 uppercase italic tracking-tighter">
        <span class="w-12 h-1 border-b-4 border-emerald-500"></span>
        AI Jam Session
      </h2>

      <div class="visualizer-wrapper h-80 mb-12 rounded-3xl overflow-hidden border border-white/5 bg-black/40 relative">
        <app-visualizer></app-visualizer>
        <div class="absolute inset-0 pointer-events-none bg-gradient-to-t from-black/60 to-transparent"></div>
      </div>

      <div class="jam-controls flex flex-wrap justify-center gap-10">
        <div class="flex flex-col items-center group">
          <button
            (click)="toggleAIBassist()"
            [class.active]="aiService.isAIBassistActive()"
            class="w-20 h-20 rounded-full flex items-center justify-center text-2xl transition-all border-2"
            [ngClass]="aiService.isAIBassistActive() ? 'bg-emerald-500 border-emerald-400 text-black shadow-[0_0_30px_rgba(16,185,129,0.4)]' : 'bg-slate-900 border-slate-800 text-slate-500 hover:border-emerald-500/50'"
            aria-label="Toggle AI Bassist"
            title="Toggle AI Bassist"
          >
            <i class="fas fa-guitar"></i>
          </button>
          <span class="mt-4 text-[10px] font-black uppercase tracking-widest" [ngClass]="aiService.isAIBassistActive() ? 'text-emerald-400' : 'text-slate-500'">Bassist</span>
        </div>

        <div class="flex flex-col items-center group">
          <button
            (click)="toggleAIDrummer()"
            [class.active]="aiService.isAIDrummerActive()"
            class="w-20 h-20 rounded-full flex items-center justify-center text-2xl transition-all border-2"
            [ngClass]="aiService.isAIDrummerActive() ? 'bg-emerald-500 border-emerald-400 text-black shadow-[0_0_30px_rgba(16,185,129,0.4)]' : 'bg-slate-900 border-slate-800 text-slate-500 hover:border-emerald-500/50'"
            aria-label="Toggle AI Drummer"
            title="Toggle AI Drummer"
          >
            <i class="fas fa-drum"></i>
          </button>
          <span class="mt-4 text-[10px] font-black uppercase tracking-widest" [ngClass]="aiService.isAIDrummerActive() ? 'text-emerald-400' : 'text-slate-500'">Drummer</span>
        </div>

        <div class="flex flex-col items-center group">
          <button
            (click)="toggleAIKeyboardist()"
            [class.active]="aiService.isAIKeyboardistActive()"
            class="w-20 h-20 rounded-full flex items-center justify-center text-2xl transition-all border-2"
            [ngClass]="aiService.isAIKeyboardistActive() ? 'bg-emerald-500 border-emerald-400 text-black shadow-[0_0_30px_rgba(16,185,129,0.4)]' : 'bg-slate-900 border-slate-800 text-slate-500 hover:border-emerald-500/50'"
            aria-label="Toggle AI Keyboardist"
            title="Toggle AI Keyboardist"
          >
            <i class="fas fa-keyboard"></i>
          </button>
          <span class="mt-4 text-[10px] font-black uppercase tracking-widest" [ngClass]="aiService.isAIKeyboardistActive() ? 'text-emerald-400' : 'text-slate-500'">Keyboardist</span>
        </div>
      </div>
    </div>
  </section>
</div>
