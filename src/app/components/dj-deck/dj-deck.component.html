<div
  class="grid grid-cols-12 gap-3 p-3 rounded h-[80vh] select-none bg-brand-dark"
>
  <!-- Mixer Section -->
  <div
    class="col-span-2 flex flex-col items-center p-3 rounded gap-4 bg-brand-surface"
  >
    <h3
      class="text-lg font-bold tracking-widest text-violet-400"
    >
      MASTER
    </h3>

    <div class="w-full grid grid-cols-3 gap-2 text-center text-[10px]">
      <div>
        <div class="opacity-60 mb-1">A</div>
        <div
          class="w-4 h-32 mx-auto bg-black border rounded border-violet-700/50"
        ></div>
      </div>
      <div>
        <div class="opacity-60 mb-1">MSTR</div>
        <div
          class="w-4 h-32 mx-auto bg-black border rounded border-violet-700/50"
        ></div>
      </div>
      <div>
        <div class="opacity-60 mb-1">B</div>
        <div
          class="w-4 h-32 mx-auto bg-black border rounded border-violet-700/50"
        ></div>
      </div>
    </div>

    <div class="w-full space-y-1">
      <div class="flex items-center justify-between text-[10px] opacity-70">
        <span>XF CURVE</span>
        <select class="bg-black/40 border rounded px-1 py-0.5 text-[10px] w-24">
          <option value="linear">Linear</option>
          <option value="power">Power</option>
          <option value="exp">Exponential</option>
          <option value="cut">Cut</option>
        </select>
      </div>
      <div class="flex items-center gap-2">
        <input
          type="range"
          class="w-full accent-emerald-500"
          min="-1"
          max="1"
          step="0.001"
          [ngModel]="deckService.crossfade()"
          (ngModelChange)="deckService.crossfade.set($event)"
        />
      </div>
      <div class="flex items-center justify-between text-[10px] opacity-70">
        <label class="flex items-center gap-1">
          <input type="checkbox" /> Hamster
        </label>
        <label class="flex items-center gap-1">
          <input type="checkbox" /> Keylock
        </label>
      </div>
    </div>

    <div class="flex flex-col gap-2 w-full">
      <button
        class="p-2 border border-white/10 text-xs rounded"
        [class.bg-red-500]="phantomPowerEnabled()"
        (click)="phantomPowerEnabled.set(!phantomPowerEnabled())"
      >
        48V
      </button>
      <button
        class="p-2 border border-white/10 text-xs rounded"
        [class.bg-emerald-500]="midiEnabled()"
        (click)="midiEnabled.set(!midiEnabled())"
      >
        MIDI
      </button>
      <button
        class="p-2 border border-white/10 text-xs rounded"
        (click)="showSampleLibrary.set(!showSampleLibrary())"
      >
        SAMPLES
      </button>
    </div>

    <div class="flex flex-col gap-2 w-full mt-auto">
      <button class="p-2 border border-emerald-500/50 text-xs rounded text-emerald-500" (click)="loadTrackFor('A')">
        LOAD A
      </button>
      <button class="p-2 border border-emerald-500/50 text-xs rounded text-emerald-500" (click)="loadTrackFor('B')">
        LOAD B
      </button>
    </div>
  </div>

  <!-- Deck A -->
  <div
    class="col-span-5 flex flex-col gap-3 p-3 rounded bg-brand-surface"
  >
    <div class="flex justify-between items-center">
      <h3
        class="text-lg tracking-widest text-emerald-500 font-black italic"
      >
        DECK A
      </h3>
      <div class="text-xs opacity-70 truncate max-w-[40%] text-slate-400">
        {{ deckService.deckA().track.name }}
      </div>
    </div>
    <div
      class="w-full aspect-[4/1] rounded bg-black/50 border border-emerald-700/30"
    ></div>
    <div
      class="w-full aspect-square rounded-full flex items-center justify-center relative bg-gradient-to-br from-brand-dark to-brand-surface"
    >
      <div
        class="absolute inset-0 rounded-full border border-emerald-700/30"
      ></div>
      <img
        [src]="deckService.deckA().track.albumArtUrl"
        class="w-40 h-40 rounded-full object-cover shadow-[0_0_40px_rgba(16,185,129,0.2)]"
      />
    </div>
    <app-stem-controls
      [deckId]="'A'"
      (gainChange)="deckService.onStemGainChange('A', $event)"
    ></app-stem-controls>
    <div class="flex items-center justify-around gap-2 text-sm">
      <button class="p-2 border border-white/10 rounded w-16">CUE</button>
      <button class="p-4 bg-emerald-500 text-black font-black rounded-full w-20 h-20 flex items-center justify-center text-xl shadow-[0_0_20px_rgba(16,185,129,0.4)]" (click)="deckService.togglePlay('A')">
        <i class="fas" [class.fa-pause]="deckService.deckA().isPlaying" [class.fa-play]="!deckService.deckA().isPlaying"></i>
      </button>
      <button class="p-2 border border-white/10 rounded w-16">SYNC</button>
    </div>
    <div class="grid grid-cols-4 gap-2 text-[10px]">
      <button class="border border-white/5 py-2 rounded bg-white/5 uppercase font-bold">HOT1</button>
      <button class="border border-white/5 py-2 rounded bg-white/5 uppercase font-bold">HOT2</button>
      <button class="border border-white/5 py-2 rounded bg-white/5 uppercase font-bold">HOT3</button>
      <button class="border border-white/5 py-2 rounded bg-white/5 uppercase font-bold">HOT4</button>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-[10px] font-black text-emerald-500 w-20">PITCH {{ pitchAPercentage() }}</span>
      <input
        type="range"
        class="w-full accent-emerald-500"
        min="0.5"
        max="1.5"
        step="0.0005"
        [ngModel]="deckService.deckA().playbackRate" (ngModelChange)="setPlaybackRate('A', $event)"
      />
      <select class="bg-black/40 border border-white/10 rounded px-1 py-0.5 text-[10px] w-20 text-white">
        <option>±8%</option>
        <option selected>±16%</option>
        <option>±50%</option>
      </select>
    </div>
    <button class="p-2 border border-white/10 rounded text-xs font-bold uppercase tracking-widest hover:bg-emerald-500 hover:text-black transition-all" (click)="separateStems('A')">
      SEPARATE STEMS
    </button>
  </div>

  <!-- Deck B or Sample Library -->
  <div
    class="col-span-5 flex flex-col gap-3 p-3 rounded bg-brand-surface"
  >
    @if (showSampleLibrary()) {
      <app-sample-library></app-sample-library>
    } @else {
      <div class="flex justify-between items-center">
        <h3
          class="text-lg tracking-widest text-emerald-500 font-black italic"
        >
          DECK B
        </h3>
        <div class="text-xs opacity-70 truncate max-w-[40%] text-slate-400">
          {{ deckService.deckB().track.name }}
        </div>
      </div>
      <div
        class="w-full aspect-[4/1] rounded bg-black/50 border border-emerald-700/30"
      ></div>
      <div
        class="w-full aspect-square rounded-full flex items-center justify-center relative bg-gradient-to-br from-brand-dark to-brand-surface"
      >
        <div
          class="absolute inset-0 rounded-full border border-emerald-700/30"
        ></div>
        <img
          [src]="deckService.deckB().track.albumArtUrl"
          class="w-40 h-40 rounded-full object-cover shadow-[0_0_40px_rgba(16,185,129,0.2)]"
        />
      </div>
      <app-stem-controls
        [deckId]="'B'"
        (gainChange)="deckService.onStemGainChange('B', $event)"
      ></app-stem-controls>
      <div class="flex items-center justify-around gap-2 text-sm">
        <button class="p-2 border border-white/10 rounded w-16">CUE</button>
        <button class="p-4 bg-emerald-500 text-black font-black rounded-full w-20 h-20 flex items-center justify-center text-xl shadow-[0_0_20px_rgba(16,185,129,0.4)]" (click)="deckService.togglePlay('B')">
           <i class="fas" [class.fa-pause]="deckService.deckB().isPlaying" [class.fa-play]="!deckService.deckB().isPlaying"></i>
        </button>
        <button class="p-2 border border-white/10 rounded w-16">SYNC</button>
      </div>
      <div class="grid grid-cols-4 gap-2 text-[10px]">
        <button class="border border-white/5 py-2 rounded bg-white/5 uppercase font-bold">HOT1</button>
        <button class="border border-white/5 py-2 rounded bg-white/5 uppercase font-bold">HOT2</button>
        <button class="border border-white/5 py-2 rounded bg-white/5 uppercase font-bold">HOT3</button>
        <button class="border border-white/5 py-2 rounded bg-white/5 uppercase font-bold">HOT4</button>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-[10px] font-black text-emerald-500 w-20">PITCH {{ pitchBPercentage() }}</span>
        <input
          type="range"
          class="w-full accent-emerald-500"
          min="0.5"
          max="1.5"
          step="0.0005"
          [ngModel]="deckService.deckB().playbackRate" (ngModelChange)="setPlaybackRate('B', $event)"
        />
        <select class="bg-black/40 border border-white/10 rounded px-1 py-0.5 text-[10px] w-20 text-white">
          <option>±8%</option>
          <option selected>±16%</option>
          <option>±50%</option>
        </select>
      </div>
      <button class="p-2 border border-white/10 rounded text-xs font-bold uppercase tracking-widest hover:bg-emerald-500 hover:text-black transition-all" (click)="separateStems('B')">
        SEPARATE STEMS
      </button>
    }
  </div>
</div>
