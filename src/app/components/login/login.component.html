<div class="min-h-screen flex items-center justify-center bg-brand-dark p-6 relative overflow-hidden animate-enter">
  <div class="absolute inset-0 bg-gradient-to-br from-brand-brand-primary/10 via-transparent to-brand-brand-accent/10 pointer-events-none"></div>

  <div class="w-full max-w-md glass-panel rounded-[2rem] border border-white/10 p-10 shadow-2xl relative z-10">
    <div class="text-center mb-10">
       <div class="w-16 h-16 rounded-2xl bg-brand-brand-primary/10 border border-brand-brand-primary/20 flex items-center justify-center text-brand-primary mx-auto mb-6 shadow-lg">
          <i class="fas fa-feather-pointed text-3xl"></i>
       </div>
       <h1 class="text-3xl font-black text-white uppercase italic tracking-tighter leading-none">S.M.U.V.E.<span class="text-brand-primary">4.2</span></h1>
       <p class="text-[10px] font-black text-silver-dim uppercase tracking-[0.4em] mt-3">Strategic Candidate Authorization</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">
       @if (isRegistering()) {
          <div class="space-y-2">
             <label class="text-[10px] font-black text-silver-dim uppercase tracking-widest ml-1">Artist Designation</label>
             <input type="text" [(ngModel)]="artistName" name="artistName" required placeholder="STAGE NAME"
                    class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-sm focus:border-brand-primary outline-none transition-all placeholder:text-silver-dim uppercase">
          </div>
       }

       <div class="space-y-2">
          <label class="text-[10px] font-black text-silver-dim uppercase tracking-widest ml-1">Secure Channel</label>
          <input type="email" [(ngModel)]="credentials.email" name="email" required placeholder="EMAIL ADDRESS"
                 class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-sm focus:border-brand-primary outline-none transition-all placeholder:text-silver-dim uppercase">
       </div>

       <div class="space-y-2">
          <label class="text-[10px] font-black text-silver-dim uppercase tracking-widest ml-1">Access Cipher</label>
          <input type="password" [(ngModel)]="credentials.password" name="password" required placeholder="PASSWORD"
                 class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-sm focus:border-brand-primary outline-none transition-all placeholder:text-silver-dim">
       </div>

       <button type="submit" [disabled]="isLoading() || !loginForm.form.valid"
               class="w-full mt-4 btn-elegant btn-elegant-primary h-14 text-xs font-black uppercase tracking-[0.2em] shadow-xl shadow-brand-brand-primary/10">
          {{ isRegistering() ? 'Initialize Genesis' : 'Authorize Access' }}
       </button>
    </form>

    <div *ngIf="message()" class="mt-6 p-4 rounded-xl border text-center text-[10px] font-bold uppercase tracking-widest"
         [class.border-brand-danger]="isError()" [class.text-brand-danger]="isError()" [class.bg-brand-danger/5]="isError()"
         [class.border-brand-primary]="!isError()" [class.text-brand-primary]="!isError()" [class.bg-brand-brand-primary/5]="!isError()">
       {{ message() }}
    </div>

    <div class="mt-10 pt-8 border-t border-white/10 text-center">
       <button (click)="toggleMode()" class="text-[9px] font-black text-silver-dim hover:text-brand-primary uppercase tracking-[0.2em] transition-all">
          {{ isRegistering() ? 'Already an Elite Member? Login' : 'New Strategic Candidate? Register' }}
       </button>
    </div>
  </div>
</div>
