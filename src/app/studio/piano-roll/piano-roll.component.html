<div class="pr-shell">
  <!-- HEADER -->
  <header class="pr-header" role="banner">
    <div class="pr-header-left">
      <span class="material-symbols-outlined" style="color: var(--teal-500);">piano</span>
      <div class="pr-track-pill" *ngIf="selectedTrack() as track" [attr.aria-label]="'Editing track ' + track.name">
        <span class="pr-track-dot" [style.background-color]="track.color"></span>
        <span>{{ track.name }}</span>
      </div>
      <span
        *ngIf="highlightedRange() as range"
        class="pr-link-badge"
        title="Highlighted via cross-link"
      >
        <span class="material-symbols-outlined">arrow_outward</span>
        Linked · steps {{ range.startStep }}–{{ range.endStep }}
      </span>
    </div>

    <div class="pr-header-tools" role="toolbar" aria-label="Editing tools">
      <button
        type="button"
        class="pr-tool"
        [class.active]="editMode() === 'draw'"
        (click)="setEditMode('draw')"
        [attr.aria-pressed]="editMode() === 'draw'"
        [attr.aria-label]="'Draw tool'"
        title="Draw (D)"
      >
        <span class="material-symbols-outlined">edit</span>
      </button>
      <button
        type="button"
        class="pr-tool"
        [class.active]="editMode() === 'select'"
        (click)="setEditMode('select')"
        [attr.aria-pressed]="editMode() === 'select'"
        [attr.aria-label]="'Selection tool'"
        title="Select (S)"
      >
        <span class="material-symbols-outlined">arrow_selector_tool</span>
      </button>
      <button
        type="button"
        class="pr-tool"
        [class.active]="editMode() === 'erase'"
        (click)="setEditMode('erase')"
        [attr.aria-pressed]="editMode() === 'erase'"
        [attr.aria-label]="'Erase tool'"
        title="Erase (E)"
      >
        <span class="material-symbols-outlined">backspace</span>
      </button>
    </div>

    <div class="pr-snap" role="group" aria-label="Snap-to-grid">
      <span class="pr-snap-label">Snap</span>
      <button
        *ngFor="let s of snapOptions"
        type="button"
        class="pr-snap-btn"
        [class.active]="snap() === s.value"
        (click)="setSnap(s.value)"
      >
        {{ s.label }}
      </button>
    </div>

    <button
      type="button"
      class="pr-ai-chip"
      (click)="humanizeNotes()"
      [attr.aria-label]="'AI: Humanize selected notes'"
    >
      <span class="material-symbols-outlined">auto_awesome</span>
      <span>Humanize</span>
    </button>
  </header>

  <!-- MAIN CANVAS ROW -->
  <div class="pr-canvas-row">
    <!-- Pitch keys column -->
    <div
      class="pr-keys no-scrollbar"
      #keysSidebar
      aria-hidden="true"
      (scroll)="$event.preventDefault()"
    >
      <div
        *ngFor="let midi of displayKeys()"
        class="pr-key"
        [class.black]="isBlackKey(midi)"
        [class.in-scale]="isInScale(midi)"
        [style.height.px]="isBlackKey(midi) ? 0 : rowHeight()"
      >
        <span>{{ isBlackKey(midi) ? '' : (getKeyName(midi) + getOctaveLabel(midi)) }}</span>
      </div>
    </div>

    <!-- Main grid -->
    <div
      class="pr-grid no-scrollbar"
      #scrollContainer
      (pointerdown)="onGridPointerDown($event)"
      (touchstart)="onGridTouchStart($event)"
      (touchmove)="onGridTouchMove($event)"
      (scroll)="syncKeyScroll()"
    >
      <div
        class="pr-grid-canvas"
        [style.width.px]="gridWidth()"
        [style.height.px]="canvasHeight()"
      >
        <!-- rows -->
        <div
          *ngFor="let midi of displayKeys()"
          class="pr-row"
          [class.black]="isBlackKey(midi)"
          [class.in-scale]="isInScale(midi)"
          [style.top.px]="rowTopPx(midi)"
          [style.height.px]="rowHeight()"
        ></div>

        <!-- column lines -->
        <div
          *ngFor="let column of columns()"
          class="pr-col-line"
          [class.bar]="column % 16 === 0"
          [class.beat]="column % 4 === 0"
          [style.left.px]="column * cellWidth()"
          [style.width.px]="cellWidth()"
        ></div>

        <!-- notes -->
        <div
          *ngFor="let note of viewportNotes()"
          class="pr-note"
          [class.selected]="selectedNoteIds().has(note.id)"
          [class.slide]="note.isSlide"
          [class.is-crosslinked]="isHighlighted(note)"
          [style.left.px]="note.step * cellWidth()"
          [style.top.px]="noteTopPx(note.midi)"
          [style.width.px]="note.length * cellWidth()"
          [style.height.px]="rowHeight()"
          (pointerdown)="onNotePointerDown($event, note)"
        >
        </div>

        <!-- playhead -->
        <div
          class="pr-playhead"
          [style.left.px]="playheadPx()"
        ></div>
      </div>
    </div>

    <!-- Velocity lane -->
    <div
      class="pr-velocity"
      #velocityViewport
      (scroll)="onVelocityScroll($event)"
      (pointerdown)="onVelocityPointerDown($event)"
    >
      <div
        class="pr-velocity-canvas"
        [style.width.px]="gridWidth()"
        [style.height.px]="80"
      >
        <div
          *ngFor="let note of viewportNotes()"
          class="pr-velocity-bar"
          [class.selected]="selectedNoteIds().has(note.id)"
          [style.left.px]="note.step * cellWidth()"
          [style.width.px]="note.length * cellWidth()"
          [style.height.px]="note.velocity * 60"
          (pointerdown)="onNotePointerDown($event, note)"
        ></div>
      </div>
    </div>

    <!-- Right inspector -->
    <div class="pr-inspector" *ngIf="selectionCount() > 0">
      <div class="pr-inspector-pill">
        <div class="pr-inspector-pill-label">Velocity</div>
        <div class="pr-inspector-pill-value">{{ selectedNoteVelocity() }}</div>
        <input
          type="range"
          min="0.1"
          max="1.5"
          step="0.05"
          [ngModel]="selectedNoteVelocity()"
          (ngModelChange)="setSelectedVelocity($event)"
        />
      </div>
      <div class="pr-inspector-pill">
        <div class="pr-inspector-pill-label">Prob.</div>
        <div class="pr-inspector-pill-value">{{ selectedNoteProbability() }}</div>
        <input
          type="range"
          min="0"
          max="1"
          step="0.05"
          [ngModel]="selectedNoteProbability()"
          (ngModelChange)="setSelectedProbability($event)"
        />
      </div>
    </div>
  </div>
</div>
