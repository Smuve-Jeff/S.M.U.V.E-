<div class="piano-roll-container bg-slate-950/95 backdrop-blur-3xl border border-white/10 rounded-3xl overflow-hidden shadow-[0_30px_100px_rgba(0,0,0,0.8)] h-full flex flex-col scale-[0.98] transition-all hover:scale-100">
  <div class="piano-roll-header bg-slate-900 px-6 py-4 flex items-center justify-between border-b border-white/10">
    <div class="flex items-center gap-4">
      <div class="p-3 bg-emerald-500/10 rounded-xl border border-emerald-500/20">
        <i class="fas fa-keyboard text-emerald-500 text-sm"></i>
      </div>
      <div>
        <h3 class="text-xs font-black uppercase tracking-[0.2em] text-emerald-500 italic">Precision MIDI Editor</h3>
        <div class="text-[9px] font-mono text-slate-500 mt-1 uppercase tracking-tighter">Target: SYNC-CORE 01 | Pattern: 1.1.1</div>
      </div>
    </div>
    <div class="flex items-center gap-3">
       <button class="px-4 py-2 bg-slate-800/80 rounded-xl border border-white/5 text-[9px] font-black uppercase tracking-widest text-slate-400 hover:text-white transition-all">SNAP: 1/16</button>
       <button class="w-10 h-10 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 flex items-center justify-center hover:bg-emerald-500 hover:text-black transition-all">
         <i class="fas fa-times text-xs"></i>
       </button>
    </div>
  </div>

  <div class="piano-roll-content flex flex-grow overflow-hidden relative">
    <!-- Piano Keys -->
    <div class="piano-keys w-24 bg-slate-900 border-r border-white/5 overflow-y-auto custom-scrollbar-hide h-full flex flex-col-reverse">
       <div *ngFor="let key of keys"
            [class.black-key]="isBlackKey(key)"
            class="key h-8 w-full border-b border-white/5 flex items-center justify-end px-3 transition-colors hover:bg-emerald-500/10"
            [class.bg-slate-800]="!isBlackKey(key)"
            [class.bg-black]="isBlackKey(key)">
          <span class="text-[8px] font-mono" [class.text-slate-400]="!isBlackKey(key)" [class.text-emerald-500/60]="isBlackKey(key)">{{ getKeyName(key) }}</span>
       </div>
    </div>

    <!-- MIDI Grid -->
    <div class="midi-grid-container flex-grow overflow-auto custom-scrollbar relative">
       <div class="midi-grid flex flex-col-reverse relative" [style.width.px]="gridWidth">
          <div *ngFor="let row of keys" class="grid-row h-8 border-b border-white/5 flex">
             <div *ngFor="let cell of cells"
                  class="grid-cell border-r border-white/5 flex-shrink-0"
                  [style.width.px]="cellWidth"
                  [class.bg-emerald-500/5]="isStrongBeat(cell)">
             </div>
          </div>

          <!-- Placed MIDI Notes -->
          <div *ngFor="let note of notes"
               class="midi-note absolute h-6 rounded-md bg-emerald-500 border border-emerald-400 shadow-[0_0_15px_#10b981] flex items-center px-2 cursor-move"
               [style.left.px]="note.startTime * cellWidth"
               [style.bottom.px]="(note.pitch - 24) * 32 + 4"
               [style.width.px]="note.duration * cellWidth">
               <span class="text-[8px] font-black text-black uppercase opacity-70 truncate">{{ getKeyName(note.pitch) }}</span>
          </div>
       </div>
    </div>
  </div>

  <!-- Velocity Editor -->
  <div class="velocity-editor h-24 bg-slate-900 border-t border-white/10 flex items-end px-2 gap-[1px]">
    <div *ngFor="let cell of cells"
         class="velocity-bar flex-grow bg-emerald-500/20 rounded-t-sm hover:bg-emerald-500 transition-colors"
         [style.height.%]="getVelocityAt(cell)">
    </div>
  </div>
</div>
