<div class="piano-roll-container flex h-full bg-slate-950 text-slate-200 selection:bg-brand-primary/30 relative overflow-hidden">
  <aside class="track-sidebar w-80 shrink-0 border-r border-brand-primary/20 bg-slate-900/80 backdrop-blur-xl flex flex-col z-20" [class.is-collapsed]="isCompactMobile()">
    <ng-container *ngIf="isStandalone() && !isCompactMobile(); else compactRack">
      <app-channel-rack class="h-full"></app-channel-rack>
    </ng-container>
    <ng-template #compactRack>
      <div class="p-4 border-b border-brand-primary/20 bg-gradient-to-br from-brand-primary/10 to-transparent flex items-center justify-between">
         <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-brand-primary text-sm">inventory_2</span>
            <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-white">Channel Rack</h2>
         </div>
         <button (click)="musicManager.ensureTrack(defaultTrackPresetId)" class="p-1 rounded bg-brand-primary/20 hover:bg-brand-primary/40 text-brand-primary transition-all">
            <span class="material-symbols-outlined text-sm">add</span>
         </button>
      </div>
      <div class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1 bg-black/20">
         <div *ngFor="let track of musicManager.tracks()" (click)="selectTrack(track)"
              class="group p-2 rounded-lg border transition-all cursor-pointer flex flex-col gap-2"
              [class.bg-brand-primary/10]="musicManager.selectedTrackId() === track.id"
              [class.border-brand-primary/40]="musicManager.selectedTrackId() === track.id"
              [class.border-white/5]="musicManager.selectedTrackId() !== track.id">
            <div class="flex items-center justify-between">
               <div class="flex items-center gap-2">
                  <div class="size-1.5 rounded-full bg-brand-primary" [class.animate-pulse]="musicManager.selectedTrackId() === track.id"></div>
                  <span class="text-[10px] font-bold truncate uppercase tracking-widest text-slate-300 group-hover:text-white">{{track.name}}</span>
               </div>
               <div class="flex items-center gap-1 opacity-40 group-hover:opacity-100 transition-opacity">
                  <button (click)="$event.stopPropagation(); musicManager.toggleMute(track.id)"
                          [class.text-brand-primary]="track.mute" class="hover:text-brand-primary transition-colors p-1">
                     <span class="material-symbols-outlined text-xs">volume_off</span>
                  </button>
               </div>
            </div>
         </div>
      </div>
    </ng-template>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-900/50 relative">
    <header class="piano-toolbar h-auto md:h-14 shrink-0 border-b border-white/5 bg-slate-950/80 backdrop-blur-md flex flex-col md:flex-row md:items-center justify-between px-3 md:px-6 py-2 md:py-0 gap-2 md:gap-0 z-30">
      <div class="flex flex-wrap items-center gap-2 md:gap-6">
          <div class="flex items-center gap-2 md:gap-3">
             <select [ngModel]="selectedScale()" (ngModelChange)="selectedScale.set($event)"
                      class="bg-slate-900 border border-white/10 rounded px-2 py-1 text-[10px] font-bold text-slate-300 outline-none">
                <option *ngFor="let s of scales" [ngValue]="s">{{s.name}}</option>
             </select>
             <select
                     [ngModel]="selectedSnap()"
                     (ngModelChange)="selectedSnap.set($event)"
                     class="bg-slate-900 border border-white/10 rounded px-2 py-1 text-[10px] font-bold text-slate-300 outline-none">
                <option *ngFor="let snap of snapOptions" [ngValue]="snap.steps">Snap {{ snap.label }}</option>
             </select>
              <button (click)="snapToScale.set(!snapToScale())"
                      [class.bg-brand-primary]="snapToScale()"
                      class="text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded border border-white/10 hover:border-brand-primary/40 transition-all">
                Snap
              </button>
          </div>
          <div class="flex items-center gap-1 bg-black/40 p-1 rounded-lg border border-white/5">
             <button *ngFor="let mode of ['draw', 'select', 'brush', 'chord']"
                     (click)="setEditMode(mode)"
                     [class.bg-brand-primary/20]="editMode() === mode"
                     class="p-1.5 rounded hover:bg-white/5 transition-all group">
                <span class="material-symbols-outlined text-sm">{{ mode === 'draw' ? 'edit' : (mode === 'select' ? 'near_me' : (mode === 'brush' ? 'brush' : 'format_list_bulleted')) }}</span>
             </button>
          </div>
          <div class="action-row flex items-center gap-1.5 md:gap-2 overflow-x-auto no-scrollbar max-w-full">
             <button (click)="generateAiPattern()" [disabled]="isAiGenerating()"
                     class="flex items-center gap-2 px-3 py-1.5 rounded bg-brand-primary/10 border border-brand-primary/30 text-brand-primary text-[9px] font-black uppercase tracking-widest hover:bg-brand-primary hover:text-white transition-all disabled:opacity-50">
                <span class="material-symbols-outlined text-xs" [class.animate-spin]="isAiGenerating()">psychology</span>
               {{ isAiGenerating() ? 'Generating...' : 'AI Pattern' }}
            </button>
             <button (click)="quantizeNotes()" title="Quantize" class="p-1.5 rounded hover:text-brand-primary group"><span class="material-symbols-outlined text-sm">grid_on</span></button>
             <button (click)="transposeSelected(12)" title="Octave Up" class="p-1.5 rounded hover:text-brand-primary group"><span class="material-symbols-outlined text-sm">arrow_upward</span></button>
             <button (click)="transposeSelected(-12)" title="Octave Down" class="p-1.5 rounded hover:text-brand-primary group"><span class="material-symbols-outlined text-sm">arrow_downward</span></button>
             <button (click)="setSelectedNoteLength(4)" title="Set 1/4 Length" class="p-1.5 rounded hover:text-brand-primary group"><span class="material-symbols-outlined text-sm">horizontal_rule</span></button>
             <button (click)="legatoSelected()" title="Legato" class="p-1.5 rounded hover:text-brand-primary group"><span class="material-symbols-outlined text-sm">linear_scale</span></button>
             <button (click)="duplicateSelected()" title="Duplicate" class="p-1.5 rounded hover:text-brand-primary group"><span class="material-symbols-outlined text-sm">content_copy</span></button>
             <button (click)="duplicateNextBar()" title="Duplicate to Next Bar" class="p-1.5 rounded hover:text-brand-primary group"><span class="material-symbols-outlined text-sm">queue</span></button>
             <button (click)="humanizeSelected()" title="Humanize" class="p-1.5 rounded hover:text-brand-primary group"><span class="material-symbols-outlined text-sm">gesture</span></button>
              <button (click)="randomizeVelocity()" title="Randomize Velocity" class="p-1.5 rounded hover:text-brand-primary group"><span class="material-symbols-outlined text-sm">shuffle</span></button>
              <button (click)="deleteSelected()" title="Delete" class="p-1.5 rounded hover:text-red-500 group"><span class="material-symbols-outlined text-sm">delete</span></button>
           </div>
       </div>
       <div class="flex items-center justify-between md:justify-end gap-2 md:gap-4">
          <div class="flex items-center gap-2 bg-slate-900 p-1 rounded-lg border border-white/10">
             <button (click)="showAutomation.set(!showAutomation())" [class.text-brand-primary]="showAutomation()" class="p-1 rounded hover:bg-white/5 transition-all">
                <span class="material-symbols-outlined text-sm">equalizer</span>
             </button>
             <button
               *ngIf="isStandalone()"
               (click)="toggleAudioDock()"
               [class.text-brand-primary]="showAudioDock()"
               [attr.aria-expanded]="showAudioDock()"
               aria-controls="audio-dock-panel"
               aria-label="Toggle audio dock"
               class="p-1 rounded hover:text-brand-primary group"
             >
               <span class="material-symbols-outlined text-sm">tune</span>
             </button>
             <button *ngIf="!isStandalone()" (click)="goStandalone()" class="p-1 rounded hover:text-brand-primary group"><span class="material-symbols-outlined text-sm">fullscreen</span></button>
             <button *ngIf="isStandalone()" (click)="goToStudio()" class="p-1 rounded hover:text-brand-primary group"><span class="material-symbols-outlined text-sm">exit_to_app</span></button>
          </div>
          <div class="text-[9px] font-black font-mono text-brand-primary bg-brand-primary/5 px-2 py-1 rounded border border-brand-primary/20">
            {{ musicManager.engine.tempo() }} BPM
          </div>
       </div>
    </header>

    <div class="piano-grid-scroll flex-1 overflow-auto custom-scrollbar relative" #scrollContainer>
       <div class="flex relative" [style.width.px]="gridWidth">
          <div class="w-16 sticky left-0 z-30 bg-slate-900 border-r border-white/10">
             <div *ngFor="let pitch of getDisplayKeys(); let i = index"
                  [style.height.px]="rowHeight"
                  [class.bg-black]="isBlackKey(pitch)"
                  [class.bg-white]="!isBlackKey(pitch)"
                  [class.opacity-20]="!isInScale(pitch)"
                  class="w-full flex items-center justify-end px-2 border-b border-black/5 relative transition-all">
                <span class="text-[8px] font-black tracking-tighter mix-blend-difference truncate">{{ getKeyName(pitch) }}</span>
                <div *ngIf="pitch % 12 === 0 && !isDrumTrack()" class="absolute left-1 top-1 text-[7px] font-black mix-blend-difference">C{{pitch/12 - 1}}</div>
             </div>
          </div>
          <div class="flex-1 relative cursor-crosshair grid-background" (mousedown)="onGridMouseDown($event)" [style.height.px]="getDisplayKeys().length * rowHeight">
             <div *ngFor="let cell of cells" class="absolute top-0 bottom-0 border-r pointer-events-none" [class.border-white/10]="!isStrongBeat(cell)" [class.border-brand-primary/40]="isStrongBeat(cell)" [style.left.px]="cell * cellWidth" [style.width.px]="cellWidth"></div>
             <div *ngFor="let pitch of getDisplayKeys(); let i = index" class="absolute left-0 right-0 border-b pointer-events-none" [class.bg-brand-primary/5]="!isInScale(pitch) && !isDrumTrack()" [class.border-white/5]="pitch % 12 !== 0" [class.border-white/10]="pitch % 12 === 0" [style.top.px]="i * rowHeight" [style.height.px]="rowHeight"></div>
             <div class="absolute top-0 bottom-0 w-px bg-brand-primary shadow-[0_0_15px_#ec5b13] z-10 pointer-events-none" [style.left.px]="musicManager.currentStep() * cellWidth">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 size-2 bg-brand-primary rounded-full"></div>
             </div>
             <ng-container *ngIf="selectedTrack() as track">
                <div *ngFor="let note of track.notes" (mousedown)="onNoteMouseDown($event, note)"
                     class="absolute rounded-sm cursor-move midi-note border border-white/20 flex flex-col justify-center overflow-hidden bg-gradient-to-br"
                     [class.from-brand-primary]="!selectedNoteIds().has(note.id)"
                     [class.to-orange-600]="!selectedNoteIds().has(note.id)"
                     [class.from-emerald-400]="selectedNoteIds().has(note.id)"
                     [class.to-emerald-600]="selectedNoteIds().has(note.id)"
                     [style.left.px]="note.step * cellWidth"
                     [style.top.px]="getDisplayKeys().indexOf(note.midi) * rowHeight"
                     [style.width.px]="note.length * cellWidth"
                     [style.height.px]="rowHeight - 2">
                  <div class="h-1 bg-white/30 absolute bottom-0 left-0" [style.width.%]="note.velocity * 100"></div>
                </div>
             </ng-container>
          </div>
       </div>
    </div>

    <section *ngIf="isStandalone()" class="border-t border-white/5 bg-slate-950/80 backdrop-blur-md flex flex-col shrink-0">
      <div class="px-4 py-2 flex flex-wrap items-center justify-between gap-2 text-[9px] uppercase tracking-widest font-black text-slate-400">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-sm text-brand-primary">graphic_eq</span>
          <span>Audio Dock</span>
          <span class="text-[8px] text-slate-500">Mixer + Drum Machine → Mastering</span>
        </div>
        <div class="flex items-center gap-2">
          <button
            (click)="setAudioDockView('mixer')"
            class="px-2 py-1 rounded border border-white/10 text-[8px] font-black uppercase tracking-widest"
            [class.text-brand-primary]="audioDockView() === 'mixer'"
            [class.border-brand-primary/30]="audioDockView() === 'mixer'"
          >
            Mixer
          </button>
          <button
            (click)="setAudioDockView('drum-machine')"
            class="px-2 py-1 rounded border border-white/10 text-[8px] font-black uppercase tracking-widest"
            [class.text-brand-primary]="audioDockView() === 'drum-machine'"
            [class.border-brand-primary/30]="audioDockView() === 'drum-machine'"
          >
            Drums
          </button>
          <button
            (click)="setAudioDockView('mastering')"
            class="px-2 py-1 rounded border border-white/10 text-[8px] font-black uppercase tracking-widest"
            [class.text-brand-primary]="audioDockView() === 'mastering'"
            [class.border-brand-primary/30]="audioDockView() === 'mastering'"
          >
            Master
          </button>
        </div>
      </div>
      <div
        *ngIf="showAudioDock()"
        id="audio-dock-panel"
        role="region"
        aria-label="Audio dock modules"
        class="h-[360px] md:h-[420px] overflow-hidden border-t border-white/5 bg-black/20"
      >
        <div class="h-full overflow-auto custom-scrollbar p-3">
          <app-mixer *ngIf="audioDockView() === 'mixer'"></app-mixer>
          <app-drum-machine *ngIf="audioDockView() === 'drum-machine'"></app-drum-machine>
          <app-mastering-suite *ngIf="audioDockView() === 'mastering'"></app-mastering-suite>
        </div>
      </div>
    </section>

    <footer *ngIf="showAutomation()" class="h-40 shrink-0 border-t border-brand-primary/20 bg-slate-900/90 backdrop-blur-md flex flex-col overflow-hidden">
      <div class="px-4 py-2 border-b border-white/5 flex items-center justify-between text-[9px] uppercase tracking-widest font-black text-slate-400">
        <span>Velocity Lane</span>
        <span class="text-brand-primary">{{ getHumanizeStatusLabel() }}</span>
      </div>
      <div class="flex-1 relative flex items-end p-4 gap-px overflow-x-auto no-scrollbar" [style.width.px]="gridWidth">
         <div *ngFor="let cell of cells" class="flex-1 bg-slate-800/30 hover:bg-white/5 transition-colors relative" [style.width.px]="cellWidth">
            <div class="w-full bg-brand-primary/40 group-hover:bg-brand-primary transition-all rounded-t-sm shadow-[0_0_10px_rgba(236,91,19,0.2)]" [style.height.%]="getVelocityAt(cell)"></div>
         </div>
      </div>
    </footer>
  </main>
  <div class="scanline"></div>
</div>
