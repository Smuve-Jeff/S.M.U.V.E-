<div class="sound-browser h-full flex flex-col bg-slate-900 border-r border-fl-border font-sans overflow-hidden glass-v42 shadow-v42-xl">
  <div class="p-3 border-b border-fl-border bg-black/20 wood-panel">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-fl-blue neon-text">
        Pro Sound Browser
      </h3>
      <button (click)="importAudio()" class="text-[9px] font-black text-slate-500 hover:text-fl-blue uppercase flex items-center gap-1 transition-all">
        <span class="material-symbols-outlined text-xs">upload_file</span>
        Import
      </button>
    </div>

    <div class="relative group">
      <span class="material-symbols-outlined absolute left-2 top-1.5 text-slate-600 text-sm group-focus-within:text-fl-blue transition-colors">search</span>
      <input
        type="text"
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        placeholder="Search Professional Library..."
        class="w-full bg-black/40 border border-fl-border rounded-lg pl-8 pr-3 py-1.5 text-[10px] text-slate-200 focus:outline-none focus:border-fl-blue/40 transition-all placeholder:text-slate-700 executive-glass"
      />
    </div>
  </div>

  <!-- Categories -->
  <div class="flex flex-wrap gap-1 p-2 bg-white/5">
    <button
      *ngFor="let cat of categories"
      (click)="selectedCategory.set(cat.id)"
      class="px-2 py-1 flex items-center gap-1 transition-all rounded-md text-[8px] font-black uppercase tracking-wider"
      [class.bg-fl-blue/20]="selectedCategory() === cat.id"
      [class.text-fl-blue]="selectedCategory() === cat.id"
      [class.text-slate-500]="selectedCategory() !== cat.id"
    >
      <span class="material-symbols-outlined text-[10px]">{{ cat.icon }}</span>
      {{ cat.label }}
    </button>
  </div>

  <!-- Tags -->
  <div class="flex flex-wrap gap-1 px-2 pb-2 bg-white/5 no-scrollbar overflow-x-auto whitespace-nowrap">
    <button
      *ngFor="let tag of allTags()"
      (click)="toggleTag(tag)"
      class="px-2 py-0.5 rounded-full border border-fl-border/30 text-[7px] font-mono uppercase tracking-tighter transition-all"
      [class.bg-fl-blue]="selectedTag() === tag"
      [class.text-black]="selectedTag() === tag"
      [class.text-slate-500]="selectedTag() !== tag"
    >
      #{{ tag }}
    </button>
  </div>

  <div class="flex-1 overflow-y-auto custom-scrollbar p-2">
    <div
      *ngFor="let preset of presets()"
      class="preset-item group p-2 mb-1 rounded-lg border border-transparent hover:border-fl-border hover:bg-white/[0.03] transition-all cursor-pointer relative overflow-hidden tactile-v42"
      (click)="selectPreset(preset)"
      draggable="true"
      (dragstart)="onDragStart($event, preset)"
    >
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-black/40 border border-fl-border flex items-center justify-center group-hover:border-fl-blue/20 transition-all">
          <span class="material-symbols-outlined text-sm" [class.text-fl-blue]="preset.type === 'synth'" [class.text-blue-400]="preset.type === 'sample'">
            {{ preset.type === 'synth' ? 'settings_input_component' : 'audio_file' }}
          </span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-[9px] font-black text-slate-200 truncate uppercase tracking-wider">
            {{ preset.name }}
          </div>
          <div class="flex gap-1 overflow-hidden">
             <span *ngFor="let tag of preset.tags" class="text-[6px] font-mono text-slate-600 uppercase">#{{ tag }}</span>
          </div>
        </div>

        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
          <button (click)="previewPreset(preset, $event)" class="p-1.5 rounded-lg bg-white/5 hover:bg-fl-blue/20 transition-all" [class.text-fl-blue]="previewingId() === preset.id">
            <span class="material-symbols-outlined text-[10px]">{{ previewingId() === preset.id ? 'stop' : 'play_arrow' }}</span>
          </button>
          <button (click)="$event.stopPropagation(); addAsNewTrack(preset)" class="p-1.5 rounded-lg bg-white/5 hover:bg-fl-blue hover:text-black transition-all">
            <span class="material-symbols-outlined text-[10px]">add</span>
          </button>
        </div>
      </div>
    </div>

    <div *ngIf="presets().length === 0" class="flex flex-col items-center justify-center py-10 opacity-30">
      <span class="material-symbols-outlined text-3xl mb-2">inventory_2</span>
      <span class="text-[10px] font-black uppercase tracking-widest">No sounds found</span>
    </div>
  </div>

  <div class="p-3 bg-black/30 border-t border-fl-border wood-panel">
    <div class="text-[7px] font-black uppercase tracking-[0.2em] text-slate-600 mb-2">
      Production Fidelity
    </div>
    <div class="flex items-center gap-2">
      <div class="flex-1 h-1 bg-white/5 rounded-full overflow-hidden">
        <div class="h-full bg-fl-blue/40 w-[85%]" class="extreme-glow"></div>
      </div>
      <span class="text-[7px] font-mono text-fl-blue/60 uppercase">High fidelity active</span>
    </div>
  </div>
</div>
