<div class="sound-browser h-full flex flex-col bg-slate-900 border-r border-white/10 font-sans overflow-hidden">
  <div class="p-3 border-b border-white/10 bg-black/20">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-brand-primary">Sound Browser</h3>
      <button (click)="importAudio()" class="text-[9px] font-black text-slate-500 hover:text-brand-primary uppercase flex items-center gap-1 transition-all">
        <span class="material-symbols-outlined text-xs">upload_file</span>
        Import
      </button>
    </div>

    <div class="relative group">
      <span class="material-symbols-outlined absolute left-2 top-1.5 text-slate-600 text-sm group-focus-within:text-brand-primary transition-colors">search</span>
      <input
        type="text"
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        placeholder="Search Library..."
        class="w-full bg-black/40 border border-white/10 rounded-lg pl-8 pr-3 py-1.5 text-[10px] text-slate-200 focus:outline-none focus:border-brand-primary/40 transition-all placeholder:text-slate-700"
      >
    </div>
  </div>

  <div class="flex gap-px bg-white/5 p-1">
    <button
      *ngFor="let cat of categories"
      (click)="selectedCategory.set(cat.id)"
      class="flex-1 py-1.5 flex flex-col items-center justify-center gap-1 transition-all rounded-md"
      [class.bg-brand-primary/10]="selectedCategory() === cat.id"
      [class.text-brand-primary]="selectedCategory() === cat.id"
      [class.text-slate-500]="selectedCategory() !== cat.id"
    >
      <span class="material-symbols-outlined text-xs">{{ cat.icon }}</span>
      <span class="text-[7px] font-black uppercase tracking-tighter">{{ cat.label }}</span>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto custom-scrollbar p-2">
    <div *ngFor="let preset of presets()"
         class="preset-item group p-2 mb-1 rounded-lg border border-transparent hover:border-white/10 hover:bg-white/[0.03] transition-all cursor-pointer relative overflow-hidden"
         (click)="selectPreset(preset)">

      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-black/40 border border-white/5 flex items-center justify-center group-hover:border-brand-primary/20 transition-all">
          <span class="material-symbols-outlined text-sm" [class.text-brand-primary]="preset.type === 'synth'" [class.text-blue-400]="preset.type === 'sample'">
            {{ preset.type === 'synth' ? 'settings_input_component' : 'audio_file' }}
          </span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-[9px] font-black text-slate-200 truncate uppercase tracking-wider">{{ preset.name }}</div>
          <div class="text-[7px] font-mono text-slate-500 uppercase tracking-tight">{{ preset.id }}</div>
        </div>

        <button
          (click)="$event.stopPropagation(); addAsNewTrack(preset)"
          class="opacity-0 group-hover:opacity-100 p-1.5 rounded-lg bg-white/5 hover:bg-brand-primary hover:text-black transition-all"
        >
          <span class="material-symbols-outlined text-[10px]">add</span>
        </button>
      </div>

      <div class="absolute bottom-0 left-0 h-[1px] bg-brand-primary/0 group-hover:bg-brand-primary/40 transition-all" [style.width.%]="100"></div>
    </div>

    <div *ngIf="presets().length === 0" class="flex flex-col items-center justify-center py-10 opacity-30">
      <span class="material-symbols-outlined text-3xl mb-2">inventory_2</span>
      <span class="text-[10px] font-black uppercase tracking-widest">No sounds found</span>
    </div>
  </div>

  <div class="p-3 bg-black/30 border-t border-white/10">
    <div class="text-[7px] font-black uppercase tracking-[0.2em] text-slate-600 mb-2">Engine Activity</div>
    <div class="flex items-center gap-2">
      <div class="flex-1 h-1 bg-white/5 rounded-full overflow-hidden">
        <div class="h-full bg-brand-primary/40 w-[64%]"></div>
      </div>
      <span class="text-[7px] font-mono text-brand-primary/60 uppercase">64% Cached</span>
    </div>
  </div>
</div>
