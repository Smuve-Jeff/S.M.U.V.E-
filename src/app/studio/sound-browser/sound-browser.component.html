<div class="sb-shell">
  <header class="sb-header" role="banner">
    <div class="sb-title">
      <div>
        <h1>Sound Matrix<small>Instruments &amp; Presets</small></h1>
      </div>
      <button
        type="button"
        class="sb-ai-btn"
        (click)="aiSearch()"
        aria-label="AI-powered sound search"
      >
        <span class="material-symbols-outlined" style="font-size: 14px;">auto_awesome</span>
        AI Search
      </button>
    </div>

    <div class="sb-search">
      <span class="material-symbols-outlined" aria-hidden="true">search</span>
      <input
        type="text"
        placeholder="Find an instrument or sound…"
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        aria-label="Search sound presets"
      />
    </div>

    <div class="sb-cats" role="tablist" aria-label="Category">
      <button
        *ngFor="let cat of categories"
        type="button"
        class="sb-cat"
        [class.active]="selectedCategory() === cat.id"
        (click)="selectedCategory.set(cat.id)"
        [attr.aria-label]="'Switch to category ' + cat.label"
        [attr.aria-pressed]="selectedCategory() === cat.id"
        role="tab"
      >
        <span class="material-symbols-outlined">{{ cat.icon }}</span>
        <span>{{ cat.label }}</span>
      </button>
    </div>
  </header>

  <div
    class="sb-list"
    role="list"
    [attr.aria-busy]="false"
    aria-label="Available presets"
  >
    <article
      *ngFor="let preset of presets()"
      class="sb-card"
      role="listitem"
      draggable="true"
      (click)="selectPreset(preset)"
      (dragstart)="onDragStart($event, preset)"
      tabindex="0"
      (keyup)="$event.key === 'Enter' && selectPreset(preset)"
      [attr.aria-label]="'Preset: ' + preset.name + ', type ' + (preset.type || 'sample')"
    >
      <div class="sb-card-thumb">
        <span class="material-symbols-outlined">
          {{ preset.type === 'synth' ? 'graphic_eq' : 'audio_file' }}
        </span>
        <button
          type="button"
          class="sb-card-play"
          [class.previewing]="previewingId() === preset.id"
          (click)="previewPreset(preset, $event)"
          [attr.aria-label]="'Preview ' + preset.name"
          [attr.aria-pressed]="previewingId() === preset.id"
        >
          <span class="material-symbols-outlined">
            {{ previewingId() === preset.id ? 'stop' : 'play_arrow' }}
          </span>
        </button>
      </div>
      <div class="sb-card-meta">
        <div class="sb-card-name">{{ preset.name }}</div>
        <div class="sb-card-info">{{ preset.type || 'sample' }} · {{ preset.category || 'misc' }}</div>
      </div>
    </article>
  </div>

  <div *ngIf="presets().length === 0" class="sb-empty">
    <span class="material-symbols-outlined">search_off</span>
    <span>No presets match</span>
  </div>
</div>
