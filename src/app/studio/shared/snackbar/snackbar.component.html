<div
  class="snackbar"
  [class.visible]="visible()"
  [class]="'snackbar-' + type()"
>
  <span class="snackbar-message">{{ message() }}</span>
  <button
    *ngIf="action()"
    class="snackbar-action"
    (click)="onAction()"
    type="button"
  >
    {{ action() }}
  </button>
  <button class="snackbar-close" (click)="hide()" type="button">
    <span class="material-icons">close</span>
  </button>
</div>
