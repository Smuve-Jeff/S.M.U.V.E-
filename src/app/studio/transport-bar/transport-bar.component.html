<div class="transport-bar">
  <div class="control-group">
    <button
      (click)="togglePlay()"
      [class.active]="isPlaying()"
      class="transport-btn"
      title="Play/Pause"
    >
      <i class="fas" [ngClass]="{ 'fa-play': !isPlaying(), 'fa-pause': isPlaying() }"></i>
    </button>
    <button (click)="stop()" class="transport-btn" title="Stop">
      <i class="fas fa-stop"></i>
    </button>
    <button
      (click)="toggleRecord()"
      [class.active]="isRecording()"
      class="transport-btn record-btn"
      title="Record"
    >
      <i class="fas fa-circle"></i>
    </button>
    <button
      (click)="toggleMetronome()"
      [class.active]="audioEngine.metronomeEnabled()"
      class="transport-btn"
      title="Metronome"
    >
      <i class="fas fa-drum"></i>
    </button>
  </div>

  <div class="display-section">
    <div class="display-item bpm-control">
      <span class="display-label">TEMPO</span>
      <div class="flex items-center gap-1">
        <button class="bpm-nudge" (click)="nudgeTempo(-1)">−</button>
        <input
          type="number"
          class="bpm-input"
          [value]="audioEngine.tempo()"
          (change)="onTempoInput($event)"
          min="20"
          max="300"
        />
        <button class="bpm-nudge" (click)="nudgeTempo(1)">+</button>
      </div>
    </div>
    <div class="display-item">
      <span class="display-label">POSITION</span>
      <span class="display-value">{{ audioEngine.currentBeat() + 1 }}.1</span>
    </div>
  </div>

  <div class="fader-group">
    <div *ngIf="audioEngine.metronomeEnabled()" class="fader-item">
      <span class="fader-label">CLICK</span>
      <input
        type="range"
        min="0"
        max="100"
        [value]="audioEngine.metronomeVolume() * 100"
        (input)="updateMetronomeVolume($event)"
      />
    </div>
    <div class="fader-item">
      <span class="fader-label">MASTER</span>
      <input
        type="range"
        min="0"
        max="100"
        [value]="masterVolume()"
        (input)="updateMasterVolume($event)"
      />
    </div>
  </div>
</div>
