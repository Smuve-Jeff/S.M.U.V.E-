<div class="transport-container wood-panel shadow-v42-xl glass-v42">
  <div class="transport-content">
    <!-- Branding/Status -->
    <div class="transport-branding hidden md:flex">
      <div class="neon-text-xs neon-text">ANALOG ENGINE v4.2</div>
      <div class="status-indicator" [class.recording]="isRecording()">
        <span class="dot"></span>
        {{ isRecording() ? 'RECORDING' : isPlaying() ? 'PLAYING' : 'IDLE' }}
      </div>
    </div>

    <!-- Main Controls -->
    <div class="transport-main">
      <button
        class="transport-btn tactile-v42 glass-v42"
        (click)="stop()"
        [class.active]="isStopped()"
      >
        <span class="material-symbols-outlined">stop</span>
      </button>
      <button
        class="transport-btn tactile-v42 glass-v42"
        (click)="togglePlay()"
        [class.active]="isPlaying()"
      >
        <span class="material-symbols-outlined">{{
          isPlaying() ? 'pause' : 'play_arrow'
        }}</span>
      </button>
      <button
        class="transport-btn rec-btn tactile-v42 glass-v42"
        (click)="toggleRecord()"
        [class.active]="isRecording()"
      >
        <span class="material-symbols-outlined">fiber_manual_record</span>
      </button>
    </div>

    <!-- Tempo/Sync -->
    <div class="transport-tempo glass-v42 relative">
      <div class="tempo-controls">
        <button (click)="nudgeTempo(-1)" class="nudge-btn">-</button>
        <div class="tempo-display-wrapper" (click)="toggleBpmDropdown()">
          <input
            type="number"
            [ngModel]="audioEngine.tempo()"
            (blur)="onTempoInput($event)"
            (keyup.enter)="onTempoInput($event)"
            class="tempo-input font-mono"
            (click)="$event.stopPropagation()"
          />
          <span class="material-symbols-outlined text-[10px] opacity-50"
            >arrow_drop_down</span
          >
        </div>
        <button (click)="nudgeTempo(1)" class="nudge-btn">+</button>
      </div>
      <div class="neon-text-xs opacity-50">BPM</div>

      <!-- BPM Dropdown -->
      <div
        class="bpm-dropdown glass-v42 shadow-v42-xl"
        *ngIf="showBpmDropdown()"
      >
        <div class="dropdown-header neon-text-xs border-b border-white/10 p-2">
          PRESETS
        </div>
        <div class="presets-grid grid grid-cols-3 gap-1 p-2">
          <button
            *ngFor="let bpm of bpmPresets"
            (click)="setTempo(bpm)"
            class="preset-btn text-[10px] font-mono p-1 rounded hover:bg-white/10 transition-colors"
            [class.active]="audioEngine.tempo() === bpm"
          >
            {{ bpm }}
          </button>
        </div>
      </div>
    </div>

    <!-- Master Volume -->
    <div class="transport-master glass-v42 hidden sm:flex">
      <span class="material-symbols-outlined text-sm">volume_up</span>
      <input
        type="range"
        min="0"
        max="100"
        [ngModel]="masterVolume()"
        (input)="updateMasterVolume($event)"
        class="volume-slider extreme-glow"
      />
      <span class="font-mono text-[10px] w-8 text-center"
        >{{ masterVolume() }}%</span
      >
    </div>


    <!-- Export -->
    <div class="transport-export hidden md:flex">
      <button type="button" class="transport-btn tactile-v42 glass-v42 flex items-center gap-2 px-3"
              (click)="exportWav()" [disabled]="isExporting()">
        <span class="material-symbols-outlined text-sm">{{ isExporting() ? 'hourglass_bottom' : 'download' }}</span>
        <span class="text-[8px] font-black uppercase tracking-tighter">{{ isExporting() ? 'BOUNCING...' : 'EXPORT' }}</span>
      </button>
    </div>
    <!-- Metronome -->
    <div class="transport-metronome glass-v42 hidden lg:flex">
      <button
        class="metronome-toggle"
        [class.active]="audioEngine.metronomeEnabled()"
        (click)="toggleMetronome()"
      >
        <span class="material-symbols-outlined">metronome</span>
      </button>
      <input
        type="range"
        min="0"
        max="100"
        [ngModel]="audioEngine.metronomeVolume() * 100"
        (input)="updateMetronomeVolume($event)"
        class="mini-slider"
      />
    </div>
  </div>
</div>
