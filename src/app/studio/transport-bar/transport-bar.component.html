<div class="ctb-shell" role="toolbar" aria-label="Transport controls">
  <!-- Play / Stop / Record -->
  <div class="ctb-group" role="group" aria-label="Playback">
    <button
      type="button"
      class="ctb-btn ctb-stop"
      (click)="stop()"
      [attr.aria-label]="'Stop playback'"
      [attr.aria-pressed]="isStopped()"
    >
      <span class="material-symbols-outlined">stop</span>
    </button>
    <button
      type="button"
      class="ctb-btn ctb-play"
      [class.ctb-play-active]="isPlaying()"
      (click)="togglePlay()"
      [attr.aria-label]="isPlaying() ? 'Pause playback' : 'Start playback'"
      [attr.aria-pressed]="isPlaying()"
    >
      <span class="material-symbols-outlined">
        {{ isPlaying() ? 'pause' : 'play_arrow' }}
      </span>
      <span class="ctb-play-pulse" *ngIf="isPlaying()" aria-hidden="true"></span>
    </button>
    <button
      type="button"
      class="ctb-btn ctb-rec"
      [class.ctb-rec-active]="isRecording()"
      (click)="toggleRecord()"
      [attr.aria-label]="isRecording() ? 'Stop recording' : 'Start recording'"
      [attr.aria-pressed]="isRecording()"
    >
      <span class="material-symbols-outlined">fiber_manual_record</span>
    </button>

    <span
      *ngIf="recordingLabel()"
      class="ctb-rec-source"
      [attr.aria-live]="'polite'"
      role="status"
    >
      <span class="ctb-rec-dot" aria-hidden="true"></span>
      {{ recordingLabel() }}
    </span>
  </div>

  <!-- Tempo group + Tap Tempo -->
  <div class="ctb-group ctb-tempo" role="group" aria-label="Tempo">
    <button
      type="button"
      class="ctb-btn ctb-nudge"
      (click)="nudgeTempo(-1)"
      [attr.aria-label]="'Decrease tempo by 1 BPM'"
    >
      <span class="material-symbols-outlined">remove</span>
    </button>
    <button
      type="button"
      class="ctb-bpm"
      (click)="showBpmDropdown.set(!showBpmDropdown())"
      [attr.aria-label]="'Tempo ' + audioEngine.tempo() + ' BPM — tap to change'"
      aria-haspopup="dialog"
    >
      <span class="ctb-bpm-value">{{ audioEngine.tempo() }}</span>
      <span class="ctb-bpm-unit">BPM</span>
    </button>
    <button
      type="button"
      class="ctb-btn ctb-nudge"
      (click)="nudgeTempo(1)"
      [attr.aria-label]="'Increase tempo by 1 BPM'"
    >
      <span class="material-symbols-outlined">add</span>
    </button>

    <!-- Pro: Tap Tempo button -->
    <button
      type="button"
      class="ctb-btn ctb-tap"
      [class.ctb-tap-armed]="tapBpmGuess() !== null"
      (click)="tapTempo()"
      (dblclick)="resetTapTempo()"
      [attr.aria-label]="tapBpmGuess() ? 'Tap tempo · detected ' + tapBpmGuess() + ' BPM' : 'Tap tempo — tap 3-4 times to lock in BPM'"
      title="Tap 3+ times · double-click to reset"
    >
      <span class="material-symbols-outlined">touch_app</span>
      <span class="ctb-tap-readout" *ngIf="tapBpmGuess() !== null">
        {{ tapBpmGuess() }}
      </span>
    </button>
  </div>

  <!-- Pro: Count-in picker -->
  <div class="ctb-group ctb-countin" role="group" aria-label="Count-in bars before play">
    <span class="ctb-countin-label" title="Count-in before play / record">CI</span>
    <button
      *ngFor="let n of [0, 1, 2]"
      type="button"
      class="ctb-countin-chip"
      [class.ctb-countin-active]="countInBars() === n"
      (click)="setCountIn(n)"
      [attr.aria-label]="'Count-in ' + n + ' bar' + (n === 1 ? '' : 's') + ' before play'"
      [attr.aria-pressed]="countInBars() === n"
    >
      {{ n === 0 ? 'OFF' : (n + 'B') }}
    </button>
  </div>

  <!-- Pro: A/B Loop Region -->
  <div class="ctb-group ctb-loop-ab" role="group" aria-label="A/B loop region">
    <button
      type="button"
      class="ctb-loop-chip"
      [class.ctb-loop-chip-on]="loopStartStep() !== null"
      (click)="setLoopMarker('start')"
      title="Set loop START at playhead"
      [attr.aria-label]="'Set loop A marker at step ' + (loopStartStep() === null ? 'playhead' : loopStartStep())"
    >
      <span class="material-symbols-outlined">first_page</span>
      A
    </button>
    <button
      type="button"
      class="ctb-loop-chip"
      [class.ctb-loop-chip-on]="loopEndStep() !== null"
      (click)="setLoopMarker('end')"
      title="Set loop END at playhead"
      [attr.aria-label]="'Set loop B marker at step ' + (loopEndStep() === null ? 'playhead' : loopEndStep())"
    >
      <span class="material-symbols-outlined">last_page</span>
      B
    </button>
    <span class="ctb-loop-readout" *ngIf="loopRegionLabel() !== '—'">
      {{ loopRegionLabel() }}
    </span>
    <button
      type="button"
      class="ctb-loop-clear"
      (click)="clearLoopRegion()"
      *ngIf="hasLoopRegion()"
      title="Clear loop region"
      aria-label="Clear loop region"
    >
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>

  <!-- Pro: Undo / Redo -->
  <div class="ctb-group ctb-undo" role="group" aria-label="History">
    <button
      type="button"
      class="ctb-undo-btn"
      (click)="undo()"
      [attr.aria-label]="'Undo · depth ' + undoCount()"
      title="Undo last action"
    >
      <span class="material-symbols-outlined">undo</span>
      <span class="ctb-undo-badge" *ngIf="undoCount() > 0">{{ undoCount() }}</span>
    </button>
    <button
      type="button"
      class="ctb-undo-btn"
      (click)="redo()"
      [attr.aria-label]="'Redo · depth ' + redoCount()"
      title="Redo last undone action"
    >
      <span class="material-symbols-outlined">redo</span>
      <span class="ctb-undo-badge" *ngIf="redoCount() > 0">{{ redoCount() }}</span>
    </button>
  </div>

  <!-- Loop + Metronome toggles -->
  <div class="ctb-group ctb-toggles" role="group" aria-label="Toggles">
    <button
      type="button"
      class="ctb-toggle"
      [class.ctb-toggle-active]="loopEnabled()"
      (click)="toggleLoop()"
      [attr.aria-pressed]="loopEnabled()"
      [attr.aria-label]="'Toggle loop region'"
    >
      <span class="material-symbols-outlined">repeat</span>
    </button>
    <button
      type="button"
      class="ctb-toggle"
      [class.ctb-toggle-active]="metronomeEnabled()"
      (click)="toggleMetronome()"
      [attr.aria-pressed]="metronomeEnabled()"
      [attr.aria-label]="'Toggle metronome'"
    >
      <span class="material-symbols-outlined">metronome</span>
    </button>
  </div>

  <!-- Pro: Master meter (with dB readout) -->
  <div class="ctb-meter ctb-meter-pro" aria-hidden="false">
    <div class="ctb-meter-bars">
      <div class="ctb-meter-bar" [style.transform]="'scaleY(' + masterLevelVisual() + ')'"></div>
      <div class="ctb-meter-bar" [style.transform]="'scaleY(' + masterLevelVisual() + ')'"></div>
      <div class="ctb-meter-peak" [style.bottom.%]="masterPeakHold() * 100"></div>
    </div>
    <div class="ctb-meter-readout" aria-live="off">
      <span class="ctb-db-now" [class.over]="masterDb() > 0">
        {{ formatDb(masterDb()) }}
      </span>
      <span class="ctb-db-peak">
        PK {{ formatDb(masterPeakDb()) }}
      </span>
    </div>
  </div>

  <!-- Master volume -->
  <div class="ctb-volume">
    <span class="material-symbols-outlined ctb-volume-icon">volume_up</span>
    <input
      type="range"
      min="0"
      max="100"
      step="1"
      [ngModel]="masterVolume()"
      (input)="updateMasterVolume($event)"
      class="ctb-volume-slider"
      [attr.aria-label]="'Master volume ' + masterVolume() + ' percent'"
    />
    <span class="ctb-volume-readout">{{ masterVolume() }}</span>
  </div>

  <!-- Pro: Ideas Generator trigger chip (one-tap 4-bar starter) -->
  <div class="ctb-group ctb-ideas-group">
    <button
      type="button"
      class="ctb-btn ctb-ideas"
      (click)="openIdeas()"
      [attr.aria-label]="'Open Ideas Generator — curated starter loops'"
      title="Ideas Generator — pick a starter kit"
    >
      <span class="material-symbols-outlined">auto_awesome</span>
      <span class="ctb-ideas-label">IDEAS</span>
    </button>
  </div>

  <!-- BPM dropdown menu -->
  <div class="ctb-dropdown glass-v42" *ngIf="showBpmDropdown()" role="dialog" aria-label="BPM presets">
    <button
      type="button"
      class="ctb-dropdown-close"
      (click)="showBpmDropdown.set(false)"
      aria-label="Close preset list"
    >
      <span class="material-symbols-outlined">close</span>
    </button>
    <p class="ctb-dropdown-title">BPM Presets</p>
    <div class="ctb-dropdown-grid">
      <button
        *ngFor="let bpm of bpmPresets"
        type="button"
        class="ctb-dropdown-item"
        [class.ctb-dropdown-item-active]="audioEngine.tempo() === bpm"
        (click)="setTempo(bpm)"
      >
        {{ bpm }}
      </button>
    </div>
    <button
      type="button"
      class="ctb-dropdown-action"
      (click)="showBpmDropdown.set(false); exportWav()"
    >
      <span class="material-symbols-outlined">download</span>
      Export WAV
    </button>
  </div>
</div>

<!-- ─────────────────────────────────────────────────────────────
     IDEAS GENERATOR MODAL — 6 curated genre starter loops
     ───────────────────────────────────────────────────────────── -->
<div class="ideas-modal-root" *ngIf="ideasOpen()" role="dialog" aria-label="Ideas generator">
  <div class="ideas-modal-backdrop" (click)="closeIdeas()"></div>
  <div class="ideas-modal-card">
    <button class="ideas-modal-close" type="button" (click)="closeIdeas()" aria-label="Close ideas generator">
      <span class="material-symbols-outlined">close</span>
    </button>
    <header class="ideas-modal-head">
      <span class="ideas-modal-glyph">✨</span>
      <h2 class="ideas-modal-title">Loop Starters</h2>
      <p class="ideas-modal-sub">
        One tap and you have a session-ready loop: curated chord progression,
        drum groove, and bassline. BPM-aware.
      </p>
    </header>

    <div class="ideas-modal-bento">
      <button
        *ngFor="let r of ideas.recipes"
        type="button"
        class="ideas-card"
        (click)="useRecipe(r)"
        [attr.aria-label]="'Generate ' + r.name + ' at ' + r.bpm + ' BPM'"
      >
        <span class="ideas-card-glyph">{{ r.glyph }}</span>
        <span class="ideas-card-name">{{ r.name }}</span>
        <span class="ideas-card-meta">{{ r.bpm }} BPM · {{ r.vibe }}</span>
        <span class="ideas-card-prog">
          <span class="ideas-card-prog-chip" *ngFor="let p of r.progression">{{ p }}</span>
        </span>
        <span class="ideas-card-cta">➕ Generate</span>
      </button>
    </div>
  </div>
</div>
