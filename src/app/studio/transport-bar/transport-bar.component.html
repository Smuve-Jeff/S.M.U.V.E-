<div class="transport-bar">
  <div class="flex items-center gap-2">
    <button (click)="togglePlay()" [class.active]="isPlaying()" class="transport-btn" title="Play/Pause">
      <i class="fas" [class.fa-play]="!isPlaying()" [class.fa-pause]="isPlaying()"></i>
    </button>
    <button (click)="stop()" class="transport-btn" title="Stop">
      <i class="fas fa-stop"></i>
    </button>
    <button (click)="toggleRecord()" [class.active]="isRecording()" class="transport-btn record-btn" title="Record">
      <i class="fas fa-circle text-[10px]"></i>
    </button>
  </div>

  <div class="display-section">
    <div class="display-item">
      <span class="display-label">TEMPO</span>
      <span class="display-value">120.00</span>
    </div>
    <div class="display-item">
      <span class="display-label">POSITION</span>
      <span class="display-value">1.1.1</span>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <div class="flex flex-col">
      <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">MASTER OUT</span>
      <input
        type="range"
        min="0"
        max="100"
        [value]="masterVolume()"
        (input)="updateMasterVolume($event)"
        class="w-24 accent-emerald-500 h-1"
      />
    </div>
  </div>
</div>
