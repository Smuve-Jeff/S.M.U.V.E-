<div class="transport-bar">
  <div class="flex items-center gap-2">
    <button (click)="togglePlay()" [class.active]="isPlaying()" class="transport-btn" title="Play/Pause">
      <i class="fas" [ngClass]="{'fa-play': !isPlaying(), 'fa-pause': isPlaying()}"></i>
    </button>
    <button (click)="stop()" class="transport-btn" title="Stop">
      <i class="fas fa-stop"></i>
    </button>
    <button (click)="toggleRecord()" [class.active]="isRecording()" class="transport-btn record-btn" title="Record">
      <i class="fas fa-circle text-[10px]"></i>
    </button>
  </div>

  <div class="display-section">
    <div class="display-item bpm-control">
      <span class="display-label">BPM</span>
      <div class="flex items-center gap-1">
        <button class="bpm-nudge" (click)="nudgeTempo(-1)" title="Decrease BPM">−</button>
        <input
          type="number"
          class="bpm-input"
          [value]="audioEngine.tempo()"
          (change)="onTempoInput($event)"
          min="20"
          max="300"
          title="BPM"
        />
        <button class="bpm-nudge" (click)="nudgeTempo(1)" title="Increase BPM">+</button>
      </div>
    </div>
    <div class="display-item">
      <span class="display-label">POSITION</span>
      <span class="display-value">{{ audioEngine.currentBeat() + 1 }}.1</span>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <div class="flex flex-col">
      <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">MASTER OUT</span>
      <input
        type="range"
        min="0"
        max="100"
        [value]="masterVolume()"
        (input)="updateMasterVolume($event)"
        class="w-24 accent-brand-primary h-1"
      />
    </div>
  </div>
</div>
