<div class="drum-machine-container glass-v42 retro-flicker">
  <!-- Top Control Bar -->
  <div class="drum-header wood-panel">
    <div class="header-branding">
      <div class="neon-text-sm">DRUM MACHINE v4.2</div>
      <div class="engine-status">ANALOG ENGINE ACTIVE</div>
    </div>

    <div class="kit-selector glass-v42">
      <label>DRUM KIT:</label>
      <select [ngModel]="selectedKitId()" (ngModelChange)="setKit($event)">
        <option *ngFor="let kit of availableKits()" [value]="kit.id">
          {{ kit.name | uppercase }}
        </option>
      </select>
    </div>

    <div class="quantum-engine-controls" *ngIf="hasQuantumDrumEngine()">
      <div class="ai-branding">QUANTUM ENGINE</div>
      <div class="ai-actions">
        <button (click)="generateAiPattern('trap')" class="ai-btn">TRAP</button>
        <button (click)="generateAiPattern('house')" class="ai-btn">HOUSE</button>
        <button (click)="generateAiPattern('afrobeat')" class="ai-btn">AFRO</button>
        <button (click)="generateAiPattern('techno')" class="ai-btn">TECHNO</button>
      </div>
    </div>

    <button (click)="clearPattern()" class="clear-btn">RESET</button>
  </div>

  <!-- Evolutionary Engine HUD -->
  <div class="evolution-hud glass-v42">
    <div class="hud-label">EVOLUTIONARY ENGINE</div>
    <div class="hud-controls">
      <label class="switch">
        <input type="checkbox" [ngModel]="evolutionEnabled()" (ngModelChange)="evolutionEnabled.set($event)">
        <span class="slider round"></span>
      </label>
      <div class="hud-param">
        <span>INTENSITY</span>
        <input type="range" min="0" max="1" step="0.01" [ngModel]="evolutionIntensity()" (ngModelChange)="evolutionIntensity.set($event)">
      </div>
      <div class="hud-param">
        <span>SPEED (STP)</span>
        <select [ngModel]="evolutionSpeed()" (ngModelChange)="evolutionSpeed.set($event)">
          <option [value]="4">4</option>
          <option [value]="8">8</option>
          <option [value]="16">16</option>
          <option [value]="32">32</option>
        </select>
      </div>
    </div>
  </div>

  <div class="drum-content">
    <!-- Left Pad Selection -->
    <div class="pads-sidebar no-scrollbar wood-panel">
      <div
        *ngFor="let pad of pads()"
        class="drum-pad-item glass-v42"
        [class.selected]="selectedPad()?.id === pad.id"
        (click)="selectPad(pad)"
      >
        <div class="pad-led-container">
          <div class="pad-led" [style.background-color]="pad.color" [class.glowing]="selectedPad()?.id === pad.id"></div>
        </div>
        <div class="pad-info">
          <span class="pad-name">{{ pad.name }}</span>
          <span class="pad-midi">MIDI {{ pad.midi }}</span>
        </div>
      </div>
    </div>

    <!-- Main Sequencer Grid -->
    <div class="sequencer-viewport no-scrollbar">
      <div class="scanline-overlay"></div>
      <div class="sequencer-grid">
        <div *ngFor="let pad of pads()" class="sequencer-row" [class.selected-row]="selectedPad()?.id === pad.id">
          <div
            *ngFor="let step of pad.steps; let sIdx = index"
            class="step-box"
            [class.active]="step.active"
            [class.current-step]="currentStep() === sIdx"
            [style.--step-color]="pad.color"
            (click)="toggleStep(pad, sIdx)"
          >
            <div class="step-indicator" *ngIf="step.active"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Param Inspector -->
    <div class="param-inspector glass-v42 no-scrollbar" *ngIf="selectedPad() as pad">
       <div class="inspector-title">PAD PARAMS</div>
       <div class="pad-preview-header" [style.border-color]="pad.color">
          <span class="neon-text-xs">{{ pad.name }}</span>
       </div>

       <div class="param-group">
          <label>PAN</label>
          <input type="range" min="-1" max="1" step="0.1" [(ngModel)]="pad.params.pan">
       </div>
       <div class="param-group">
          <label>DECAY</label>
          <input type="range" min="0.01" max="2" step="0.05" [(ngModel)]="pad.params.decay">
       </div>
       <div class="param-group">
          <label>VELOCITY</label>
          <div class="velocity-bars">
             <div *ngFor="let step of pad.steps; let i = index"
                  class="v-bar"
                  [class.v-active]="step.active"
                  [style.height.%]="step.velocity * 100"
                  (click)="step.velocity = (step.velocity + 0.2) % 1.2">
             </div>
          </div>
       </div>
    </div>
  </div>
</div>
