<div class="mixer-container p-6 h-full flex flex-col bg-slate-950/40">
  <div class="mixer-header flex items-center justify-between mb-6 border-b border-white/5 pb-4">
    <div class="flex items-center gap-3">
      <div class="p-2 bg-emerald-500/10 rounded-lg border border-emerald-500/20">
        <i class="fas fa-sliders-h text-emerald-500"></i>
      </div>
      <div>
        <h2 class="text-xs font-black uppercase tracking-[0.2em] text-emerald-500">Professional Console Mixer</h2>
        <div class="text-[9px] text-slate-500 font-mono mt-0.5">HIGH-FIDELITY ROUTING ENGINE</div>
      </div>
    </div>

    <div class="flex gap-4">
      <div class="flex flex-col items-end">
        <span class="text-[8px] font-bold text-slate-600 uppercase">Input Count</span>
        <span class="text-[10px] font-mono text-emerald-400">{{ micChannels().length }} ACTIVE</span>
      </div>
      <div class="h-6 w-px bg-white/10"></div>
      <div class="flex flex-col items-end">
        <span class="text-[8px] font-bold text-slate-600 uppercase">Master Peak</span>
        <span class="text-[10px] font-mono text-violet-400">-0.3 dB</span>
      </div>
    </div>
  </div>

  <div class="mixer-main flex gap-4 h-full overflow-hidden">
    <div class="channels-viewport flex-grow overflow-x-auto overflow-y-hidden flex gap-3 custom-scrollbar pb-2">
      <app-channel-strip *ngFor="let channel of micChannels()" [channel]="channel" class="flex-shrink-0"></app-channel-strip>
    </div>

    <!-- Master Fader Section -->
    <div class="master-fader-section w-32 flex flex-col bg-slate-900/40 rounded-2xl border border-violet-500/20 shadow-[0_0_20px_rgba(139,92,246,0.05)] p-4 ml-4">
      <div class="flex-grow flex justify-center py-4 relative">
        <!-- Scale markers -->
        <div class="absolute left-4 top-4 bottom-4 w-4 flex flex-col justify-between text-[8px] font-mono text-slate-600 pointer-events-none">
          <span>+6</span><span>0</span><span>-6</span><span>-12</span><span>-18</span><span>-30</span><span>-48</span><span>-inf</span>
        </div>

        <div class="fader-track w-10 bg-black/60 rounded-full flex justify-center py-2 border border-white/5 relative shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)]">
          <!-- Active Glow -->
          <div class="absolute bottom-2 left-1 right-1 bg-gradient-to-t from-violet-600 to-violet-400 rounded-full shadow-[0_0_15px_rgba(139,92,246,0.3)] opacity-40" [style.height.%]="masterVolume() * 100"></div>

          <input
            type="range"
            min="0"
            max="1"
            step="0.01"
            orient="vertical"
            [value]="masterVolume()"
            (input)="updateMasterVolume(+$event.target.value)"
            class="master-fader w-6 h-full appearance-none bg-transparent cursor-pointer z-10"
          >
        </div>
      </div>

      <div class="mt-4 text-center">
        <div class="text-[10px] font-black tracking-widest text-violet-500 uppercase mb-1">MASTER</div>
        <div class="text-[9px] font-mono text-slate-500">{{ (masterVolume() * 100).toFixed(0) }}%</div>
      </div>
    </div>
  </div>
</div>
