<div class="mixer-container glass-v42 flex flex-col h-full bg-slate-950 font-sans overflow-hidden">
  <!-- Top Tool Bar -->
  <div class="mixer-header wood-panel flex items-center justify-between p-2 border-b border-white/5 bg-black/40">
    <div class="flex items-center gap-3">
      <h3 class="text-[9px] font-black uppercase tracking-[0.2em] text-fl-blue neon-text">Elite Mixer</h3>
      <div class="h-3 w-[1px] bg-white/10"></div>
      <div class="flex bg-black/40 rounded p-0.5 border border-white/5">
        <button (click)="viewMode.set('compact')" [class.bg-fl-blue]="viewMode() === 'compact'" class="text-[7px] px-2 py-0.5 rounded transition-all font-black uppercase">Compact</button>
        <button (click)="viewMode.set('expanded')" [class.bg-fl-blue]="viewMode() === 'expanded'" class="text-[7px] px-2 py-0.5 rounded transition-all font-black uppercase">Channel Strip</button>
      </div>
    </div>
    <div class="flex items-center gap-2">
       <button class="m-btn tactile-v42 p-1 rounded-full bg-white/5 border border-white/10" (click)="audioSession.togglePlay()">
        <span class="material-symbols-outlined text-xs text-white">{{ audioSession.isPlaying() ? 'pause' : 'play_arrow' }}</span>
      </button>
    </div>
  </div>

  <!-- Strips Container -->
  <div class="flex-1 flex overflow-x-auto snap-x snap-mandatory no-scrollbar p-2 gap-2 bg-black/20">
    <!-- Channel Strips -->
    <div *ngFor="let track of tracks()"
         class="mixer-strip snap-start flex flex-col glass-v42 border border-white/5 rounded-xl transition-all min-w-[72px] md:min-w-[84px] relative"
         [class.selected-track]="isSelected(track)"
         (click)="selectTrack(track.id)">

      <!-- Meter & Pan -->
      <div class="p-2 space-y-2">
        <div class="flex justify-between items-center text-[7px] font-black opacity-50">
          <span>{{ track.id + 1 }}</span>
          <span class="truncate max-w-[40px]">{{ track.name }}</span>
        </div>

        <div class="h-24 bg-black/60 rounded-sm relative overflow-hidden flex items-end border border-white/5">
          <div class="vu-bar absolute inset-x-0 bottom-0 bg-gradient-to-t from-fl-blue via-fl-blue to-white transition-all duration-75 shadow-[0_0_10px_rgba(0,229,255,0.4)]"
               [style.height.%]="getTrackLevel(track.id) * 100"></div>
          <!-- Grids -->
          <div class="absolute inset-0 grid grid-rows-6 pointer-events-none">
            <div *ngFor="let i of [1,2,3,4,5,6]" class="border-t border-white/10 w-full"></div>
          </div>
        </div>

        <div class="pan-control flex flex-col items-center gap-1">
          <app-knob label="PAN" size="xs" [min]="-1" [max]="1" [value]="track.pan" (valueChange)="updateTrackParam(track.id, 'pan', $event)"></app-knob>
        </div>
      </div>

      <!-- Expanded Rack -->
      <div *ngIf="viewMode() === 'expanded'" class="rack-section px-2 py-2 border-y border-white/5 bg-black/40 space-y-3">
        <div class="grid grid-cols-2 gap-1">
           <app-knob label="HI" size="xs" [min]="0" [max]="1.5" [value]="1.0" (valueChange)="updateTrackParam(track.id, 'eq-hi', $event)"></app-knob>
           <app-knob label="LOW" size="xs" [min]="0" [max]="1.5" [value]="1.0" (valueChange)="updateTrackParam(track.id, 'eq-low', $event)"></app-knob>
        </div>
        <app-knob label="FILTER" size="xs" [min]="0" [max]="1" [value]="0.5" (valueChange)="updateTrackParam(track.id, 'filter', $event)"></app-knob>
      </div>

      <!-- Main Fader -->
      <div class="fader-track flex-1 flex flex-col items-center py-4 relative">
        <div class="fader-slot w-1 h-full bg-black/80 rounded-full border border-white/5 relative"></div>
        <input type="range" orient="vertical" min="0" max="150" [value]="gainPercent(track)"
               (input)="updateTrackVolume(track.id, $any($event.target).value)"
               class="mixer-fader-pro absolute inset-0 w-full h-full opacity-0 cursor-pointer touch-none">

        <div class="fader-cap absolute pointer-events-none transition-all duration-75"
             [style.bottom.%]="(gainPercent(track) / 150) * 85 + 5">
          <div class="w-6 h-1.5 bg-slate-300 rounded-sm shadow-xl border border-white/20"></div>
          <div class="w-full h-px bg-fl-blue mt-[2px] blur-[1px]"></div>
        </div>
      </div>

      <!-- Bottom Status -->
      <div class="p-2 bg-black/60 rounded-b-xl space-y-2">
        <div class="flex gap-1">
          <button (click)="toggleMute(track.id); $event.stopPropagation()"
                  class="flex-1 text-[6px] font-black uppercase py-1 rounded border border-white/10"
                  [class.bg-red-500/40]="track.mute">M</button>
          <button (click)="toggleSolo(track.id); $event.stopPropagation()"
                  class="flex-1 text-[6px] font-black uppercase py-1 rounded border border-white/10"
                  [class.bg-yellow-500/40]="track.solo">S</button>
        </div>
      </div>
    </div>

    <!-- Master Fader -->
    <div class="mixer-strip master-strip snap-end flex flex-col glass-v42 border-fl-blue/30 border rounded-xl min-w-[84px] bg-fl-blue/5">
      <div class="p-2 space-y-2">
        <div class="text-[8px] font-black text-fl-blue uppercase text-center tracking-widest">Master</div>
        <div class="h-24 bg-black/60 rounded-sm relative overflow-hidden flex items-end border border-fl-blue/20">
          <div class="vu-bar absolute inset-x-0 bottom-0 bg-fl-blue transition-all"
               [style.height.%]="(audioSession.masterVolume() / 150) * 100"></div>
        </div>
      </div>
      <div class="fader-track flex-1 flex flex-col items-center py-4 relative">
         <div class="fader-slot w-1.5 h-full bg-fl-blue/10 rounded-full"></div>
         <input type="range" orient="vertical" min="0" max="150" [value]="audioSession.masterVolume()"
                (input)="updateMasterVolume($any($event.target).value)"
                class="mixer-fader-pro absolute inset-0 w-full h-full opacity-0 cursor-pointer">
         <div class="fader-cap absolute pointer-events-none" [style.bottom.%]="(audioSession.masterVolume() / 150) * 85 + 5">
           <div class="w-8 h-2 bg-white rounded-sm shadow-[0_0_15px_rgba(0,229,255,0.5)]"></div>
         </div>
      </div>
      <div class="p-2">
         <button class="w-full py-1 text-[6px] font-black uppercase bg-fl-blue text-black rounded">Limit</button>
      </div>
    </div>
  </div>
</div>
