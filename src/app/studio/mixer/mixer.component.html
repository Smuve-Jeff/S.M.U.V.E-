<div class="mix-shell">
  <header class="mix-header" role="banner">
    <div class="mix-header-title">
      <span class="material-symbols-outlined">tune</span>
      <div>
        <h1>Console</h1>
        <p>Mixer</p>
      </div>
    </div>

    <div class="mix-segmented" role="group" aria-label="View mode">
      <button
        type="button"
        class="active"
        aria-pressed="true"
        title="Strips view"
      >Strips</button>
      <button
        type="button"
        title="Sends view"
        aria-pressed="false"
      >Sends</button>
      <button
        type="button"
        title="Routing view"
        aria-pressed="false"
      >Routing</button>
    </div>

    <button
      type="button"
      class="mix-ai-chip"
      (click)="applyNeuralMix()"
      [attr.aria-label]="'Apply AI Neural mix balancing'"
    >
      <span class="material-symbols-outlined">auto_awesome</span>
      AI Mix
    </button>
  </header>

  <div
    class="mix-strips"
    role="list"
    aria-label="Mixer channel strips"
  >
    <div class="mix-strips-track">
      <!-- Channel strips -->
      <div
        *ngFor="let track of tracks(); let i = index; trackBy: trackById"
        class="mix-strip"
        [class.mix-strip-selected]="isSelected(track.id)"
        role="listitem"
        (click)="selectTrack(track.id)"
        [attr.aria-label]="'Channel strip for ' + track.name + ', type ' + (track.type || 'midi')"
      >
        <div class="mix-strip-top">
          <div
            class="mix-strip-channel-bar"
            [style.background-color]="track.color || '#0E7C7B'"
          ></div>
          <div class="mix-strip-num">CH-{{ i + 1 }}</div>
          <div class="mix-strip-name">{{ track.name }}</div>
          <div class="mix-strip-type">{{ track.type }}</div>
        </div>

        <div class="mix-pan-wrap">
          <div class="mix-pan-label">Pan</div>
          <div
            class="mix-pan-track"
            (click)="onPanClick($event, track)"
            (pointerdown)="onPanPointerDown($event, track)"
            role="slider"
            tabindex="0"
            [attr.aria-label]="'Pan for ' + track.name"
            [attr.aria-valuemin]="-100"
            [attr.aria-valuemax]="100"
            [attr.aria-valuenow]="panPercent(track.id)"
          >
            <div
              class="mix-pan-grip"
              [style.left.%]="50 + (track.pan ?? 0) * 50"
            ></div>
          </div>
        </div>

        <div class="mix-meter" aria-hidden="true">
          <div
            class="mix-meter-bar"
            [style.transform]="'scaleY(' + getTrackLevel(track.id) + ')'"
          ></div>
          <div
            class="mix-meter-peak"
            [style.bottom.%]="getTrackPeakHold(track.id) * 100"
            [class.show]="getTrackPeakHold(track.id) > 0.01"
          ></div>
        </div>

        <div class="mix-strip-body">
          <div
            class="mix-fader-area"
            (pointerdown)="onFaderPointerDown($event, track.id)"
            role="slider"
            tabindex="0"
            [attr.aria-label]="'Volume for ' + track.name + ', current ' + gainPercent(track.id) + ' percent'"
            [attr.aria-valuemin]="0"
            [attr.aria-valuemax]="150"
            [attr.aria-valuenow]="gainPercent(track.id)"
          >
            <div class="mix-fader-rail" aria-hidden="true">
              <div class="mix-fader-tick" style="bottom: 53%"></div>
              <div class="mix-fader-tick zero" style="bottom: 66%"></div>
              <div class="mix-fader-tick" style="bottom: 80%"></div>
              <div class="mix-fader-tick" style="bottom: 100%"></div>
            </div>
            <div
              class="mix-fader-cap"
              [style.bottom.%]="faderBottomPct(track.id)"
            ></div>
          </div>
          <div class="mix-fader-readout">{{ gainPercent(track.id) }}</div>
        </div>

        <div class="mix-msr">
          <button
            type="button"
            class="mix-msr-btn"
            [class.on]="track.muted"
            [class.mute]="track.muted"
            (click)="toggleMute(track.id); $event.stopPropagation()"
            [attr.aria-pressed]="track.muted"
            [attr.aria-label]="'Mute ' + track.name"
          >M</button>
          <button
            type="button"
            class="mix-msr-btn"
            [class.on]="track.soloed"
            [class.solo]="track.soloed"
            (click)="toggleSolo(track.id); $event.stopPropagation()"
            [attr.aria-pressed]="track.soloed"
            [attr.aria-label]="'Solo ' + track.name"
          >S</button>
          <button
            type="button"
            class="mix-msr-btn"
            [class.on]="track.armed"
            [class.record]="track.armed"
            (click)="toggleArmTrack(track.id); $event.stopPropagation()"
            [attr.aria-pressed]="track.armed"
            [attr.aria-label]="
              (track.armed ? 'Disarm recording on ' : 'Arm recording on ') + track.name
            "
          >R</button>
        </div>

        <div class="mix-sends">
          <div class="mix-sends-row">
            <span class="mix-sends-label">SND A</span>
            <input
              type="range"
              class="mix-sends-slider"
              min="0"
              max="100"
              [ngModel]="(track.sendA ?? 0) * 100"
              (ngModelChange)="updateSend(track.id, 'A', $event); $event.stopPropagation()"
              (click)="$event.stopPropagation()"
              [attr.aria-label]="'Send A level on ' + track.name"
            />
            <span class="mix-sends-readout">{{ ((track.sendA ?? 0) * 100) | number:'1.0-0' }}</span>
          </div>
          <div class="mix-sends-row">
            <span class="mix-sends-label">SND B</span>
            <input
              type="range"
              class="mix-sends-slider"
              min="0"
              max="100"
              [ngModel]="(track.sendB ?? 0) * 100"
              (ngModelChange)="updateSend(track.id, 'B', $event); $event.stopPropagation()"
              (click)="$event.stopPropagation()"
              [attr.aria-label]="'Send B level on ' + track.name"
            />
            <span class="mix-sends-readout">{{ ((track.sendB ?? 0) * 100) | number:'1.0-0' }}</span>
          </div>
        </div>
      </div>

      <!-- Master strip -->
      <div
        class="mix-strip mix-strip-master"
        role="listitem"
        [attr.aria-label]="'Master output strip'"
      >
        <div class="mix-strip-top">
          <div class="mix-strip-num">MASTER</div>
          <div class="mix-strip-name">MAIN</div>
          <div class="mix-strip-type">SUM</div>
        </div>

        <div class="mix-meter" aria-hidden="true">
          <div class="mix-meter-bar" [style.transform]="'scaleY(' + masterLevel() + ')'"></div>
          <div
            class="mix-meter-peak"
            [style.bottom.%]="masterPeakHold() * 100"
            [class.show]="masterPeakHold() > 0.01"
          ></div>
        </div>

        <div class="mix-strip-body">
          <div
            class="mix-fader-area"
            (pointerdown)="onMasterFaderPointerDown($event)"
            role="slider"
            tabindex="0"
            [attr.aria-label]="'Master volume'"
            [attr.aria-valuemin]="0"
            [attr.aria-valuemax]="100"
            [attr.aria-valuenow]="masterVolume()"
          >
            <div class="mix-fader-rail" aria-hidden="true">
              <div class="mix-fader-tick" style="bottom: 53%"></div>
              <div class="mix-fader-tick zero" style="bottom: 66%"></div>
              <div class="mix-fader-tick" style="bottom: 80%"></div>
              <div class="mix-fader-tick" style="bottom: 100%"></div>
            </div>
            <div class="mix-fader-cap" [style.bottom.%]="masterFaderBottom()"></div>
          </div>
          <div class="mix-fader-readout">{{ masterVolume() }}</div>
        </div>

        <div class="mix-msr">
          <button
            type="button"
            class="mix-msr-btn"
            (click)="toggleMasterMute(); $event.stopPropagation()"
            [attr.aria-label]="'Mute master output'"
            [attr.aria-pressed]="masterMuted()"
          >M</button>
          <button
            type="button"
            class="mix-msr-btn"
            (click)="resetMaster(); $event.stopPropagation()"
            [attr.aria-label]="'Reset master to unity'"
          >0dB</button>
          <button
            type="button"
            class="mix-msr-btn"
            (click)="openSmartEq()"
            [attr.aria-label]="'Open AI smart EQ assistant'"
          >AI</button>
        </div>
      </div>
    </div>
  </div>
</div>
