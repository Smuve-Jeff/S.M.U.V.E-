<div class="mixer-container p-4 md:p-6 h-full flex flex-col bg-slate-950/40 overflow-hidden relative">
  <div class="mixer-header flex items-center justify-between mb-4 md:mb-6 border-b border-emerald-500/20 pb-2 md:pb-4">
    <div class="flex items-center gap-2 md:gap-3">
      <div class="p-1.5 md:p-2 bg-emerald-500/10 rounded-lg border border-emerald-500/20 shadow-[0_0_10px_rgba(16,185,129,0.2)]">
        <i class="fas fa-sliders-h text-emerald-500 text-xs md:text-sm"></i>
      </div>
      <div>
        <h2 class="text-[8px] md:text-xs font-black uppercase tracking-[0.2em] text-emerald-500 neon-text-emerald">Strategic Console Mixer</h2>
        <div class="text-[7px] md:text-[9px] text-slate-500 font-mono mt-0.5 tracking-tighter">HIGH-PRECISION ROUTING ENGINE</div>
      </div>
    </div>

    <div class="flex gap-2 md:gap-4">
      <div class="flex flex-col items-end">
        <span class="text-[6px] md:text-[8px] font-bold text-slate-600 uppercase">Signal Count</span>
        <span class="text-[8px] md:text-[10px] font-mono text-emerald-400 uppercase tracking-tighter">{{ tracks().length + micChannels().length }} ACTIVE</span>
      </div>
      <div class="h-4 md:h-6 w-px bg-white/10"></div>
      <div class="flex flex-col items-end">
        <span class="text-[6px] md:text-[8px] font-bold text-slate-600 uppercase">Master Peak</span>
        <span class="text-[8px] md:text-[10px] font-mono text-violet-400 tracking-tighter">-0.3 dB</span>
      </div>
    </div>
  </div>

  <div class="mixer-main flex gap-2 md:gap-4 h-full overflow-hidden">
    <div class="channels-viewport flex-grow overflow-x-auto overflow-y-hidden flex gap-2 md:gap-3 custom-scrollbar pb-2">
       <!-- Real Mic Channels -->
       <app-channel-strip *ngFor="let channel of micChannels()" [channel]="channel" class="flex-shrink-0"></app-channel-strip>

       <!-- Real Music Manager Tracks -->
       <div *ngFor="let track of tracks(); let i = index"
            class="flex-shrink-0 w-20 md:w-24 bg-slate-900/60 rounded-xl border border-white/5 p-2 flex flex-col items-center gap-3 commander-panel">
          <div class="text-[7px] md:text-[9px] font-black text-slate-500 uppercase tracking-widest">CH {{ i + micChannels().length + 1 | number:'2.0' }}</div>

          <div class="flex-grow w-1.5 bg-black/60 rounded-full relative shadow-inner">
             <!-- Static VU for now, fader thumb -->
             <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-emerald-600 to-emerald-400 rounded-full opacity-40" [style.height.%]="60 + (i*5) % 30"></div>
             <div class="absolute bottom-[70%] left-[-12px] right-[-12px] h-4 bg-slate-300 rounded-sm border-y border-slate-500 cursor-pointer shadow-xl hover:bg-white transition-colors"></div>
          </div>

          <div class="flex gap-1 w-full px-1">
             <button (click)="toggleMute(track.id)"
                     [class.bg-red-500]="track.mute"
                     [class.text-black]="track.mute"
                     class="flex-1 text-[6px] font-black uppercase py-1 rounded-sm border border-white/5 bg-slate-800 text-slate-400">M</button>
             <button (click)="toggleSolo(track.id)"
                     [class.bg-yellow-500]="track.solo"
                     [class.text-black]="track.solo"
                     class="flex-1 text-[6px] font-black uppercase py-1 rounded-sm border border-white/5 bg-slate-800 text-slate-400">S</button>
          </div>

          <div class="text-[6px] md:text-[8px] font-mono text-emerald-500 truncate w-full text-center">{{ track.name }}</div>
       </div>
    </div>

    <!-- Master Fader Section -->
    <div class="master-fader-section w-20 md:w-32 flex flex-col bg-slate-900/60 rounded-2xl border border-violet-500/20 shadow-[0_0_20px_rgba(139,92,246,0.1)] p-2 md:p-4 ml-1 md:ml-4 commander-panel">
      <div class="flex-grow flex justify-center py-2 md:py-4 relative">
        <!-- Scale markers -->
        <div class="absolute left-1 md:left-4 top-2 bottom-2 w-4 flex flex-col justify-between text-[6px] md:text-[8px] font-mono text-slate-600 pointer-events-none">
          <span>+6</span><span>0</span><span>-6</span><span>-12</span><span>-inf</span>
        </div>

        <div class="fader-track w-8 md:w-10 bg-black/60 rounded-full flex justify-center py-2 border border-white/5 relative shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)]">
          <div class="absolute bottom-2 left-1 right-1 bg-gradient-to-t from-violet-600 to-violet-400 rounded-full shadow-[0_0_15px_rgba(139,92,246,0.3)] opacity-40" [style.height.%]="masterVolume()"></div>

          <input
            type="range"
            min="0"
            max="100"
            step="1"
            orient="vertical"
            [value]="masterVolume()"
            (input)="updateMasterVolume(+($event.target).value)"
            class="master-fader w-6 h-full appearance-none bg-transparent cursor-pointer z-10"
          >
        </div>
      </div>

      <div class="mt-2 md:mt-4 text-center">
        <div class="text-[7px] md:text-xs font-black tracking-widest text-violet-500 uppercase mb-0.5 md:mb-1">MASTER</div>
        <div class="text-[7px] md:text-[9px] font-mono text-slate-400">{{ (masterVolume()).toFixed(0) }}%</div>
      </div>
    </div>
  </div>
</div>
