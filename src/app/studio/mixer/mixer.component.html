<div class="h-full flex bg-[#121212]/80 backdrop-blur-3xl overflow-x-auto custom-scrollbar animate-fade-in film-grain">
  <!-- Mic Channels -->
  <div *ngFor="let channel of micChannels()" class="w-32 shrink-0 border-r-4 border-industrial-steel flex flex-col items-center py-8 relative group hover:bg-danger-orange/5 transition-all">
     <div class="mb-6 transform -rotate-90 origin-center whitespace-nowrap">
      <span class="text-[11px] font-black uppercase tracking-[0.3em] text-danger-orange italic group-hover:drop-shadow-[0_0_8px_#f48525]">MIC_{{ channel.id }}</span>
    </div>
    <div class="flex-grow w-4 bg-black/60 rounded-full border-2 border-industrial-steel overflow-hidden relative mb-8 shadow-inner">
       <div class="absolute bottom-0 w-full bg-danger-orange shadow-[0_0_15px_#f48525]" [style.height.%]="85"></div>
    </div>
    <div class="h-56 w-10 relative flex flex-col items-center mb-8">
       <div class="absolute h-full w-1 bg-industrial-steel rounded-full"></div>
       <input type="range"
              class="appearance-none vertical-slider-industrial w-56 -rotate-90 bg-transparent cursor-pointer z-10">
    </div>
  </div>

  <!-- Music Tracks -->
  <div *ngFor="let track of tracks(); let i = index"
       class="w-32 shrink-0 border-r-4 border-industrial-steel flex flex-col items-center py-8 relative group hover:bg-danger-orange/5 transition-all">

    <div class="mb-6 transform -rotate-90 origin-center whitespace-nowrap">
      <span class="text-[11px] font-black uppercase tracking-[0.3em] text-white/60 group-hover:text-danger-orange transition-colors italic">{{ track.name }}</span>
    </div>

    <!-- Rugged Gain Knob -->
    <div class="mb-10 flex flex-col items-center gap-2">
      <div class="size-14 rounded-full border-4 border-industrial-steel flex items-center justify-center relative overflow-hidden bg-[#1a1a1a] shadow-2xl">
         <div class="absolute top-2 left-1/2 -translate-x-1/2 w-1 h-4 bg-danger-orange rounded-full shadow-[0_0_10px_#f48525]" [style.transform]="'rotate(' + (track.volume * 240 - 120) + 'deg)'"></div>
         <input type="range"
                [value]="track.volume"
                (input)="setVolume(track, $any($event.target).value)"
                min="0" max="1" step="0.01"
                class="absolute inset-0 opacity-0 cursor-pointer">
      </div>
      <span class="text-[8px] font-black text-white/30 uppercase tracking-widest">DRIVE</span>
    </div>

    <!-- Industrial VU Meter -->
    <div class="flex-grow w-4 bg-black rounded-full border-2 border-industrial-steel overflow-hidden relative mb-8 shadow-[inset_0_0_15px_rgba(0,0,0,1)]">
       <div class="absolute bottom-0 w-full bg-gradient-to-t from-danger-orange via-danger-orange to-white shadow-[0_0_20px_#f48525]" [style.height.%]="80"></div>
    </div>

    <!-- Heavy Duty Fader -->
    <div class="h-56 w-12 relative flex flex-col items-center mb-8">
       <div class="absolute h-full w-1.5 bg-black border border-industrial-steel rounded-full"></div>
       <input type="range"
              [value]="track.volume"
              (input)="setVolume(track, $any($event.target).value)"
              min="0" max="1.5" step="0.01"
              class="appearance-none vertical-slider-industrial w-56 -rotate-90 bg-transparent cursor-pointer z-10">
    </div>

    <div class="flex flex-col gap-4">
       <button (click)="toggleMute(track)"
               [class.bg-red-900]="track.muted"
               [class.text-white]="track.muted"
               class="size-10 rounded-xl border-2 border-industrial-steel flex items-center justify-center text-xs font-black hover:border-red-600 transition-all bg-black/40 shadow-xl">M</button>
       <button (click)="toggleSolo(track)"
               [class.bg-danger-orange]="track.solo"
               [class.text-black]="track.solo"
               class="size-10 rounded-xl border-2 border-industrial-steel flex items-center justify-center text-xs font-black hover:border-danger-orange transition-all bg-black/40 shadow-xl">S</button>
    </div>
  </div>

  <!-- Industrial Master Out -->
  <div class="w-40 shrink-0 bg-danger-orange/5 border-l-8 border-industrial-steel flex flex-col items-center py-8 relative overflow-hidden wood-edge shadow-[0_0_60px_rgba(0,0,0,1)]">
    <div class="absolute inset-0 scanline opacity-10 pointer-events-none"></div>
    <div class="mb-10 transform -rotate-90 origin-center whitespace-nowrap">
      <span class="text-lg font-black uppercase tracking-[0.5em] text-danger-orange italic drop-shadow-[0_0_15px_#f48525]">MASTER_OUT</span>
    </div>

    <div class="flex-grow w-8 flex gap-2 items-end mb-10">
       <div class="w-3 bg-black rounded-full h-full relative overflow-hidden border-2 border-industrial-steel shadow-inner">
          <div class="absolute bottom-0 w-full bg-danger-orange" [style.height.%]="85"></div>
       </div>
       <div class="w-3 bg-black rounded-full h-full relative overflow-hidden border-2 border-industrial-steel shadow-inner">
          <div class="absolute bottom-0 w-full bg-danger-orange" [style.height.%]="82"></div>
       </div>
    </div>

    <div class="h-56 w-14 relative flex flex-col items-center mb-10">
       <div class="absolute h-full w-2 bg-black border-2 border-industrial-steel rounded-full shadow-inner"></div>
       <input type="range"
              class="appearance-none vertical-slider-industrial master-fader-industrial w-56 -rotate-90 bg-transparent cursor-pointer z-10 h-1">
    </div>

    <div class="size-16 rounded-3xl bg-danger-orange text-black flex items-center justify-center shadow-[0_0_30px_rgba(244,133,37,0.4)] hover:scale-110 transition-all border-4 border-black cursor-pointer">
       <span class="material-symbols-outlined text-4xl">settings_input_component</span>
    </div>
  </div>
</div>

<style>
  .vertical-slider-industrial {
    -webkit-appearance: none;
    position: absolute;
    top: 50%;
  }
  .vertical-slider-industrial::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 40px;
    width: 60px;
    background: #2d2d2d;
    border: 3px solid #f48525;
    border-radius: 8px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.8);
    cursor: grab;
  }
  .master-fader-industrial::-webkit-slider-thumb {
    background: #f48525;
    border-color: #fff;
    height: 50px;
    width: 80px;
  }
</style>
