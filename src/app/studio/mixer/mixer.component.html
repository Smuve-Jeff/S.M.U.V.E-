<div class="h-full flex flex-col bg-brand-dark p-6 overflow-hidden">
  <header class="flex items-center justify-between mb-8 border-b border-white/5 pb-6">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 rounded-xl bg-brand-primary/10 border border-brand-primary/20 flex items-center justify-center text-brand-primary">
        <i class="fas fa-sliders"></i>
      </div>
      <div>
        <h2 class="text-sm font-black text-white uppercase tracking-[0.2em]">Console Mixer</h2>
        <p class="text-[9px] font-bold text-silver-dim uppercase tracking-widest">High-Fidelity Routing Environment</p>
      </div>
    </div>

    <div class="flex items-center gap-6">
       <div class="flex flex-col items-end">
          <span class="text-[8px] font-black text-silver-dim uppercase tracking-widest">Active Channels</span>
          <span class="text-xs font-bold text-brand-primary">{{ tracks().length + micChannels().length }} ACTIVE</span>
       </div>
       <div class="h-8 w-px bg-white/10"></div>
       <div class="flex flex-col items-end">
          <span class="text-[8px] font-black text-silver-dim uppercase tracking-widest">Master Peak</span>
          <span class="text-xs font-bold text-brand-accent">-0.2 dB</span>
       </div>
    </div>
  </header>

  <div class="flex-grow flex gap-4 overflow-hidden">
    <div class="flex-grow flex gap-3 overflow-x-auto custom-scrollbar pb-4">
       <!-- MICROPHONE INPUTS -->
       <app-channel-strip *ngFor="let channel of micChannels()" [channel]="channel" class="flex-shrink-0"></app-channel-strip>

       <!-- TRACK CHANNELS -->
       <div *ngFor="let track of tracks(); let i = index"
            class="flex-shrink-0 w-24 glass-panel rounded-2xl p-3 flex flex-col items-center gap-4 group hover:border-brand-primary/20 transition-all">
          <div class="text-[8px] font-black text-silver-dim uppercase tracking-widest">CH {{ i + micChannels().length + 1 | number:'2.0' }}</div>

          <div class="flex-grow w-2 bg-black/40 rounded-full relative shadow-inner overflow-hidden border border-white/5">
             <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-brand-primary/60 to-brand-primary/20 transition-all duration-300" [style.height.%]="60 + (i*7) % 30"></div>
             <div class="absolute bottom-[70%] left-[-8px] right-[-8px] h-3 bg-white rounded shadow-lg"></div>
          </div>

          <div class="flex gap-1.5 w-full">
             <button (click)="toggleMute(track.id)"
                     class="flex-1 py-1.5 rounded-lg text-[8px] font-black uppercase transition-all"
                     [class.bg-brand-danger]="track.mute"
                     [class.text-black]="track.mute"
                     [class.bg-white/5]="!track.mute"
                     [class.text-silver-dim]="!track.mute">M</button>
             <button (click)="toggleSolo(track.id)"
                     class="flex-1 py-1.5 rounded-lg text-[8px] font-black uppercase transition-all"
                     [class.bg-brand-warning]="track.solo"
                     [class.text-black]="track.solo"
                     [class.bg-white/5]="!track.solo"
                     [class.text-silver-dim]="!track.solo">S</button>
          </div>

          <div class="text-[9px] font-bold text-white truncate w-full text-center">{{ track.name }}</div>
       </div>
    </div>

    <!-- MASTER CHANNEL -->
    <div class="w-32 bg-brand-surface/40 rounded-3xl border border-brand-accent/20 p-4 flex flex-col items-center gap-6 shadow-2xl">
       <div class="flex-grow w-3 bg-black/60 rounded-full relative shadow-inner border border-white/5 overflow-hidden">
          <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-brand-accent/60 to-brand-accent/20 transition-all" [style.height.%]="masterVolume()"></div>
          <input type="range" min="0" max="100" step="1" orient="vertical" [value]="masterVolume()"
                 (input)="updateMasterVolume(+($any($event.target).value))"
                 class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
          <div class="absolute w-8 h-4 bg-white rounded-lg shadow-xl pointer-events-none -ml-2.5"
               [style.bottom.%]="masterVolume() - 5"></div>
       </div>

       <div class="text-center">
          <span class="text-[10px] font-black text-brand-accent uppercase tracking-widest block mb-1">Master</span>
          <span class="text-xs font-mono text-silver-dim">{{ masterVolume().toFixed(0) }}%</span>
       </div>
    </div>
  </div>
</div>
