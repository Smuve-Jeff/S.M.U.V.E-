<div class="mixer-container no-scrollbar">
  <!-- Audio Tracks -->
  <div
    *ngFor="let track of tracks(); let i = index"
    class="mixer-strip"
    [class.selected]="musicManager.selectedTrackId() === track.id"
  >
    <div class="track-label">{{ track.name }}</div>

    <div class="vu-meter-container">
      <div class="vu-meter-fill" [style.height.%]="20 + ((i * 15) % 60)"></div>
    </div>

    <div class="pan-knob"></div>

    <div class="fader-container">
      <div class="fader-track"></div>
      <div class="fader-cap" [style.bottom.%]="track.gain * 0.8"></div>
      <input
        type="range"
        min="0"
        max="100"
        step="1"
        [value]="track.gain"
        (input)="updateTrackVolume(track.id, +$any($event.target).value)"
      />
    </div>

    <div class="mini-controls">
      <button
        class="mini-btn"
        [class.active-solo]="track.solo"
        (click)="toggleSolo(track.id)"
      >
        S
      </button>
      <button
        class="mini-btn"
        [class.active-mute]="track.mute"
        (click)="toggleMute(track.id)"
      >
        M
      </button>
    </div>
  </div>

  <!-- Master Strip -->
  <div class="mixer-strip master">
    <div class="track-label">MASTER</div>

    <div
      class="vu-meter-container"
      style="width: 40px; display: flex; gap: 2px; padding: 2px"
    >
      <div
        class="vu-meter-fill"
        style="flex: 1; position: relative"
        [style.height.%]="masterVolume() * 0.9"
      ></div>
      <div
        class="vu-meter-fill"
        style="flex: 1; position: relative"
        [style.height.%]="masterVolume() * 0.85"
      ></div>
    </div>

    <div class="pan-knob" style="opacity: 0.3"></div>

    <div class="fader-container">
      <div class="fader-track" style="width: 6px"></div>
      <div
        class="fader-cap"
        style="width: 40px; background: #333"
        [style.bottom.%]="masterVolume() * 0.8"
      ></div>
      <input
        type="range"
        min="0"
        max="100"
        step="1"
        [value]="masterVolume()"
        (input)="updateMasterVolume(+$any($event.target).value)"
      />
    </div>

    <div class="track-label" style="color: var(--fl-blue)">
      {{ masterVolume().toFixed(0) }}%
    </div>
  </div>
</div>
