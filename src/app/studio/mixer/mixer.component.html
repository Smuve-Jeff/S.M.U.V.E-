<div class="mixer-container glass-v42-pro flex flex-col h-full overflow-hidden">
  <!-- Mixer Header -->
  <div class="mixer-header flex items-center justify-between p-3 border-b border-white/10 bg-black/40">
    <div class="flex items-center gap-4">
      <h2 class="text-xs font-black tracking-widest text-slate-400 uppercase flex items-center gap-2">
        <span class="material-symbols-outlined text-sm">tune</span>
        Console_Mixer_v4.2
      </h2>
      <div class="h-4 w-px bg-white/10"></div>
      <div class="flex gap-2">
        <button class="text-[10px] font-bold px-2 py-1 rounded bg-white/5 hover:bg-white/10 text-slate-300">MASTER</button>
        <button class="text-[10px] font-bold px-2 py-1 rounded bg-white/5 hover:bg-white/10 text-slate-300">INSERTS</button>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button class="icon-btn mini" (click)="toggleMixerWidth()">
        <span class="material-symbols-outlined text-sm">unfold_more</span>
      </button>
    </div>
  </div>

  <!-- Strips Container -->
  <div class="flex-1 flex overflow-x-auto snap-x snap-mandatory no-scrollbar p-2 gap-2 bg-black/20">
    <!-- Channel Strips -->
    <div *ngFor="let track of tracks(); let i = index"
         class="mixer-strip holographic-glimmer snap-start flex flex-col fl-strip transition-all min-w-[72px] md:min-w-[84px] relative"
         [class.selected-track]="isSelected(track)"
         (click)="selectTrack(track.id)">

      <!-- Top Label & Index -->
      <div class="p-2 border-b border-white/5 bg-black/40 text-center">
         <div class="text-[6px] font-black text-slate-500 uppercase">CH-{{ i + 1 }}</div>
         <div class="text-[8px] font-black text-white truncate uppercase">{{ track.name }}</div>
      </div>

      <!-- Meter & Pan -->
      <div class="p-2 space-y-2 flex-1 flex flex-col">
        <div class="vu-meter-container flex-1 bg-black/60 rounded-sm relative overflow-hidden flex items-end border border-white/5">
           <!-- Signal Meter Fill -->
           <div class="w-full bg-gradient-to-t from-green-500 via-yellow-400 to-red-500 opacity-80"
                [style.height.%]="getTrackLevel(track.id) * 100"></div>
           <!-- Peak Indicator -->
           <div class="absolute top-0 left-0 right-0 h-0.5 bg-red-500 shadow-[0_0_8px_red]"
                *ngIf="isPeaking(track.id)"></div>
        </div>

        <div class="pan-control flex flex-col items-center gap-1">
           <div class="text-[6px] text-slate-500 font-bold">PAN</div>
           <div class="w-full h-1 bg-white/5 rounded-full relative">
              <div class="absolute top-0 h-full w-1 bg-white shadow-[0_0_4px_white]"
                   [style.left.%]="50 + (track.pan * 50)"></div>
           </div>
        </div>
      </div>

      <!-- Fader Section -->
      <div class="p-2 pt-0 pb-4 flex flex-col items-center gap-3">
         <div class="h-40 w-8 bg-black/40 rounded-sm relative flex flex-col items-center p-1 border border-white/5">
            <!-- Fader Track -->
            <div class="absolute inset-y-4 w-0.5 bg-white/5"></div>
            <!-- Fader Handle -->
            <div class="w-6 h-3 bg-slate-300 rounded-sm shadow-lg cursor-pointer absolute z-10 hover:bg-white transition-colors"
                 [style.bottom.%]="track.volume * 100"
                 (pointerdown)="startFaderDrag($event, track)">
            </div>
         </div>
         <div class="text-[8px] font-mono text-slate-400">{{ (track.volume * 100) | number:'1.0-0' }}%</div>
      </div>

      <!-- Controls -->
      <div class="p-2 grid grid-cols-2 gap-1 border-t border-white/5">
         <button class="w-full py-1 rounded-[2px] text-[8px] font-black transition-all"
                 [class.bg-orange-500]="track.muted" [class.text-white]="track.muted"
                 [class.bg-white/5]="!track.muted" [class.text-slate-500]="!track.muted"
                 (click)="toggleMute(track); $event.stopPropagation()">M</button>
         <button class="w-full py-1 rounded-[2px] text-[8px] font-black transition-all"
                 [class.bg-yellow-400]="track.soloed" [class.text-black]="track.soloed"
                 [class.bg-white/5]="!track.soloed" [class.text-slate-500]="!track.soloed"
                 (click)="toggleSolo(track); $event.stopPropagation()">S</button>
      </div>
    </div>
  </div>
</div>
