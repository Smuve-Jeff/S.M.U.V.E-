<div
  class="mixer-container glass-v42 shadow-v42-xl"
  [class.compact]="viewMode() === 'compact'"
>
  <div class="mixer-header wood-panel">
    <div class="neon-text-sm">ANALOG MIXER v4.2</div>
    <div class="mixer-global-actions">
      <button (click)="applyNeuralMix()" class="executive-glass extreme-glow">
        NEURAL MIX
      </button>
      <button (click)="toggleViewMode()" class="executive-glass">MODE</button>
    </div>
  </div>

  <div class="mixer-tracks no-scrollbar">
    <div
      *ngFor="let track of tracks()"
      class="mixer-strip glass-v42"
      [class.selected]="isSelected(track)"
      (click)="selectTrack(track.id)"
    >
      <div class="strip-top">
        <div class="track-index neon-accent-secondary">{{ track.id }}</div>
        <div class="track-label">{{ track.name | uppercase }}</div>
      </div>

      <div class="strip-body">
        <div class="v-slider-container">
          <input
            type="range"
            orient="vertical"
            class="hud-slider-vertical"
            [value]="gainPercent(track)"
            (input)="updateTrackVolume(track.id, $any($event.target).value)"
          />
        </div>

        <div class="vu-meter">
          <div class="vu-fill" [style.height.%]="track.mute ? 0 : 45"></div>
        </div>
      </div>

      <div class="strip-bottom wood-panel">
        <div class="pan-control">
          <input
            type="range"
            min="-100"
            max="100"
            class="knob-range"
            [value]="panPercent(track)"
            (input)="updateTrackPan(track.id, $any($event.target).value)"
          />
        </div>
        <div class="strip-buttons">
          <button
            [class.active-mute]="track.mute"
            (click)="toggleMute(track.id)"
          >
            M
          </button>
          <button
            [class.active-solo]="track.solo"
            (click)="toggleSolo(track.id)"
          >
            S
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Master Bus -->
  <div class="master-bus wood-panel shadow-v42-xl">
    <div class="neon-text-xs">MASTER</div>
    <div class="v-slider-container">
      <input
        type="range"
        orient="vertical"
        class="hud-slider-vertical"
        [value]="masterVolume()"
        (input)="updateMasterVolume($any($event.target).value)"
      />
    </div>
  </div>
</div>
