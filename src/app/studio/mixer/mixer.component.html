<div class="mixer-container p-4 md:p-6 h-full flex flex-col bg-slate-950/40 overflow-hidden">
  <div class="mixer-header flex items-center justify-between mb-4 md:mb-6 border-b border-white/5 pb-2 md:pb-4">
    <div class="flex items-center gap-2 md:gap-3">
      <div class="p-1.5 md:p-2 bg-emerald-500/10 rounded-lg border border-emerald-500/20">
        <i class="fas fa-sliders-h text-emerald-500 text-xs md:text-sm"></i>
      </div>
      <div>
        <h2 class="text-[8px] md:text-xs font-black uppercase tracking-[0.2em] text-emerald-500">Professional Console Mixer</h2>
        <div class="text-[7px] md:text-[9px] text-slate-500 font-mono mt-0.5">HIGH-FIDELITY ROUTING ENGINE</div>
      </div>
    </div>

    <div class="flex gap-2 md:gap-4">
      <div class="flex flex-col items-end">
        <span class="text-[6px] md:text-[8px] font-bold text-slate-600 uppercase">Input Count</span>
        <span class="text-[8px] md:text-[10px] font-mono text-emerald-400 uppercase tracking-tighter">ACTIVE</span>
      </div>
      <div class="h-4 md:h-6 w-px bg-white/10"></div>
      <div class="flex flex-col items-end">
        <span class="text-[6px] md:text-[8px] font-bold text-slate-600 uppercase">Master Peak</span>
        <span class="text-[8px] md:text-[10px] font-mono text-violet-400 tracking-tighter">-0.3 dB</span>
      </div>
    </div>
  </div>

  <div class="mixer-main flex gap-2 md:gap-4 h-full overflow-hidden">
    <div class="channels-viewport flex-grow overflow-x-auto overflow-y-hidden flex gap-2 md:gap-3 custom-scrollbar pb-2">
       <app-channel-strip *ngFor="let channel of micChannels()" [channel]="channel" class="flex-shrink-0"></app-channel-strip>

       <!-- Mock tracks from MusicManagerService in addition to micChannels -->
       <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="flex-shrink-0 w-16 md:w-20 bg-slate-900/40 rounded-xl border border-white/5 p-2 flex flex-col items-center gap-4">
          <div class="text-[7px] md:text-[9px] font-black text-slate-600 uppercase">CH 0{{i}}</div>
          <div class="flex-grow w-1 bg-black/40 rounded-full relative">
             <div class="absolute bottom-0 left-0 right-0 bg-emerald-500/40 rounded-full" [style.height.%]="60 + (i*5) % 30"></div>
             <div class="absolute bottom-[60%] left-[-10px] right-[-10px] h-4 bg-slate-300 rounded-sm border border-slate-500 cursor-pointer shadow-lg"></div>
          </div>
          <div class="text-[6px] md:text-[8px] font-mono text-slate-500">TRK {{i}}</div>
       </div>
    </div>

    <!-- Master Fader Section -->
    <div class="master-fader-section w-20 md:w-32 flex flex-col bg-slate-900/40 rounded-2xl border border-violet-500/20 shadow-[0_0_20px_rgba(139,92,246,0.05)] p-2 md:p-4 ml-1 md:ml-4">
      <div class="flex-grow flex justify-center py-2 md:py-4 relative">
        <!-- Scale markers -->
        <div class="absolute left-1 md:left-4 top-2 bottom-2 w-4 flex flex-col justify-between text-[6px] md:text-[8px] font-mono text-slate-600 pointer-events-none">
          <span>+6</span><span>0</span><span>-6</span><span>-12</span><span>-inf</span>
        </div>

        <div class="fader-track w-8 md:w-10 bg-black/60 rounded-full flex justify-center py-2 border border-white/5 relative shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)]">
          <div class="absolute bottom-2 left-1 right-1 bg-gradient-to-t from-violet-600 to-violet-400 rounded-full shadow-[0_0_15px_rgba(139,92,246,0.3)] opacity-40" [style.height.%]="masterVolume() * 100"></div>

          <input
            type="range"
            min="0"
            max="1"
            step="0.01"
            orient="vertical"
            [value]="masterVolume()"
            (input)="updateMasterVolume(+$any($event.target).value)"
            class="master-fader w-6 h-full appearance-none bg-transparent cursor-pointer z-10"
          >
        </div>
      </div>

      <div class="mt-2 md:mt-4 text-center">
        <div class="text-[7px] md:text-[10px] font-black tracking-widest text-violet-500 uppercase mb-0.5 md:mb-1">MASTER</div>
        <div class="text-[7px] md:text-[9px] font-mono text-slate-500">{{ (masterVolume() * 100).toFixed(0) }}%</div>
      </div>
    </div>
  </div>
</div>
