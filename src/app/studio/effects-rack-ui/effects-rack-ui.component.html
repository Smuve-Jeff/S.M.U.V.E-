<div class="effects-rack-container glass-v42 h-full flex flex-col p-4 w-full md:w-64 shadow-2xl overflow-hidden">
  <div class="effects-header flex items-center justify-between mb-6">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-fl-blue text-sm">blur_on</span>
      <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Effects Chain</h3>
    </div>
    <div class="track-info" *ngIf="selectedTrack() as track">
       <span class="text-[7px] font-black text-slate-600 uppercase">{{ track.name }}</span>
    </div>
  </div>

  <div class="slots-container flex-1 flex flex-col gap-2 overflow-y-auto no-scrollbar">
    <div *ngFor="let slot of fxSlots(); let i = index" class="slot-item group" (click)="activeSlot.set(i + 1)">
      <div class="slot-header flex items-center justify-between bg-black/40 border border-white/5 rounded-xl px-3 py-2.5 hover:border-fl-blue/30 transition-all cursor-pointer"
           [class.active-slot-ui]="activeSlot() === i + 1">
        <div class="flex items-center gap-3">
          <div class="w-1.5 h-1.5 rounded-full"
               [class.bg-fl-blue]="slot.enabled"
               [class.bg-slate-700]="!slot.enabled"></div>
          <span class="text-[9px] font-black uppercase tracking-widest"
                [class.text-white]="slot.enabled"
                [class.text-slate-500]="!slot.enabled">{{ slot.type }}</span>
        </div>
        <div class="flex items-center gap-2">
          <button class="tactile-v42 p-1" (click)="toggleFx(slot.id); $event.stopPropagation()">
             <span class="material-symbols-outlined text-[10px]" [class.text-fl-blue]="slot.enabled">power_settings_new</span>
          </button>
        </div>
      </div>
    </div>

    <button class="w-full py-3 border border-dashed border-white/10 rounded-xl text-[8px] font-black text-slate-600 hover:text-fl-blue hover:border-fl-blue transition-all">
       + ADD EFFECT
    </button>
  </div>

  <div class="mt-auto pt-6 border-t border-white/5">
    <div class="bg-black/40 rounded-2xl border border-white/5 p-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-[8px] font-black uppercase tracking-widest text-slate-500">Master Dry/Wet</span>
        <span class="text-[9px] font-mono text-fl-blue">100%</span>
      </div>
      <div class="h-1.5 w-full bg-black rounded-full relative overflow-hidden">
        <div class="absolute inset-y-0 left-0 bg-fl-blue w-full shadow-[0_0_10px_#00e5ff]"></div>
      </div>
    </div>
  </div>
</div>
