<div class="effects-rack-container bg-slate-900 border-l border-white/5 h-full flex flex-col p-4 w-64 shadow-2xl">
  <div class="effects-header flex items-center justify-between mb-6">
    <div class="flex items-center gap-2">
      <i class="fas fa-layer-group text-violet-500 text-[10px]"></i>
      <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Effects Chain</h3>
    </div>
    <div class="h-1 w-8 bg-violet-500/30 rounded-full"></div>
  </div>

  <div class="slots-container flex-grow flex flex-col gap-2">
    <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="slot-item group">
      <div class="slot-header flex items-center justify-between bg-black/40 border border-white/5 rounded-xl px-3 py-2.5 hover:border-violet-500/50 transition-all cursor-pointer">
        <div class="flex items-center gap-3">
          <div class="w-1.5 h-1.5 rounded-full" [class.bg-violet-500]="activeSlot === i" [class.bg-slate-800]="activeSlot !== i"></div>
          <span class="text-[9px] font-black uppercase tracking-widest text-slate-500 group-hover:text-slate-300">Slot {{ i }}</span>
        </div>
        <div class="flex items-center gap-2">
           <i class="fas fa-power-off text-[8px] text-slate-700 group-hover:text-violet-500"></i>
           <i class="fas fa-caret-down text-[8px] text-slate-700"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-auto pt-6 border-t border-white/5">
    <div class="bg-violet-500/5 rounded-2xl border border-violet-500/10 p-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-[8px] font-black uppercase tracking-widest text-violet-400">Master Dry/Wet</span>
        <span class="text-[9px] font-mono text-violet-500/80">100%</span>
      </div>
      <div class="h-1.5 w-full bg-slate-800 rounded-full relative overflow-hidden">
        <div class="absolute inset-y-0 left-0 bg-violet-500 w-full shadow-[0_0_10px_#8b5cf6]"></div>
      </div>
    </div>
  </div>
</div>
