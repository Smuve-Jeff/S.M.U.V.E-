<div class="rack-container">
  <div class="rack-header">
    <div class="rack-title">Channel Rack</div>
    <div class="rack-actions">
      <button (click)="importAudio()" class="mini-btn">IMPORT</button>
    </div>
  </div>

  <div class="channel-list no-scrollbar">
    <div
      *ngFor="let track of musicManager.tracks(); let i = index"
      class="channel-item"
      [class.selected]="musicManager.selectedTrackId() === track.id"
      (click)="selectTrack(track)"
    >
      <div class="channel-led" [class.active]="!track.mute"></div>

      <div class="channel-info">
        <span class="channel-name">{{ track.name }}</span>
        <span class="channel-type">{{ track.type }}</span>
      </div>

      <div class="step-sequencer" *ngIf="track.type === 'midi'">
        <div
          *ngFor="let step of steps; let sIdx = index"
          class="step-pad"
          [class.active]="track.steps[sIdx]"
          [class.current-step]="musicManager.currentStep() === sIdx"
          [style.background-color]="sIdx % 8 < 4 ? '' : '#333'"
          (click)="toggleStep(track, sIdx); $event.stopPropagation()"
        ></div>
      </div>

      <div class="channel-knobs">
        <div class="mini-knob" title="Volume"></div>
        <div class="mini-knob" title="Pan"></div>
      </div>
    </div>

    <button (click)="addTrack()" class="add-btn">+ ADD INSTRUMENT</button>
  </div>
</div>
