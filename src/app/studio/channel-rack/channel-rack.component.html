<div
  class="channel-rack-container bg-brand-dark border border-white/10 rounded-2xl overflow-hidden shadow-2xl h-full flex flex-col font-sans"
>
  <!-- Dynamic Rack Header -->
  <div
    class="rack-header bg-brand-surface px-4 py-3 flex items-center justify-between border-b border-white/10"
  >
    <div class="flex items-center gap-2">
      <i class="fas fa-microchip text-brand-primary text-[10px]"></i>
      <h3
        class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-300 italic"
      >
        SMUVE Channel Rack
      </h3>
    </div>
    <div class="flex items-center gap-3">
      <button
        (click)="importAudio()"
        class="text-[9px] font-black text-slate-500 hover:text-brand-primary uppercase flex items-center gap-1"
      >
        <span class="material-symbols-outlined text-xs">upload_file</span>
        Import
      </button>
      <div class="h-4 w-px bg-white/10"></div>
      <button
        (click)="batchMute(true)"
        [disabled]="selectedIds().size === 0"
        class="text-[8px] font-black uppercase text-slate-500 hover:text-yellow-500 disabled:opacity-30"
      >
        Mute Selected
      </button>
      <button
        (click)="batchMute(false)"
        [disabled]="selectedIds().size === 0"
        class="text-[8px] font-black uppercase text-slate-500 hover:text-brand-primary disabled:opacity-30"
      >
        Unmute Selected
      </button>
      <button
        (click)="addTrack()"
        class="w-6 h-6 rounded-lg bg-brand-primary/10 border border-brand-primary/20 flex items-center justify-center hover:bg-brand-primary hover:text-black transition-all"
      >
        <i class="fas fa-plus text-[8px]"></i>
      </button>
    </div>
  </div>

  <div class="rack-content flex-grow overflow-y-auto custom-scrollbar p-3">
    <div
      *ngFor="let track of musicManager.tracks(); let i = index"
      draggable="true"
      (dragstart)="onDragStart(i)"
      (dragover)="onDragOver()"
      (drop)="onDrop(i)"
      (click)="selectTrack(track)"
      [style.border-left-color]="track.color"
      [class.border-brand-primary/40]="
        musicManager.selectedTrackId() === track.id
      "
      [class.bg-white/[0.03]]="musicManager.selectedTrackId() === track.id"
      class="channel-item flex items-center gap-3 mb-2 p-3 bg-black/20 rounded-xl border border-l-4 border-white/10 hover:bg-white/[0.05] transition-all group relative cursor-grab active:cursor-grabbing"
    >
      <!-- Multi-select Checkbox -->
      <div
        (click)="toggleSelection(track.id, $event)"
        class="w-4 h-4 rounded border border-white/20 flex items-center justify-center transition-all"
        [class.bg-brand-primary]="selectedIds().has(track.id)"
        [class.border-brand-primary]="selectedIds().has(track.id)"
      >
        <i
          *ngIf="selectedIds().has(track.id)"
          class="fas fa-check text-[8px] text-black"
        ></i>
      </div>

      <!-- Mute/Solo Cluster -->
      <div class="flex flex-col gap-1">
        <button
          (click)="$event.stopPropagation(); musicManager.toggleMute(track.id)"
          [class.bg-yellow-500/20]="track.mute"
          [class.text-yellow-500]="track.mute"
          [class.border-yellow-500/40]="track.mute"
          class="w-5 h-5 rounded-lg border border-white/10 flex items-center justify-center text-[7px] font-black transition-all"
        >
          M
        </button>
        <button
          (click)="$event.stopPropagation(); musicManager.toggleSolo(track.id)"
          [class.bg-blue-500/20]="track.solo"
          [class.text-blue-500]="track.solo"
          [class.border-blue-500/40]="track.solo"
          class="w-5 h-5 rounded-lg border border-white/10 flex items-center justify-center text-[7px] font-black transition-all"
        >
          S
        </button>
      </div>

      <!-- Instrument/Name Section -->
      <div class="flex flex-col gap-1 w-24 md:w-32">
        <div
          class="text-[9px] font-black uppercase tracking-wider text-slate-200 truncate"
        >
          {{ track.name }}
        </div>
        <div class="flex items-center gap-2">
          <span
            class="text-[7px] font-mono tracking-tight text-brand-primary/60 uppercase"
            >{{ track.type }}</span
          >
          <input
            type="color"
            [value]="track.color"
            (change)="
              musicManager.setTrackColor(track.id, $any($event.target).value)
            "
            (click)="$event.stopPropagation()"
            class="w-3 h-3 rounded-full overflow-hidden p-0 border-none bg-transparent cursor-pointer"
          />
        </div>
        <select
          *ngIf="track.type === 'midi'"
          [value]="track.instrumentId"
          (click)="$event.stopPropagation()"
          (change)="updateInstrument(track, $any($event.target).value)"
          class="mt-1 bg-black/60 border border-white/10 rounded-lg px-1.5 py-1 text-[7px] font-black uppercase tracking-widest text-slate-300 focus:outline-none focus:border-brand-primary/40"
        >
          <option *ngFor="let preset of availablePresets" [value]="preset.id">
            {{ preset.name }}
          </option>
        </select>
        <div *ngIf="track.type === 'midi'" class="mt-1 flex items-center gap-1">
          <button
            (click)="$event.stopPropagation(); setTrackQuality(track, 'ultra')"
            class="px-1.5 py-1 text-[7px] rounded border border-white/10"
            [class.text-brand-primary]="
              (track.qualityMode ?? 'ultra') === 'ultra'
            "
          >
            HQ
          </button>
          <button
            (click)="
              $event.stopPropagation(); setTrackQuality(track, 'performance')
            "
            class="px-1.5 py-1 text-[7px] rounded border border-white/10"
            [class.text-brand-primary]="
              (track.qualityMode ?? 'ultra') === 'performance'
            "
          >
            Perf
          </button>
        </div>
        <div
          *ngIf="track.type === 'audio'"
          class="mt-1 text-[7px] font-black uppercase text-brand-primary bg-brand-primary/10 px-2 py-1 rounded border border-brand-primary/20 truncate"
        >
          {{ track.audioUrl ? 'CLIP: ' + track.name : 'NO AUDIO' }}
        </div>
      </div>

      <!-- High-Precision Step Sequencer (16-Step Mini-View) -->
      <div
        class="step-sequencer flex gap-[2px] px-2 flex-grow justify-center"
        *ngIf="track.type === 'midi'"
      >
        <button
          *ngFor="let step of steps; let i = index"
          (click)="
            $event.stopPropagation(); musicManager.toggleStep(track.id, i)
          "
          [class.bg-brand-surface-light]="i % 8 < 4"
          [class.bg-brand-surface]="i % 8 >= 4"
          [class.bg-brand-primary]="track.steps[i]"
          [class.shadow-[0_0_12px_rgba(16,185,129,0.3)]]="track.steps[i]"
          [style.opacity]="0.45 + getStepVelocity(track, i) / 2"
          class="step-pad w-5 h-8 rounded-sm transition-all relative overflow-hidden"
        >
          <div
            *ngIf="musicManager.currentStep() === i"
            class="absolute inset-0 bg-white/30 animate-pulse-subtle pointer-events-none"
          ></div>
          <div
            (click)="setStepAccent(track, i, $event)"
            class="absolute top-0 left-0 w-full h-1 bg-white/10 hover:bg-brand-primary/40"
          ></div>
          <div
            class="absolute bottom-0 left-0 right-0 h-[2px] bg-white/10"
          ></div>
        </button>
      </div>

      <!-- Audio Track Mini Waveform Placeholder -->
      <div
        *ngIf="track.type === 'audio'"
        class="flex-grow flex items-center justify-center bg-black/40 rounded-lg border border-white/5 h-8 mx-2 overflow-hidden px-4"
      >
        <div class="w-full h-px bg-brand-primary/20 relative">
          <div
            class="absolute inset-0 bg-brand-primary animate-pulse opacity-40"
          ></div>
        </div>
        <span class="text-[7px] font-black uppercase ml-2 text-slate-600"
          >Waveform</span
        >
      </div>

      <!-- Quick Mix Controls (Visible on Hover) -->
      <div
        class="channel-actions flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity ml-auto"
      >
        <div class="flex flex-col gap-1">
          <div class="flex items-center gap-1">
            <button
              (click)="$event.stopPropagation(); createPatternSlot(track)"
              class="px-1.5 py-1 text-[7px] rounded border border-white/10 hover:border-brand-primary/40"
            >
              Slot+
            </button>
            <button
              (click)="$event.stopPropagation(); duplicatePatternSlot(track)"
              class="px-1.5 py-1 text-[7px] rounded border border-white/10 hover:border-brand-primary/40"
            >
              Clone
            </button>
            <button
              (click)="$event.stopPropagation(); savePatternVersion(track)"
              class="px-1.5 py-1 text-[7px] rounded border border-white/10 hover:border-brand-primary/40"
            >
              Ver+
            </button>
          </div>
          <div class="flex items-center gap-1">
            <button
              (click)="$event.stopPropagation(); fillPattern(track)"
              class="px-1.5 py-1 text-[7px] rounded border border-white/10"
            >
              Fill
            </button>
            <button
              (click)="$event.stopPropagation(); clearPattern(track)"
              class="px-1.5 py-1 text-[7px] rounded border border-white/10"
            >
              Clear
            </button>
            <button
              (click)="$event.stopPropagation(); rotatePattern(track, 1)"
              class="px-1.5 py-1 text-[7px] rounded border border-white/10"
            >
              Rot+
            </button>
            <button
              (click)="$event.stopPropagation(); randomizePattern(track)"
              class="px-1.5 py-1 text-[7px] rounded border border-white/10"
            >
              Rnd
            </button>
          </div>
        </div>
        <div class="flex flex-col gap-1">
          <input
            type="range"
            (input)="$event.stopPropagation(); updateVolume(track, $event)"
            [value]="track.gain * 100"
            min="0"
            max="100"
            class="w-16 h-0.5 accent-brand-primary"
          />
          <input
            type="range"
            (input)="$event.stopPropagation(); updatePan(track, $event)"
            [value]="track.pan * 100"
            min="-100"
            max="100"
            class="w-16 h-0.5 accent-blue-500"
          />
        </div>
        <button
          (click)="$event.stopPropagation(); removeTrack(track.id)"
          class="w-7 h-7 rounded-xl bg-red-500/10 border border-red-500/20 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all"
        >
          <i class="fas fa-trash text-[9px]"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Rack Footer -->
  <div
    class="p-3 border-t border-white/10 bg-brand-surface/40 flex justify-between items-center shrink-0"
  >
    <div class="flex items-center gap-2">
      <div
        class="w-2 h-2 rounded-full bg-brand-primary shadow-[0_0_8px_#10b981]"
      ></div>
      <span
        class="text-[8px] font-black uppercase tracking-widest text-slate-500"
        >Rack Stable</span
      >
    </div>
    <div class="text-[8px] font-mono text-[11px] tracking-tight text-slate-600">
      CHANNELS: {{ musicManager.tracks().length }}
    </div>
  </div>
</div>
