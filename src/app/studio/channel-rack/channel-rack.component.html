<div class="channel-rack-container bg-brand-dark border border-white/10 rounded-2xl overflow-hidden shadow-2xl h-full flex flex-col font-sans">
  <!-- Dynamic Rack Header -->
  <div class="rack-header bg-brand-surface px-4 py-2 flex items-center justify-between border-b border-white/10">
    <div class="flex items-center gap-2">
      <i class="fas fa-microchip text-brand-primary text-[10px]"></i>
      <h3 class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-300 italic">SMUVE Channel Rack</h3>
    </div>
    <div class="flex items-center gap-4">
       <div class="flex items-center bg-black/40 rounded-xl px-2 py-0.5 border border-white/10">
          <span class="text-[8px] font-mono text-[11px] tracking-tight text-brand-brand-primary/60 uppercase mr-2">Session</span>
          <span class="text-[9px] font-mono text-[11px] tracking-tight text-brand-primary">Live</span>
       </div>
       <button (click)="addTrack()" class="w-6 h-6 rounded-xl bg-brand-brand-primary/10 border border-brand-brand-primary/20 flex items-center justify-center hover:bg-brand-primary hover:text-black transition-all">
         <i class="fas fa-plus text-[8px]"></i>
       </button>
    </div>
  </div>

  <div class="rack-content flex-grow overflow-y-auto custom-scrollbar p-3">
    <div *ngFor="let track of musicManager.tracks()"
         (click)="selectTrack(track)"
         [class.border-brand-brand-primary/40]="musicManager.selectedTrackId() === track.id"
         [class.bg-white/[0.03]]="musicManager.selectedTrackId() === track.id"
         class="channel-item flex items-center gap-3 mb-2 p-2 bg-black/20 rounded-xl border border-white/10 hover:bg-white/[0.05] transition-all group relative">

      <!-- Mute/Solo Cluster -->
      <div class="flex flex-col gap-1">
        <button (click)="musicManager.toggleMute(track.id)"
                [class.bg-yellow-500/20]="track.mute"
                [class.text-yellow-500]="track.mute"
                [class.border-yellow-500/40]="track.mute"
                class="w-5 h-5 rounded-lg border border-white/10 flex items-center justify-center text-[7px] font-black transition-all">M</button>
        <button class="w-5 h-5 rounded-lg border border-white/10 flex items-center justify-center text-[7px] font-black text-slate-600 hover:text-brand-primary transition-all">S</button>
      </div>

      <!-- Instrument/Name Section -->
      <div class="flex flex-col gap-1 w-24 md:w-32">
         <div class="text-[9px] font-black uppercase tracking-wider text-slate-200 truncate">{{ track.name }}</div>
         <div class="text-[7px] font-mono tracking-tight text-brand-primary/60 uppercase">{{ track.instrumentId }}</div>
         <select
           [value]="track.instrumentId"
           (click)="$event.stopPropagation()"
           (change)="updateInstrument(track, $any($event.target).value)"
           class="mt-1 bg-black/60 border border-white/10 rounded-lg px-1.5 py-1 text-[7px] font-black uppercase tracking-widest text-slate-300 focus:outline-none focus:border-brand-primary/40"
         >
           <option *ngFor="let preset of availablePresets" [value]="preset.id">
             {{ preset.name }}
           </option>
         </select>
      </div>

      <!-- High-Precision Step Sequencer (16-Step Mini-View) -->
      <div class="step-sequencer flex gap-[2px] px-2 flex-grow justify-center">
        <button *ngFor="let step of steps; let i = index"
                (click)="musicManager.toggleStep(track.id, i)"
                [class.bg-brand-surface-light]="i % 8 < 4"
                [class.bg-brand-surface]="i % 8 >= 4"
                [class.shadow-[0_0_12px_rgba(16,185,129,0.3)]]="false"
                class="step-pad w-5 h-8 rounded-sm transition-all relative overflow-hidden">
          <div *ngIf="musicManager.currentStep() === i" class="absolute inset-0 bg-white/30 animate-pulse-subtle pointer-events-none"></div>
          <div class="absolute bottom-0 left-0 right-0 h-[2px] bg-white/10"></div>
        </button>
      </div>

      <!-- Quick Mix Controls (Visible on Hover) -->
      <div class="channel-actions flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity ml-auto">
         <div class="flex flex-col gap-1">
            <input type="range" (input)="updateVolume(track, $event)" [value]="track.gain * 100" min="0" max="100" class="w-16 h-0.5 accent-brand-primary">
            <input type="range" (input)="updatePan(track, $event)" [value]="track.pan * 100" min="-100" max="100" class="w-16 h-0.5 accent-blue-500">
         </div>
         <button (click)="removeTrack(track.id)" class="w-7 h-7 rounded-xl bg-red-500/10 border border-red-500/20 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
           <i class="fas fa-trash text-[9px]"></i>
         </button>
      </div>
    </div>
  </div>

  <!-- Rack Footer -->
  <div class="p-3 border-t border-white/10 bg-brand-surface/40 flex justify-between items-center">
     <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-brand-primary shadow-[0_0_8px_#10b981]"></div>
        <span class="text-[8px] font-black uppercase tracking-widest text-slate-500">Engine Ready</span>
     </div>
     <div class="text-[8px] font-mono text-[11px] tracking-tight text-slate-600">VOICES: 12/128</div>
  </div>
</div>
