<div class="rack-container glass-v42 shadow-v42-xl">
  <div class="rack-header wood-panel">
    <div class="rack-title neon-text-sm">CHANNEL RACK</div>
    <div class="rack-actions">
      <button (click)="importAudio()" class="executive-glass">IMPORT</button>
    </div>
  </div>

  <div class="channel-list no-scrollbar">
    <div
      *ngFor="let track of musicManager.tracks(); let i = index"
      class="channel-item glass-v42"
      [class.selected]="musicManager.selectedTrackId() === track.id"
      (click)="selectTrack(track)"
    >
      <div
        class="channel-led extreme-glow"
        [class.active]="!track.mute"
        [style.background-color]="track.color"
      ></div>

      <div class="channel-info">
        <span class="channel-name neon-text-xs">{{
          track.name | uppercase
        }}</span>
        <span
          class="channel-type font-mono"
          style="font-size: 8px; opacity: 0.5"
          >{{ track.type | uppercase }}</span
        >
      </div>

      <div class="step-sequencer" *ngIf="track.type === 'midi'">
        <div
          *ngFor="let step of steps; let sIdx = index"
          class="step-pad"
          [class.active]="track.steps[sIdx]"
          [class.current-step]="musicManager.currentStep() === sIdx"
          [style.background-color]="
            track.steps[sIdx]
              ? track.color
              : sIdx % 8 < 4
                ? 'rgba(255,255,255,0.05)'
                : 'rgba(0,0,0,0.2)'
          "
          (click)="toggleStep(track, sIdx); $event.stopPropagation()"
        ></div>
      </div>

      <div class="channel-knobs">
        <div class="mini-knob executive-glass" title="Volume"></div>
        <div class="mini-knob executive-glass" title="Pan"></div>
      </div>
    </div>

    <button (click)="addTrack()" class="add-btn executive-glass extreme-glow">
      + ADD INSTRUMENT
    </button>
  </div>
</div>
