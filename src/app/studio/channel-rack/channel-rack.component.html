<div class="rack-container glass-v42 shadow-v42-xl h-full flex flex-col">
  <div class="rack-header wood-panel flex items-center justify-between p-2 border-b border-fl-border">
    <div class="rack-title neon-text text-[10px] font-black tracking-widest">CHANNEL RACK</div>
    <button (click)="addTrack()" class="executive-glass text-[8px] px-2 py-1">+ INSTRUMENT</button>
  </div>

  <div class="channel-list flex-1 overflow-y-auto no-scrollbar p-2 space-y-1">
    <div
      *ngFor="let track of tracks(); let i = index"
      class="channel-item glass-v42 flex items-center p-2 gap-2 rounded-lg border border-fl-border/20 hover:border-fl-blue/30 transition-all cursor-pointer group"
      [class.selected]="selectedTrackId() === track.id"
      (click)="selectTrack(track)"
      (drop)="onDrop($event, track)"
      (dragover)="onDragOver($event)"
    >
      <!-- Mute/LED -->
      <div
        class="w-2 h-8 rounded-full transition-all"
        [class.extreme-glow]="!track.mute"
        [style.background-color]="track.mute ? '#333' : track.color"
        (click)="toggleMute(track); $event.stopPropagation()"
      ></div>

      <!-- Controls (Vol/Pan) -->
      <div class="flex flex-col gap-1 w-12">
        <div class="flex items-center gap-1">
           <span class="text-[6px] font-mono opacity-50">V</span>
           <input type="range" min="0" max="1.5" step="0.01" [ngModel]="track.gain" (ngModelChange)="updateVolume(track, $event)" class="rack-fader" (click)="$event.stopPropagation()" />
        </div>
        <div class="flex items-center gap-1">
           <span class="text-[6px] font-mono opacity-50">P</span>
           <input type="range" min="-1" max="1" step="0.1" [ngModel]="track.pan" (ngModelChange)="updatePan(track, $event)" class="rack-fader" (click)="$event.stopPropagation()" />
        </div>
      </div>

      <!-- Info -->
      <div class="flex-1 min-w-0">
        <div class="channel-name neon-text-xs truncate uppercase tracking-tighter">{{ track.name }}</div>
        <div class="text-[6px] font-mono opacity-40 truncate uppercase">{{ track.instrumentId }}</div>
      </div>

      <!-- Steps -->
      <div class="flex gap-px" *ngIf="track.type === 'midi'">
        <div
          *ngFor="let step of steps; let sIdx = index"
          class="w-3 h-6 rounded-sm transition-all"
          [class.active]="track.steps[sIdx]"
          [class.current-step]="currentStep() === sIdx"
          [style.background-color]="
            track.steps[sIdx]
              ? track.color
              : sIdx % 8 < 4
                ? 'rgba(255,255,255,0.05)'
                : 'rgba(0,0,0,0.2)'
          "
          (click)="toggleStep(track, sIdx); $event.stopPropagation()"
        ></div>
      </div>
    </div>
  </div>
</div>
