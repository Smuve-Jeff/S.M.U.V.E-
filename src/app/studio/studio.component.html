<div class="studio-container bg-[#020617] text-slate-200 font-sans selection:bg-emerald-500/30 h-screen flex flex-col overflow-hidden">
  <!-- Strategic Overlays -->
  <div class="scanlines"></div>
  <div class="crt-flicker"></div>

  <!-- Top Navigation / Transport -->
  <header class="studio-header border-b border-white/5 bg-slate-950/80 backdrop-blur-xl px-4 md:px-6 py-2 flex items-center justify-between sticky top-0 z-[100] shadow-2xl">
    <div class="flex items-center gap-4 md:gap-6">
      <div class="flex flex-col">
        <h1 class="text-xs md:text-sm font-black uppercase tracking-[0.2em] text-emerald-500 italic neon-text-emerald">S.M.U.V.E Studio</h1>
        <div class="text-[8px] md:text-[9px] text-slate-500 font-mono uppercase tracking-tighter">STRATEGIC COMMANDER v3.0 PRO</div>
      </div>
      <div class="h-8 w-px bg-white/10 hidden sm:block"></div>
      <app-transport-bar class="hidden sm:block"></app-transport-bar>
    </div>

    <!-- AI Decree Banner (Global) -->
    <div class="flex-grow flex justify-center px-4 hidden lg:flex">
       <div class="max-w-xl w-full bg-emerald-500/5 border border-emerald-500/20 rounded-lg px-4 py-1 flex items-center gap-3 animate__animated animate__pulse animate__infinite">
          <i class="fas fa-brain text-[10px] text-emerald-500"></i>
          <span class="text-[9px] font-mono text-emerald-400 uppercase tracking-tighter truncate">{{ currentDecree() }}</span>
          <button (click)="generateNewDecree()" class="ml-auto text-[8px] text-slate-500 hover:text-emerald-500 transition-colors uppercase font-black">REFRESH</button>
       </div>
    </div>

    <div class="flex items-center gap-2 md:gap-4">
      <div class="flex items-center bg-black/40 rounded-xl p-0.5 md:p-1 border border-white/5 shadow-inner">
         <button (click)="toggleView('daw')"
                 [class.active]="activeView() === 'daw'"
                 class="btn-commander px-2 md:px-4 py-1.5">Studio</button>
         <button (click)="toggleView('dj')"
                 [class.active]="activeView() === 'dj'"
                 class="btn-commander px-2 md:px-4 py-1.5">DJ Booth</button>
         <button (click)="toggleView('mastering')"
                 [class.active]="activeView() === 'mastering'"
                 class="btn-commander px-2 md:px-4 py-1.5">Mastering</button>
      </div>

      <div class="flex items-center gap-1 md:gap-2 border-l border-white/10 pl-2 md:pl-4">
        <button (click)="showRack.set(!showRack())"
                [class.text-emerald-500]="showRack()"
                class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-slate-900 border border-white/5 flex items-center justify-center hover:bg-emerald-500 hover:text-black transition-all shadow-lg">
          <i class="fas fa-th-list text-[10px] md:text-xs"></i>
        </button>
        <button (click)="showMixer.set(!showMixer())"
                [class.text-emerald-500]="showMixer()"
                class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-slate-900 border border-white/5 flex items-center justify-center hover:bg-emerald-500 hover:text-black transition-all shadow-lg">
          <i class="fas fa-sliders-h text-[10px] md:text-xs"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="main-view flex-grow relative overflow-hidden flex flex-col h-full">

    <!-- PRODUCTION VIEW (INTEGRATED) -->
    <div class="production-view flex-grow flex flex-col h-full" [class.hidden]="activeView() !== 'daw'">
      <!-- Top Section: Arrangement / Playlist -->
      <div class="arrangement-section flex-grow relative overflow-hidden commander-panel">
        <app-arrangement-view class="h-full"></app-arrangement-view>
      </div>

      <!-- Bottom Panel: Mixer / Rack / Piano Roll -->
      <div class="bottom-panel bg-slate-950/90 border-t border-white/5 backdrop-blur-xl transition-all overflow-hidden"
           [style.height]="showMixer() || showRack() || showPianoRoll() ? '45%' : '0px'">
        <div class="flex h-full overflow-hidden flex-col md:flex-row">
          <!-- Side Panel: Channel Rack -->
          <div class="rack-panel w-full md:w-80 lg:w-96 border-r border-white/5 flex flex-col overflow-hidden transition-all commander-panel"
               [class.hidden]="!showRack()">
            <app-channel-rack class="flex-grow h-full"></app-channel-rack>
          </div>

          <!-- Main Bottom Area: Mixer -->
          <div class="main-bottom-area flex-grow flex flex-col overflow-hidden commander-panel">
            <div class="flex-grow overflow-hidden" [class.hidden]="!showMixer()">
              <app-mixer class="h-full"></app-mixer>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- DJ BOOTH VIEW -->
    <div class="dj-view h-full overflow-y-auto" [class.hidden]="activeView() !== 'dj'">
       <app-dj-deck></app-dj-deck>
    </div>

    <!-- MASTERING VIEW -->
    <div class="mastering-view h-full p-4 md:p-8 bg-slate-950 flex flex-col items-center justify-center overflow-y-auto" [class.hidden]="activeView() !== 'mastering'">
       <div class="max-w-6xl w-full flex flex-col gap-6 md:gap-12 py-8">
          <div class="text-center">
             <h2 class="text-lg md:text-3xl font-black uppercase tracking-[0.4em] text-emerald-500 italic neon-text-emerald">Strategic Mastering Suite</h2>
             <div class="text-[8px] md:text-xs text-slate-500 font-mono mt-2 tracking-widest">REAL-TIME SIGNAL INTELLIGENCE</div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8 min-h-[400px]">
             <!-- Large Spectrum Analyzer -->
             <div class="commander-panel bg-black/60 rounded-3xl p-4 md:p-6 flex flex-col gap-4 shadow-2xl overflow-hidden relative min-h-[300px]">
                <div class="text-[8px] md:text-[10px] font-black uppercase tracking-widest text-emerald-500/60">Spectral Distribution Analysis</div>
                <div class="flex-grow flex items-end gap-0.5 px-2 md:px-4 overflow-hidden relative">
                   <canvas id="masterAnalyzerCanvas" class="w-full h-full"></canvas>
                </div>
                <div class="flex justify-between text-[6px] md:text-[8px] font-mono text-slate-600 px-2 md:px-4">
                   <span>20Hz</span><span>1kHz</span><span>20kHz</span>
                </div>
             </div>

             <!-- Mastering Controls / Loudness -->
             <div class="commander-panel bg-black/60 rounded-3xl p-6 md:p-8 flex flex-col justify-between shadow-2xl min-h-[300px]">
                <div class="flex flex-col gap-4 md:gap-8">
                   <div class="flex justify-between items-center">
                      <div class="text-[8px] md:text-[10px] font-black uppercase tracking-widest text-violet-500">Loudness Intel (LUFS)</div>
                      <div class="text-xl md:text-2xl font-mono text-violet-400">-14.2</div>
                   </div>
                   <div class="h-3 md:h-4 bg-black rounded-full border border-white/5 overflow-hidden p-0.5 shadow-inner">
                      <div class="h-full bg-gradient-to-r from-violet-600 via-emerald-500 to-red-500 rounded-full w-[70%] shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
                   </div>

                   <div class="grid grid-cols-3 gap-2 md:gap-4">
                      <div class="flex flex-col gap-1 p-2 md:p-4 bg-white/5 rounded-2xl border border-white/5 text-center shadow-lg">
                         <div class="text-[6px] md:text-[8px] uppercase font-bold text-slate-500">Peak Headroom</div>
                         <div class="text-xs md:text-sm font-mono text-slate-300">-0.1 dB</div>
                      </div>
                      <div class="flex flex-col gap-1 p-2 md:p-4 bg-white/5 rounded-2xl border border-white/5 text-center shadow-lg">
                         <div class="text-[6px] md:text-[8px] uppercase font-bold text-slate-500">Signal Range</div>
                         <div class="text-xs md:text-sm font-mono text-slate-300">12.5</div>
                      </div>
                      <div class="flex flex-col gap-1 p-2 md:p-4 bg-white/5 rounded-2xl border border-white/5 text-center shadow-lg">
                         <div class="text-[6px] md:text-[8px] uppercase font-bold text-slate-500">Stereo Field</div>
                         <div class="text-xs md:text-sm font-mono text-slate-300">110%</div>
                      </div>
                   </div>
                </div>

                <button class="w-full mt-6 py-3 md:py-4 bg-emerald-500 text-black font-black uppercase tracking-widest rounded-2xl hover:bg-emerald-400 transition-all shadow-[0_0_30px_rgba(16,185,129,0.4)] text-xs md:text-sm active:scale-95" (click)="executeMastering()">Execute Strategic Mastering Engine</button>
             </div>
          </div>
       </div>
    </div>

    <!-- PIANO ROLL (NOW DOCKED OR FLOATING) -->
    <div class="absolute inset-0 z-[200] flex items-center justify-center p-4 md:p-12 pointer-events-none" *ngIf="showPianoRoll()">
       <div class="w-full h-full max-w-6xl pointer-events-auto shadow-[0_50px_100px_rgba(0,0,0,0.9)] rounded-3xl border border-white/10 overflow-hidden bg-slate-950 flex flex-col commander-panel">
         <div class="piano-roll-header bg-slate-900 px-4 md:px-6 py-2 flex items-center justify-between border-b border-white/10">
            <div class="flex items-center gap-3">
              <i class="fas fa-keyboard text-emerald-500 text-[10px] md:text-xs"></i>
              <span class="text-[8px] md:text-[10px] font-black uppercase tracking-widest neon-text-emerald">MIDI Tactical Editor</span>
            </div>
            <button (click)="showPianoRoll.set(false)" class="text-slate-500 hover:text-white transition-all"><i class="fas fa-times text-xs"></i></button>
         </div>
         <app-piano-roll class="flex-grow h-full"></app-piano-roll>
       </div>
    </div>
  </main>

  <footer class="bg-slate-950 border-t border-white/10 px-4 md:px-6 py-2 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] relative z-[100] hidden sm:block">
    <app-master-controls></app-master-controls>
  </footer>
</div>
