<div
  class="studio-container {{ studioQualityClass() }}" [class.header-collapsed]="headerCollapsed()"
  [class.holographic]="uiService.holographicMode()"
  [attr.data-theme]="'analog-v42'"
>
  <div class="studio-shell">
    <button type="button" class="header-toggle" (click)="toggleHeader()" [class.floating]="headerCollapsed()" [title]="headerCollapsed() ? 'Expand Header' : 'Collapse Header'"><span class="material-icons">{{ headerCollapsed() ? 'expand_more' : 'expand_less' }}</span></button>
    <header class="studio-transport" [class.collapsed]="headerCollapsed()">
      <div class="transport-brand">

        <h1>SMUVE Studio</h1>
        <p>Production workspace</p>
      </div>
      <div class="transport-actions">
        <button type="button" class="new-project-btn" (click)="createNewProject()" title="New Project"><span class="material-icons">add_box</span></button>
        <button type="button" class="export-btn" (click)="musicManager.exportProject()" title="Export Project"><span class="material-icons">download</span></button>
        <button type="button" class="import-btn" (click)="fileInput.click()" title="Import Project"><span class="material-icons">upload</span></button>
        <input #fileInput type="file" accept=".json" class="hidden" (change)="handleImport($event)">
        <button
          type="button"
          [class.active]="audioSession.isPlaying()"
          (click)="audioSession.togglePlay()"
        >
          {{ audioSession.isPlaying() ? 'Pause' : 'Play' }}
        </button>
        <button type="button" (click)="audioSession.stop()">Stop</button>
        <button
          type="button"
          class="record"
          [class.active]="audioSession.isRecording()"
          (click)="audioSession.toggleRecord()"
        >
          Rec
        </button>
      </div>
      <div class="transport-metrics">
        <div>
          <span>BPM</span>
          <strong class="cursor-pointer hover:text-brand-primary transition-colors" (click)="adjustBpm()">{{ audioEngine.tempo() }}</strong>
        </div>
        <div>
          <span>BAR</span>
          <strong>{{ currentBar() }}</strong>
        </div>
      </div>
    </header>

    <app-universal-master class="studio-master-strip"></app-universal-master>

    <nav
      class="studio-view-tabs no-scrollbar"
      *ngIf="!uiService.isCompactMobile()"
    >
      <button
        [class.active]="activeView() === 'arrangement'"
        (click)="setActiveView('arrangement')"
      >
        Arrangement
      </button>
      <button
        [class.active]="activeView() === 'dj'"
        (click)="setActiveView('dj')"
      >
        DJ Deck
      </button>
      <button
        [class.active]="activeView() === 'piano-roll'"
        (click)="setActiveView('piano-roll')"
      >
        Piano Roll
      </button>
      <button [class.active]="activeView() === 'drum-machine'" (click)="setActiveView('drum-machine')">
        Drum Machine
      </button>
      <button [class.active]="activeView() === 'mixer'" (click)="setActiveView('mixer')">Mixer</button>
      <button [class.active]="activeView() === 'performance'" (click)="setActiveView('performance')">
        Performance
      </button>
      <button [class.active]="activeView() === 'mastering'" (click)="setActiveView('mastering')">Mastering</button>
    </nav>

    <div
      class="studio-layout"
      [class.compact-mobile-layout]="uiService.isCompactMobile()"
    >
      <div class="mobile-utility-bar" *ngIf="uiService.isCompactMobile()">
        <button
          type="button"
          [class.active]="mobilePanel() === 'browser'"
          (click)="toggleMobilePanel('browser')"
        >
          Sounds
        </button>
        <button
          type="button"
          [class.active]="mobilePanel() === 'inspector'"
          (click)="toggleMobilePanel('inspector')"
        >
          Inspector
        </button>
        <div class="mobile-view-chip">
          {{ activeView() === 'piano-roll' ? 'Piano Roll' : activeView() }}
        </div>
      </div>

      <section
        class="mobile-utility-panel no-scrollbar"
        *ngIf="uiService.isCompactMobile() && mobilePanel() as panel"
      >
        <header>
          <span>{{
            panel === 'browser' ? 'Sound Browser' : 'Track Inspector'
          }}</span>
          <button type="button" (click)="closeMobilePanel()">Close</button>
        </header>

        <app-sound-browser *ngIf="panel === 'browser'"></app-sound-browser>
        <app-track-inspector
          *ngIf="panel === 'inspector'"
        ></app-track-inspector>
      </section>

      <aside
        class="studio-panel studio-browser"
        *ngIf="!uiService.isCompactMobile()"
      >
        <header>Browser</header>
        <app-sound-browser></app-sound-browser>
      </aside>

      <main class="studio-workspace" [ngSwitch]="activeView()">
        <div class="view-wrapper" *ngSwitchCase="'drum-machine'">
          <app-drum-machine class="arrangement-main"></app-drum-machine>
        </div>

        <div class="view-wrapper" *ngSwitchCase="'mixer'">
          <app-mixer class="arrangement-main"></app-mixer>
        </div>

        <div class="view-wrapper" *ngSwitchCase="'performance'">
          <app-performer class="arrangement-main"></app-performer>
        </div>

        <div class="view-wrapper" *ngSwitchCase="'mastering'">
          <app-mastering-suite class="arrangement-main"></app-mastering-suite>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'arrangement'">
          <div class="arrangement-stack">
            <app-arrangement-view class="arrangement-main"></app-arrangement-view>
          </div>
        </div>

        <div class="view-wrapper" *ngSwitchCase="'dj'">
          <div class="arrangement-stack">
            <app-dj-deck class="arrangement-main"></app-dj-deck>
          </div>
        </div>

        <div class="view-wrapper" *ngSwitchCase="'piano-roll'">
          <div class="editor-stack">
            <app-channel-rack class="editor-channel-rack"></app-channel-rack>
            <app-piano-roll class="editor-main"></app-piano-roll>
          </div>
        </div>
      </main>

      <aside
        class="studio-panel studio-inspector"
        *ngIf="!uiService.isCompactMobile()"
      >
        <header>Inspector</header>
        <app-track-inspector></app-track-inspector>
      </aside>
    </div>
  </div>

  <nav
    class="mobile-bottom-nav no-scrollbar"
    *ngIf="uiService.isCompactMobile()"
  >
    <button
      [class.active]="activeView() === 'arrangement'"
      (click)="setActiveView('arrangement')"
    >
      Arrange
    </button>
    <button
      [class.active]="activeView() === 'dj'"
      (click)="setActiveView('dj')"
    >
      DJ
    </button>
    <button
      [class.active]="activeView() === 'piano-roll'"
      (click)="setActiveView('piano-roll')"
    >
      Piano
    </button>
    <button [class.active]="activeView() === 'drum-machine'" (click)="setActiveView('drum-machine')">Drums</button>
    <button [class.active]="activeView() === 'mixer'" (click)="setActiveView('mixer')">Mix</button>
    <button [class.active]="activeView() === 'performance'" (click)="setActiveView('performance')">Perform</button>
    <button [class.active]="activeView() === 'mastering'" (click)="setActiveView('mastering')">Master</button>
  </nav>
</div>
