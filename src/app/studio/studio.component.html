<div
  class="studio-container {{ studioQualityClass() }}" 
  [class.header-collapsed]="headerCollapsed()"
  [class.holographic]="uiService.holographicMode()"
  [attr.data-theme]="'analog-v42'"
  [class.mobile-drawer-open]="mobileDrawerOpen()"
  [class.mobile-mode]="uiService.isCompactMobile()"
>
  <div class="studio-shell">
    <!-- Offline Indicator -->
    <app-offline-indicator></app-offline-indicator>

    <!-- Drawer Toggle (Mobile Only) -->
    <button *ngIf="uiService.isCompactMobile()" type="button" class="mobile-drawer-toggle" (click)="toggleMobileDrawer()">
      <span class="material-icons">{{ mobileDrawerOpen() ? 'close' : 'menu' }}</span>
    </button>

    <!-- Header Toggle -->
    <button type="button" class="header-toggle" (click)="toggleHeader()" [class.floating]="headerCollapsed()" [title]="headerCollapsed() ? 'Expand Header' : 'Collapse Header'">
      <span class="material-icons">{{ headerCollapsed() ? 'expand_more' : 'expand_less' }}</span>
    </button>

    <!-- Studio Transport Header -->
    <header class="studio-transport" [class.collapsed]="headerCollapsed()">
      <div class="transport-brand">
        <h1>SMUVE</h1>
        <p>Studio 2.0</p>
      </div>
      <div class="transport-actions">
        <!-- Search Button (Mobile) -->
        <button *ngIf="uiService.isCompactMobile()" type="button" class="search-btn" (click)="openSearch()" title="Search">
          <span class="material-icons">search</span>
        </button>
        <button type="button" class="export-btn" (click)="musicManager.exportProject()" title="Export Project">
          <span class="material-icons">download</span>
        </button>
        <button type="button" class="import-btn" (click)="fileInput.click()" title="Import Project">
          <span class="material-icons">upload</span>
        </button>
        <input #fileInput type="file" accept=".json" class="hidden" (change)="handleImport($event)">
        <button
          type="button"
          [class.active]="audioSession.isPlaying()"
          (click)="audioSession.togglePlay()"
        >
          <span class="material-icons">{{ audioSession.isPlaying() ? 'pause' : 'play_arrow' }}</span>
        </button>
        <button type="button" (click)="audioSession.stop()">
          <span class="material-icons">stop</span>
        </button>
        <button
          type="button"
          class="record"
          [class.active]="audioSession.isRecording()"
          (click)="audioSession.toggleRecord()"
        >
          <span class="material-icons">fiber_manual_record</span>
        </button>
      </div>
      <div class="transport-metrics">
        <div class="metric-group">
          <span>BPM</span>
          <strong (click)="adjustBpm()">{{ audioEngine.tempo() }}</strong>
        </div>
        <div class="metric-group">
          <span>BAR</span>
          <strong>{{ currentBar() }}</strong>
        </div>
      </div>
    </header>

    <!-- Slide-out Drawer for Module Switching (Mobile Only) -->
    <div class="mobile-drawer-overlay" *ngIf="mobileDrawerOpen()" (click)="toggleMobileDrawer()"></div>
    <aside class="mobile-module-drawer" [class.open]="mobileDrawerOpen()">
      <header>
        <span class="brand-text">S.M.U.V.E.</span>
        <button (click)="toggleMobileDrawer()"><span class="material-icons">close</span></button>
      </header>
      <nav class="drawer-nav">
        <button [class.active]="activeView() === 'arrangement'" (click)="setActiveView('arrangement')">
          <span class="material-icons">view_quilt</span> Arrangement
        </button>
        <button [class.active]="activeView() === 'piano-roll'" (click)="setActiveView('piano-roll')">
          <span class="material-icons">piano</span> Piano Roll
        </button>
        <button [class.active]="activeView() === 'drum-machine'" (click)="setActiveView('drum-machine')">
          <span class="material-icons">grid_view</span> Drum Machine
        </button>
        <button [class.active]="activeView() === 'mixer'" (click)="setActiveView('mixer')">
          <span class="material-icons">tune</span> Mixer
        </button>
        <button [class.active]="activeView() === 'mastering'" (click)="setActiveView('mastering')">
          <span class="material-icons">speed</span> Mastering
        </button>
        <button [class.active]="activeView() === 'performance'" (click)="setActiveView('performance')">
          <span class="material-icons">interpreter_mode</span> Performance
        </button>
        <button [class.active]="activeView() === 'dj'" (click)="setActiveView('dj')">
          <span class="material-icons">album</span> DJ Deck
        </button>
      </nav>
      <footer>
         <button (click)="toggleNeuralFoundry()">
           <span class="material-icons">psychology</span> Neural Foundry
         </button>
      </footer>
    </aside>

    <app-universal-master class="studio-master-strip"></app-universal-master>

    <!-- Desktop Tabs -->
    <nav
      class="studio-view-tabs no-scrollbar"
      *ngIf="!uiService.isCompactMobile()"
    >
      <button [class.active]="activeView() === 'arrangement'" (click)="setActiveView('arrangement')">Arrangement</button>
      <button [class.active]="activeView() === 'dj'" (click)="setActiveView('dj')">DJ Deck</button>
      <button [class.active]="activeView() === 'piano-roll'" (click)="setActiveView('piano-roll')">Piano Roll</button>
      <button [class.active]="activeView() === 'drum-machine'" (click)="setActiveView('drum-machine')">Drum Machine</button>
      <button [class.active]="activeView() === 'mixer'" (click)="setActiveView('mixer')">Mixer</button>
      <button [class.active]="activeView() === 'performance'" (click)="setActiveView('performance')">Performance</button>
      <button [class.active]="activeView() === 'mastering'" (click)="setActiveView('mastering')">Mastering</button>
    </nav>

    <div
      class="studio-layout"
      [class.compact-mobile-layout]="uiService.isCompactMobile()"
    >
      <!-- Mobile Quick Tools Toggle -->
      <div class="mobile-tool-tabs" *ngIf="uiService.isCompactMobile()">
        <button type="button" [class.active]="mobilePanel() === 'browser'" (click)="toggleMobilePanel('browser')">
          <span class="material-icons">library_music</span>
        </button>
        <button type="button" [class.active]="mobilePanel() === 'inspector'" (click)="toggleMobilePanel('inspector')">
          <span class="material-icons">info</span>
        </button>
        <div class="view-indicator">{{ activeView() | uppercase }}</div>
      </div>

      <!-- Slide-over Utility Drawers (Mobile) -->
      <section
        class="mobile-utility-drawer no-scrollbar"
        [class.open]="uiService.isCompactMobile() && mobilePanel() !== null"
      >
        <header *ngIf="mobilePanel() as panel">
          <span class="drawer-title">{{ panel === 'browser' ? 'SOUNDS' : 'INSPECTOR' }}</span>
          <button type="button" class="close-drawer" (click)="closeMobilePanel()">
            <span class="material-icons">close</span>
          </button>
        </header>

        <div class="drawer-content" [ngSwitch]="mobilePanel()">
          <app-sound-browser *ngSwitchCase="'browser'"></app-sound-browser>
          <app-track-inspector *ngSwitchCase="'inspector'"></app-track-inspector>
        </div>
      </section>

      <!-- Desktop Sidebar Panels -->
      <aside
        class="studio-panel studio-browser"
        *ngIf="!uiService.isCompactMobile()"
      >
        <header>Browser</header>
        <app-sound-browser></app-sound-browser>
      </aside>

      <main class="studio-workspace" [ngSwitch]="activeView()">
        <div class="view-wrapper" *ngSwitchCase="'drum-machine'">
          <app-drum-machine class="arrangement-main"></app-drum-machine>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'mixer'">
          <app-mixer class="arrangement-main"></app-mixer>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'performance'">
          <app-performer class="arrangement-main"></app-performer>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'mastering'">
          <app-mastering-suite class="arrangement-main"></app-mastering-suite>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'arrangement'">
          <app-arrangement-view class="arrangement-main"></app-arrangement-view>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'dj'">
          <app-dj-deck class="arrangement-main"></app-dj-deck>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'piano-roll'">
          <div class="editor-stack">
            <app-channel-rack class="editor-channel-rack" *ngIf="!uiService.isCompactMobile()"></app-channel-rack>
            <app-piano-roll class="editor-main"></app-piano-roll>
          </div>
        </div>
      </main>

      <aside
        class="studio-panel studio-inspector"
        *ngIf="!uiService.isCompactMobile()"
      >
        <header>Inspector</header>
        <app-track-inspector></app-track-inspector>
      </aside>
    </div>
  </div>

  <!-- Bottom Navigation (Mobile Only) -->
  <app-bottom-nav
    *ngIf="uiService.isCompactMobile()"
    [items]="bottomNavItems()"
    [activeId]="activeView()"
    (itemClick)="onBottomNavClick($event)"
  ></app-bottom-nav>

  <!-- Floating Action Button -->
  <app-fab
    *ngIf="uiService.isCompactMobile() && showFab()"
    [icon]="fabIcon()"
    [visible]="showFab()"
    (fabClick)="onFabClick()"
  ></app-fab>

  <!-- Search Overlay -->
  <app-search-overlay></app-search-overlay>

  <!-- Snackbar -->
  <app-snackbar></app-snackbar>
</div>
