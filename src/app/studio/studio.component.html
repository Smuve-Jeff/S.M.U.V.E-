<div
  class="studio-container {{ studioQualityClass() }}"
  [class.holographic]="uiService.holographicMode()"
>
  <!-- Neural Foundry Overlay -->
  <div class="neural-foundry-overlay" *ngIf="showNeuralFoundry()">
    <app-neural-foundry></app-neural-foundry>
    <button class="close-foundry-btn" (click)="toggleNeuralFoundry()">
      Close
    </button>
  </div>

  <!-- Main Studio UI -->
  <div class="studio-main-content">
    <header class="studio-header">
      <h1 class="studio-title">SMUVE <span>Studio</span></h1>
      <div class="header-controls">
        <button class="header-btn" (click)="setActiveView('dj')">DJ</button>
        <button class="header-btn" (click)="setActiveView('mixer')">
          Mixer
        </button>
        <button class="header-btn" (click)="setActiveView('piano-roll')">
          Piano Roll
        </button>
        <button class="header-btn" (click)="setActiveView('drum-machine')">
          Drums
        </button>
        <button class="header-btn" (click)="setActiveView('performer')">
          THE PERFORMER
        </button>
        <button class="header-btn" (click)="toggleNeuralFoundry()">
          Neural Foundry
        </button>
      </div>
    </header>

    <app-transport-bar></app-transport-bar>

    <main class="studio-workspace">
      <div class="view-wrapper" [class.hidden]="activeView() !== 'dj'">
        <app-arrangement-view></app-arrangement-view>
        <app-dj-deck></app-dj-deck>
      </div>

      <div class="view-wrapper" [class.hidden]="activeView() !== 'mixer'">
        <app-mixer></app-mixer>
      </div>

      <div class="view-wrapper" [class.hidden]="activeView() !== 'piano-roll'">
        <app-channel-rack></app-channel-rack>
        <app-piano-roll></app-piano-roll>
      </div>

      <div
        class="view-wrapper"
        [class.hidden]="activeView() !== 'drum-machine'"
      >
        <app-drum-machine></app-drum-machine>
      </div>

      <div
        class="view-wrapper"
        [class.hidden]="activeView() !== 'performer'"
      >
        <app-performer></app-performer>
      </div>

      <div class="view-wrapper" [class.hidden]="activeView() !== 'mastering'">
        <app-mastering-suite></app-mastering-suite>
      </div>

      <div class="view-wrapper" [class.hidden]="activeView() !== 'vocal-suite'">
        <app-vocal-suite></app-vocal-suite>
      </div>
    </main>
  </div>
</div>
