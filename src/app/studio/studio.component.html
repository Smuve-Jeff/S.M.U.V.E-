<div class="studio-container bg-[#020617] text-slate-200 font-sans selection:bg-emerald-500/30 h-screen flex flex-col">
  <!-- Top Navigation / Transport -->
  <header class="studio-header border-b border-white/5 bg-slate-950/80 backdrop-blur-xl px-6 py-2 flex items-center justify-between sticky top-0 z-[100] shadow-2xl">
    <div class="flex items-center gap-6">
      <div class="flex flex-col">
        <h1 class="text-sm font-black uppercase tracking-[0.2em] text-emerald-500 italic">S.M.U.V.E Studio</h1>
        <div class="text-[9px] text-slate-500 font-mono uppercase tracking-tighter">Production Environment v3.0</div>
      </div>
      <div class="h-8 w-px bg-white/10"></div>
      <app-transport-bar></app-transport-bar>
    </div>

    <div class="flex items-center gap-4">
      <div class="flex items-center bg-black/40 rounded-xl p-1 border border-white/5 mr-4">
         <button (click)="activeView.set('daw')"
                 [class.bg-emerald-500]="activeView() === 'daw'"
                 [class.text-black]="activeView() === 'daw'"
                 class="px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">Playlist</button>
         <button (click)="activeView.set('rack')"
                 [class.bg-emerald-500]="activeView() === 'rack'"
                 [class.text-black]="activeView() === 'rack'"
                 class="px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">Rack</button>
         <button (click)="activeView.set('mixer')"
                 [class.bg-emerald-500]="activeView() === 'mixer'"
                 [class.text-black]="activeView() === 'mixer'"
                 class="px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">Mixer</button>
      </div>

      <div class="flex items-center gap-3">
        <button (click)="showPianoRoll.set(!showPianoRoll())" class="w-10 h-10 rounded-xl bg-slate-900 border border-white/5 flex items-center justify-center text-emerald-500 hover:bg-emerald-500 hover:text-black transition-all">
          <i class="fas fa-keyboard text-xs"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="main-view flex-grow relative overflow-hidden h-full">
    <!-- PLAYLIST / ARRANGEMENT VIEW -->
    <div class="playlist-view h-full p-4" [class.hidden]="activeView() !== 'daw'">
       <app-arrangement-view></app-arrangement-view>
    </div>

    <!-- CHANNEL RACK VIEW -->
    <div class="rack-view h-full flex items-center justify-center p-8 bg-black/20" [class.hidden]="activeView() !== 'rack'">
       <div class="w-full max-w-4xl h-[600px]">
         <app-channel-rack></app-channel-rack>
       </div>
    </div>

    <!-- MIXER VIEW -->
    <div class="mixer-view h-full" [class.hidden]="activeView() !== 'mixer'">
       <app-mixer></app-mixer>
    </div>

    <!-- FLOATING PIANO ROLL -->
    <div class="absolute inset-0 z-[200] flex items-center justify-center p-12 pointer-events-none" *ngIf="showPianoRoll()">
       <div class="w-full h-full max-w-6xl pointer-events-auto shadow-[0_50px_100px_rgba(0,0,0,0.9)] rounded-3xl">
         <app-piano-roll></app-piano-roll>
       </div>
    </div>

    <!-- RECORDING MONITOR -->
    <div class="absolute bottom-12 right-12 z-[300] w-96 shadow-2xl" *ngIf="isRecording()">
       <app-waveform-renderer></app-waveform-renderer>
    </div>
  </main>

  <footer class="bg-slate-950 border-t border-white/10 px-6 py-2 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] relative z-[100]">
    <app-master-controls></app-master-controls>
  </footer>
</div>
