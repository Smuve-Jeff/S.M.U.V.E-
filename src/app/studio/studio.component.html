<div
  class="studio-container {{ studioQualityClass() }}" 
  [class.header-collapsed]="headerCollapsed()"
  [class.holographic]="uiService.holographicMode()"
  [attr.data-theme]="'analog-v42'"
  [class.mobile-drawer-open]="mobileDrawerOpen()"
  [class.mobile-mode]="uiService.isCompactMobile()"
>
  <div class="studio-shell">
    <!-- Offline Indicator -->
    <app-offline-indicator></app-offline-indicator>



    <!-- Header Toggle -->
    <button type="button" class="header-toggle" (click)="toggleHeader()" [class.floating]="headerCollapsed()" [title]="headerCollapsed() ? 'Expand Header' : 'Collapse Header'">
      <span class="material-symbols-outlined">{{ headerCollapsed() ? 'expand_more' : 'expand_less' }}</span>
    </button>

    <!-- Elite Unified Header (FL Studio Emulated) -->
    <header class="studio-transport elite-unified-header" [class.collapsed]="headerCollapsed()">
      <div class="header-section-left">
        <div class="transport-brand">
          <button *ngIf="uiService.isCompactMobile()" type="button" class="mobile-drawer-toggle" (click)="toggleMobileDrawer()">
            <span class="material-symbols-outlined">menu</span>
          </button>
          <h1>SMUVE</h1>
          <p>PRO</p>
        </div>

        <!-- Compact View Switcher (Desktop Only) -->
        <nav class="compact-view-tabs" *ngIf="!uiService.isCompactMobile()">
          <button [class.active]="activeView() === 'arrangement'" (click)="setActiveView('arrangement')" title="Playlist">
            <span class="material-symbols-outlined">view_quilt</span>
          </button>
          <button [class.active]="activeView() === 'piano-roll'" (click)="setActiveView('piano-roll')" title="Piano Roll">
            <span class="material-symbols-outlined">piano</span>
          </button>
          <button [class.active]="activeView() === 'drum-machine'" (click)="setActiveView('drum-machine')" title="Channel Rack">
            <span class="material-symbols-outlined">grid_view</span>
          </button>
          <button [class.active]="activeView() === 'mixer'" (click)="setActiveView('mixer')" title="Mixer">
            <span class="material-symbols-outlined">tune</span>
          </button>
          <button [class.active]="activeView() === 'performance'" (click)="setActiveView('performance')" title="Performance">
            <span class="material-symbols-outlined">interpreter_mode</span>
          </button>
          <div class="v-divider"></div>
          <button [class.active]="activeView() === 'dj'" (click)="setActiveView('dj')" title="DJ Deck">
            <span class="material-symbols-outlined">album</span>
          </button>
          <button [class.active]="activeView() === 'mastering'" (click)="setActiveView('mastering')" title="Mastering">
            <span class="material-symbols-outlined">speed</span>
          </button>
        </nav>
      </div>

      <div class="transport-actions modular-group">
        <div class="btn-group">
          <button type="button" class="export-btn" (click)="musicManager.exportProject()" title="Export">
            <span class="material-symbols-outlined">download</span>
          </button>
          <button type="button" class="import-btn" (click)="fileInput.click()" title="Import">
            <span class="material-symbols-outlined">upload</span>
          </button>
        </div>

        <div class="v-divider"></div>

        <div class="btn-group transport-controls">
          <button
            type="button"
            [class.active]="audioSession.isPlaying()"
            (click)="audioSession.togglePlay()"
          >
            <span class="material-symbols-outlined">{{ audioSession.isPlaying() ? 'pause' : 'play_arrow' }}</span>
          </button>
          <button type="button" (click)="audioSession.stop()">
            <span class="material-symbols-outlined">stop</span>
          </button>
          <button
            type="button"
            class="record"
            [class.active]="audioSession.isRecording()"
            (click)="audioSession.toggleRecord()"
          >
            <span class="material-symbols-outlined">fiber_manual_record</span>
          </button>
        </div>
      </div>

      <div class="header-section-right">
        <div class="transport-metrics compact-metrics">
          <div class="metric-block" (click)="adjustBpm()">
            <span class="label">BPM</span>
            <span class="value">{{ audioEngine.tempo() }}</span>
          </div>
          <div class="metric-block">
            <span class="label">BAR</span>
            <span class="value">{{ currentBar() }}</span>
          </div>
        </div>

        <button type="button" class="foundry-toggle-btn" (click)="toggleNeuralFoundry()" title="Neural Foundry">
          <span class="material-symbols-outlined">psychology</span>
        </button>
      </div>

      <input #fileInput type="file" accept=".json" class="hidden" (change)="handleImport($event)">
    </header>

    <!-- Slide-out Drawer for Module Switching (Mobile Only) -->
    <div class="mobile-drawer-overlay" *ngIf="mobileDrawerOpen()" (click)="toggleMobileDrawer()"></div>
    <aside class="mobile-module-drawer" [class.open]="mobileDrawerOpen()">
      <header>
        <span class="brand-text">S.M.U.V.E.</span>
        <button type="button" (click)="toggleMobileDrawer()"><span class="material-symbols-outlined">close</span></button>
      </header>
      <nav class="drawer-nav">
        <button type="button" [class.active]="activeView() === 'arrangement'" (click)="setActiveView('arrangement')">
          <span class="material-symbols-outlined">view_quilt</span> Arrangement
        </button>
        <button type="button" [class.active]="activeView() === 'piano-roll'" (click)="setActiveView('piano-roll')">
          <span class="material-symbols-outlined">piano</span> Piano Roll
        </button>
        <button type="button" [class.active]="activeView() === 'drum-machine'" (click)="setActiveView('drum-machine')">
          <span class="material-symbols-outlined">grid_view</span> Drum Machine
        </button>
        <button type="button" [class.active]="activeView() === 'mixer'" (click)="setActiveView('mixer')">
          <span class="material-symbols-outlined">tune</span> Mixer
        </button>
        <button type="button" [class.active]="activeView() === 'mastering'" (click)="setActiveView('mastering')">
          <span class="material-symbols-outlined">speed</span> Mastering
        </button>
        <button type="button" [class.active]="activeView() === 'performance'" (click)="setActiveView('performance')">
          <span class="material-symbols-outlined">interpreter_mode</span> Performance
        </button>
        <button type="button" [class.active]="activeView() === 'dj'" (click)="setActiveView('dj')">
          <span class="material-symbols-outlined">album</span> DJ Deck
        </button>
      </nav>
      <footer>
        <button type="button" (click)="toggleNeuralFoundry()">
          <span class="material-symbols-outlined">psychology</span> Neural Foundry
        </button>
      </footer>
    </aside>

    <app-universal-master class="studio-master-strip"></app-universal-master>



    <div
      class="studio-layout" [class.browser-collapsed]="browserCollapsed()" [class.inspector-collapsed]="inspectorCollapsed()"
      [class.compact-mobile-layout]="uiService.isCompactMobile()"
    >
      <!-- Mobile Quick Tools Toggle -->
      <div class="mobile-tool-tabs" *ngIf="uiService.isCompactMobile()">
        <button type="button" [class.active]="mobilePanel() === 'browser'" (click)="toggleMobilePanel('browser')">
          <span class="material-symbols-outlined">library_music</span>
        </button>
        <button type="button" [class.active]="mobilePanel() === 'inspector'" (click)="toggleMobilePanel('inspector')">
          <span class="material-symbols-outlined">info</span>
        </button>
        <div class="view-indicator">{{ activeView() | uppercase }}</div>
      </div>

      <!-- Slide-over Utility Drawers (Mobile) -->
      <section
        class="mobile-utility-drawer no-scrollbar"
        [class.open]="uiService.isCompactMobile() && mobilePanel() !== null"
      >
        <header *ngIf="mobilePanel() as panel">
          <span class="drawer-title">{{ panel === 'browser' ? 'SOUNDS' : 'INSPECTOR' }}</span>
          <button type="button" class="close-drawer" (click)="closeMobilePanel()">
            <span class="material-symbols-outlined">close</span>
          </button>
        </header>

        <div class="drawer-content" [ngSwitch]="mobilePanel()">
          <app-sound-browser *ngSwitchCase="'browser'"></app-sound-browser>
          <app-track-inspector *ngSwitchCase="'inspector'"></app-track-inspector>
        </div>
      </section>

      <!-- Desktop Sidebar Panels -->
      <aside
        class="studio-panel studio-browser"
        *ngIf="!uiService.isCompactMobile()"
        [style.width.px]="browserWidth()"
      >
        <div class="panel-resizer resizer-right" (pointerdown)="startResizing($event, 'browser')"></div>
        <header>
          <span *ngIf="!browserCollapsed()">Browser</span>
          <button type="button" class="panel-toggle" (click)="toggleBrowser()" [title]="browserCollapsed() ? 'Expand Browser' : 'Collapse Browser'">
            <span class="material-symbols-outlined">{{ browserCollapsed() ? 'chevron_right' : 'chevron_left' }}</span>
          </button>
        </header>
        <app-sound-browser></app-sound-browser>
      </aside>

      <main class="studio-workspace" [ngSwitch]="activeView()">
        <div class="view-wrapper" *ngSwitchCase="'drum-machine'">
          <app-drum-machine class="arrangement-main"></app-drum-machine>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'mixer'">
          <app-mixer class="arrangement-main"></app-mixer>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'performance'">
          <app-performer class="arrangement-main"></app-performer>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'mastering'">
          <app-mastering-suite class="arrangement-main"></app-mastering-suite>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'arrangement'">
          <app-arrangement-view class="arrangement-main"></app-arrangement-view>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'dj'">
          <app-dj-deck class="arrangement-main"></app-dj-deck>
        </div>
        <div class="view-wrapper" *ngSwitchCase="'piano-roll'">
          <div class="editor-stack">
            <app-channel-rack class="editor-channel-rack" *ngIf="!uiService.isCompactMobile()"></app-channel-rack>
            <app-piano-roll class="editor-main"></app-piano-roll>
          </div>
        </div>
      </main>

      <aside
        class="studio-panel studio-inspector"
        *ngIf="!uiService.isCompactMobile()"
        [style.width.px]="inspectorWidth()"
      >
        <div class="panel-resizer resizer-left" (pointerdown)="startResizing($event, 'inspector')"></div>
        <header>
          <button type="button" class="panel-toggle" (click)="toggleInspector()" [title]="inspectorCollapsed() ? 'Expand Inspector' : 'Collapse Inspector'">
            <span class="material-symbols-outlined">{{ inspectorCollapsed() ? 'chevron_left' : 'chevron_right' }}</span>
          </button>
          <span *ngIf="!inspectorCollapsed()">Inspector</span>
        </header>
        <app-track-inspector></app-track-inspector>
      </aside>
    </div>
  </div>

  <!-- Bottom Navigation (Mobile Only) -->
  <app-bottom-nav
    *ngIf="uiService.isCompactMobile()"
    [items]="bottomNavItems()"
    [activeId]="activeView()"
    (itemClick)="onBottomNavClick($event)"
  ></app-bottom-nav>

  <!-- Floating Action Button -->
  <app-fab
    *ngIf="uiService.isCompactMobile() && showFab()"
    [icon]="fabIcon()"
    [visible]="showFab()"
    (fabClick)="onFabClick()"
  ></app-fab>

  <!-- Search Overlay -->
  <app-search-overlay></app-search-overlay>

  <!-- Snackbar -->
  <app-snackbar></app-snackbar>
</div>
