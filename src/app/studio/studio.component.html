<div class="flex flex-col h-screen bg-[#1a1a1a] text-slate-100 overflow-hidden animate-fade-in film-grain">
  <!-- Industrial Header -->
  <header class="glass-panel-industrial px-10 py-6 flex items-center justify-between border-b-4 border-danger-orange/20 z-50 shadow-[0_10px_40px_rgba(0,0,0,0.9)] relative">
    <div class="absolute inset-0 scanline opacity-10 pointer-events-none"></div>
    <div class="flex items-center gap-10 relative z-10">
      <div class="flex flex-col">
        <h1 class="text-xl font-black uppercase tracking-[0.3em] text-danger-orange italic drop-shadow-[0_0_10px_#f48525]">Industrial Engine</h1>
        <div class="text-[10px] text-white/40 font-mono uppercase tracking-widest font-black flex items-center gap-2">
           <span class="size-1.5 rounded-full bg-danger-orange animate-pulse"></span>
           Tactical Production Suite v4.0
        </div>
      </div>
      <div class="h-14 w-1 bg-white/5 skew-x-[-20deg]"></div>
      <app-transport-bar></app-transport-bar>
    </div>

    <!-- Nixie Tube BPM Display -->
    <div class="flex items-center gap-4 bg-black/80 rounded-2xl p-4 border-2 border-industrial-steel shadow-inner relative group cursor-crosshair">
       <div class="flex gap-2">
          <div *ngFor="let digit of [1,2,8]" class="size-12 rounded-lg bg-danger-orange/5 border border-danger-orange/20 flex items-center justify-center">
             <span class="text-3xl font-mono text-danger-orange italic drop-shadow-[0_0_15px_#f48525]">{{ digit }}</span>
          </div>
       </div>
       <span class="text-[9px] font-black uppercase tracking-[0.4em] text-white/40 italic">BPM_SYNC</span>
    </div>

    <div class="flex items-center gap-4 relative z-10">
      <button (click)="showRack.set(!showRack())" [class.text-danger-orange]="showRack()" class="size-14 rounded-2xl glass-panel-industrial flex items-center justify-center hover:bg-danger-orange/10 transition-all shadow-2xl border-industrial-steel group">
        <span class="material-symbols-outlined text-3xl group-hover:rotate-90 transition-transform">grid_view</span>
      </button>
      <button (click)="showMixer.set(!showMixer())" [class.text-danger-orange]="showMixer()" class="size-14 rounded-2xl glass-panel-industrial flex items-center justify-center hover:bg-danger-orange/10 transition-all shadow-2xl border-industrial-steel group">
        <span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform">tune</span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow relative flex flex-col h-full overflow-hidden">

    <!-- DAW VIEW -->
    <div class="flex-grow flex flex-col h-full" *ngIf="activeView() === 'daw'">
      <div class="flex-grow relative overflow-hidden bg-black/40">
        <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(#fff 1px, transparent 0); background-size: 80px 80px;"></div>
        <app-arrangement-view class="h-full"></app-arrangement-view>
      </div>

      <!-- Bottom Dock: Brutalist Hardware -->
      <div class="glass-panel-industrial border-t-4 border-industrial-steel transition-all overflow-hidden" [style.height]="showMixer() || showRack() || showPianoRoll() ? '45%' : '0px'">
        <div class="flex h-full overflow-hidden bg-[#121212]">
          <div class="w-[500px] border-r-4 border-industrial-steel overflow-hidden bg-black/20" *ngIf="showRack()">
             <div class="bg-industrial-steel/40 px-6 py-2 border-b-2 border-danger-orange/20 flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-danger-orange tracking-widest italic flex items-center gap-3">
                   <span class="size-2 rounded-full bg-danger-orange"></span>
                   SCHEMATIC_SEQUENCER_01
                </span>
                <div class="flex gap-2">
                   <div class="size-2 rounded bg-industrial-steel"></div>
                   <div class="size-2 rounded bg-danger-orange/40"></div>
                </div>
             </div>
            <app-channel-rack class="h-full"></app-channel-rack>
          </div>
          <div class="flex-grow overflow-hidden relative" *ngIf="showMixer()">
            <app-mixer class="h-full"></app-mixer>
          </div>
        </div>
      </div>
    </div>

    <!-- DJ BOOTH -->
    <div class="h-full overflow-y-auto" *ngIf="activeView() === 'dj'">
       <app-dj-deck></app-dj-deck>
    </div>

    <!-- MASTERING -->
    <div class="h-full p-16 flex flex-col items-center justify-center bg-black/80 relative" *ngIf="activeView() === 'mastering'">
      <div class="max-w-6xl w-full grid grid-cols-2 gap-16 animate-fade-in relative z-10">
        <div class="space-y-10">
           <h2 class="text-6xl font-black uppercase tracking-tighter text-white italic">Signal <span class="text-danger-orange underline decoration-danger-orange/20">Finalization</span></h2>
           <p class="text-lg text-white/40 leading-relaxed italic font-medium">Inject industrial-grade spectral cohesion into your master bus. Zero compromise on dynamic intensity.</p>

           <div class="grid grid-cols-2 gap-8">
              <div *ngFor="let s of [{l:'Dynamic Range', v:'12.4dB'}, {l:'LUFS Target', v:'-8.0'}]" class="p-8 bg-industrial-steel/20 border-l-4 border-danger-orange rounded-r-2xl">
                 <p class="text-[10px] font-black text-danger-orange uppercase tracking-widest mb-2 italic">{{ s.l }}</p>
                 <p class="text-4xl font-mono text-white font-black">{{ s.v }}</p>
              </div>
           </div>
        </div>

        <div class="glass-panel-industrial rounded-[3rem] p-12 border-industrial-steel shadow-2xl flex flex-col justify-between">
           <div class="space-y-12">
              <div class="h-10 bg-black rounded-xl border-2 border-industrial-steel overflow-hidden p-1 shadow-inner relative">
                 <div class="h-full bg-gradient-to-r from-danger-orange/40 via-danger-orange to-red-600 rounded-lg w-[85%] shadow-[0_0_20px_#f48525]"></div>
              </div>
              <div class="h-48 glass-panel-industrial rounded-3xl p-6 border-white/5">
                 <canvas id="masterAnalyzerCanvas" class="w-full h-full opacity-60"></canvas>
              </div>
           </div>
           <button class="w-full py-6 bg-danger-orange text-black font-black uppercase tracking-[0.4em] italic text-sm rounded-2xl hover:scale-105 transition-all shadow-[0_0_50px_rgba(244,133,37,0.3)] mt-12" (click)="executeMastering()">
             Execute Industrial Master
           </button>
        </div>
      </div>
    </div>
  </main>

  <footer class="glass-panel-industrial border-t-4 border-industrial-steel px-10 py-4 shadow-2xl z-50 bg-[#121212]">
    <app-master-controls></app-master-controls>
  </footer>

  <!-- Piano Roll Modal: Tactical Grid -->
  <div class="absolute inset-0 z-[200] flex items-center justify-center p-20 pointer-events-none" *ngIf="showPianoRoll()">
    <div class="w-full h-full max-w-7xl pointer-events-auto glass-panel-industrial shadow-[0_0_100px_rgba(0,0,0,0.9)] rounded-[3.5rem] border-4 border-industrial-steel overflow-hidden flex flex-col">
      <div class="bg-industrial-steel px-10 py-5 flex items-center justify-between border-b-4 border-danger-orange/20">
        <div class="flex items-center gap-6">
          <span class="material-symbols-outlined text-danger-orange text-3xl animate-pulse">keyboard_command_key</span>
          <span class="text-sm font-black uppercase tracking-[0.5em] text-white italic">Tactical_MIDI_Schematic_V4</span>
        </div>
        <button (click)="showPianoRoll.set(false)" class="size-12 rounded-xl glass-panel-industrial border-white/10 text-slate-500 hover:text-danger-orange transition-all flex items-center justify-center">
           <span class="material-symbols-outlined text-3xl">close</span>
        </button>
      </div>
      <app-piano-roll class="flex-grow h-full bg-black/60"></app-piano-roll>
    </div>
  </div>
</div>
