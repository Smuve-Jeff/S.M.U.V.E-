<div
  class="studio-container {{ studioQualityClass() }}"
  [class.holographic]="uiService.holographicMode()"
  [attr.data-theme]="'analog-v42'"
>
  <div class="studio-shell">
    <header class="studio-transport">
      <div class="transport-brand">
        <h1>SMUVE Studio</h1>
        <p>Production workspace</p>
      </div>
      <div class="transport-actions">
        <button
          type="button"
          [class.active]="audioSession.isPlaying()"
          (click)="audioSession.togglePlay()"
        >
          {{ audioSession.isPlaying() ? 'Pause' : 'Play' }}
        </button>
        <button type="button" (click)="audioSession.stop()">Stop</button>
        <button
          type="button"
          class="record"
          [class.active]="audioSession.isRecording()"
          (click)="audioSession.toggleRecord()"
        >
          Rec
        </button>
      </div>
      <div class="transport-metrics">
        <div>
          <span>BPM</span>
          <strong>{{ audioEngine.tempo() }}</strong>
        </div>
        <div>
          <span>BAR</span>
          <strong>{{ currentBar() }}</strong>
        </div>
      </div>
    </header>

    <app-universal-master class="studio-master-strip"></app-universal-master>

    <nav
      class="studio-view-tabs no-scrollbar"
      *ngIf="!uiService.isCompactMobile()"
    >
      <button
        [class.active]="activeView() === 'dj'"
        (click)="setActiveView('dj')"
      >
        Arrangement
      </button>
      <button
        [class.active]="activeView() === 'piano-roll'"
        (click)="setActiveView('piano-roll')"
      >
        Piano Roll
      </button>
      <button (click)="uiService.navigateToView('drum-machine')">
        Drum Machine
      </button>
      <button (click)="uiService.navigateToView('mixer')">Mixer</button>
      <button (click)="uiService.navigateToView('performance')">
        Performance
      </button>
      <button (click)="uiService.navigateToView('mastering')">Mastering</button>
    </nav>

    <div
      class="studio-layout"
      [class.compact-mobile-layout]="uiService.isCompactMobile()"
    >
      <div class="mobile-utility-bar" *ngIf="uiService.isCompactMobile()">
        <button
          type="button"
          [class.active]="mobilePanel() === 'browser'"
          (click)="toggleMobilePanel('browser')"
        >
          Sounds
        </button>
        <button
          type="button"
          [class.active]="mobilePanel() === 'inspector'"
          (click)="toggleMobilePanel('inspector')"
        >
          Inspector
        </button>
        <div class="mobile-view-chip">
          {{ activeView() === 'piano-roll' ? 'Piano Roll' : activeView() }}
        </div>
      </div>

      <section
        class="mobile-utility-panel no-scrollbar"
        *ngIf="uiService.isCompactMobile() && mobilePanel() as panel"
      >
        <header>
          <span>{{
            panel === 'browser' ? 'Sound Browser' : 'Track Inspector'
          }}</span>
          <button type="button" (click)="closeMobilePanel()">Close</button>
        </header>

        <app-sound-browser *ngIf="panel === 'browser'"></app-sound-browser>
        <app-track-inspector
          *ngIf="panel === 'inspector'"
        ></app-track-inspector>
      </section>

      <aside
        class="studio-panel studio-browser"
        *ngIf="!uiService.isCompactMobile()"
      >
        <header>Browser</header>
        <app-sound-browser></app-sound-browser>
      </aside>

      <main class="studio-workspace" [ngSwitch]="activeView()">
        <div class="view-wrapper" *ngSwitchCase="'dj'">
          <div class="arrangement-stack">
            <app-arrangement-view
              class="arrangement-main"
            ></app-arrangement-view>
            <app-dj-deck class="arrangement-dock"></app-dj-deck>
          </div>
        </div>

        <div class="view-wrapper" *ngSwitchCase="'piano-roll'">
          <div class="editor-stack">
            <app-channel-rack class="editor-channel-rack"></app-channel-rack>
            <app-piano-roll class="editor-main"></app-piano-roll>
          </div>
        </div>
      </main>

      <aside
        class="studio-panel studio-inspector"
        *ngIf="!uiService.isCompactMobile()"
      >
        <header>Inspector</header>
        <app-track-inspector></app-track-inspector>
      </aside>
    </div>
  </div>

  <nav
    class="mobile-bottom-nav no-scrollbar"
    *ngIf="uiService.isCompactMobile()"
  >
    <button
      [class.active]="activeView() === 'dj'"
      (click)="setActiveView('dj')"
    >
      Arrange
    </button>
    <button
      [class.active]="activeView() === 'piano-roll'"
      (click)="setActiveView('piano-roll')"
    >
      Piano
    </button>
    <button (click)="uiService.navigateToView('drum-machine')">Drums</button>
    <button (click)="uiService.navigateToView('mixer')">Mix</button>
    <button (click)="uiService.navigateToView('performance')">Perform</button>
    <button (click)="uiService.navigateToView('mastering')">Master</button>
  </nav>
</div>
