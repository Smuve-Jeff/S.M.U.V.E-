<div class="studio-container">
  <!-- Sidebar Navigation (FL Style) -->
  <aside class="fl-sidebar">
    <div class="sidebar-icon" [class.active]="activeView() === 'dj'" (click)="activeView.set('dj')">
      <span class="material-symbols-outlined">album</span>
      <span class="sidebar-label">DJ</span>
    </div>
    <div class="sidebar-icon" [class.active]="activeView() === 'mixer'" (click)="activeView.set('mixer')">
      <span class="material-symbols-outlined">equalizer</span>
      <span class="sidebar-label">Mixer</span>
    </div>
    <div class="sidebar-icon" [class.active]="activeView() === 'vocal-suite'" (click)="activeView.set('vocal-suite')">
      <span class="material-symbols-outlined">mic</span>
      <span class="sidebar-label">Vocals</span>
    </div>
    <div class="sidebar-icon" [class.active]="activeView() === 'mastering'" (click)="activeView.set('mastering')">
      <span class="material-symbols-outlined">compress</span>
      <span class="sidebar-label">Master</span>
    </div>
    <div class="sidebar-icon" [class.active]="activeView() === 'performance'" (click)="activeView.set('performance')">
      <span class="material-symbols-outlined">sensors</span>
      <span class="sidebar-label">Live</span>
    </div>
  </aside>

  <!-- Main Work Area -->
  <div class="main-content">
    <!-- Top Bar (Transport / Status) -->
    <header class="fl-top-bar px-4 flex items-center justify-between shrink-0 relative z-50">
       <div class="flex items-center gap-4">
          <div class="flex items-center gap-2 text-brand-primary">
             <span class="material-symbols-outlined text-xl">token</span>
             <h2 class="text-slate-100 text-xs font-black tracking-tight uppercase italic leading-none">STUDIO PRO <span class="text-brand-primary">v4</span></h2>
          </div>
          <div class="h-6 w-px bg-white/10"></div>
          <div class="flex items-center gap-3 bg-black/40 px-3 py-1 rounded border border-brand-primary/20">
             <span class="material-symbols-outlined text-brand-primary text-xs">schedule</span>
             <span class="text-brand-primary font-mono text-lg font-bold tracking-[0.1em]">{{ currentBeat().toFixed(0) }}</span>
          </div>
       </div>

       <div class="flex items-center gap-4">
          <div class="hidden md:flex flex-col items-end opacity-60 mr-4">
             <span class="text-[6px] font-black text-slate-500 uppercase tracking-widest leading-none mb-1">Neural Hub Status</span>
             <span class="text-[9px] font-bold text-white uppercase tracking-tight italic">{{ aiService.strategicDecrees()[0] }}</span>
          </div>
          <button (click)="aiService.performExecutiveAudit()" class="btn-pro btn-pro-primary text-[8px] font-black tracking-widest py-1 px-4 h-auto uppercase">
             Audit
          </button>
       </div>
    </header>

    <!-- CENTRAL PLAYLIST HUB -->
    <main class="playlist-hub bg-[#121212]">
      <!-- ALWAYS VISIBLE: Arrangement View (The Playlist) -->
      <div class="absolute inset-0 z-10">
         <app-arrangement-view></app-arrangement-view>
      </div>

      <!-- DJ VIEW OVERLAY -->
      <div class="absolute inset-0 z-20 transition-all duration-500"
           [class.opacity-100]="activeView() === 'dj'"
           [class.pointer-events-none]="activeView() !== 'dj'"
           [class.opacity-0]="activeView() !== 'dj'">
         <app-dj-deck></app-dj-deck>
      </div>

      <!-- MIXER VIEW OVERLAY -->
      <div class="absolute inset-0 z-20 transition-all duration-500"
           [class.opacity-100]="activeView() === 'mixer'"
           [class.pointer-events-none]="activeView() !== 'mixer'"
           [class.opacity-0]="activeView() !== 'mixer'">
         <app-mixer></app-mixer>
      </div>

      <!-- VOCAL SUITE VIEW OVERLAY -->
      <div class="absolute inset-0 z-20 transition-all duration-500"
           [class.opacity-100]="activeView() === 'vocal-suite'"
           [class.pointer-events-none]="activeView() !== 'vocal-suite'"
           [class.opacity-0]="activeView() !== 'vocal-suite'">
         <app-vocal-suite></app-vocal-suite>
      </div>

      <!-- MASTERING VIEW OVERLAY -->
      <div class="absolute inset-0 z-20 transition-all duration-500"
           [class.opacity-100]="activeView() === 'mastering'"
           [class.pointer-events-none]="activeView() !== 'mastering'"
           [class.opacity-0]="activeView() !== 'mastering'">
         <app-mastering-suite></app-mastering-suite>
      </div>

      <!-- PERFORMANCE VIEW OVERLAY -->
      <div class="absolute inset-0 z-20 transition-all duration-500"
           [class.opacity-100]="activeView() === 'performance'"
           [class.pointer-events-none]="activeView() !== 'performance'"
           [class.opacity-0]="activeView() !== 'performance'">
        <div class="absolute inset-0 flex items-center justify-center bg-black/80">
          <div class="text-center p-8 glass-card rounded-3xl border border-brand-primary/20 max-w-sm animate-enter mx-4">
             <span class="material-symbols-outlined !text-4xl text-brand-primary mb-6 animate-pulse">sensors</span>
             <h2 class="text-lg font-black text-white uppercase tracking-widest mb-4">Performance Rehearsal</h2>
             <button (click)="uiService.navigateToView('practice')" class="btn-pro btn-pro-primary text-[10px] font-black uppercase w-full py-3">Open Practice Space</button>
          </div>
        </div>
      </div>

      <!-- THE SLIDING EDITORS (Piano Roll / Drum Machine) -->
      <!-- Piano Roll (Triggered when track/clip selected) -->
      <div class="fl-editor-overlay" [class.visible]="showPianoRoll()">
         <div class="editor-header">
            <div class="flex items-center gap-3">
               <span class="material-symbols-outlined text-emerald-400 text-sm">grid_on</span>
               <span class="text-[10px] font-black text-white uppercase tracking-widest">Piano Roll</span>
            </div>
            <button (click)="showPianoRoll.set(false)" class="text-slate-500 hover:text-white transition-colors">
               <span class="material-symbols-outlined text-sm">close</span>
            </button>
         </div>
         <div class="flex-grow overflow-hidden">
            <app-piano-roll></app-piano-roll>
         </div>
      </div>

      <!-- Drum Machine (Triggered manually or by clip) -->
      <div class="fl-editor-overlay" [class.visible]="activeView() === 'drum-machine'">
         <div class="editor-header">
            <div class="flex items-center gap-3">
               <span class="material-symbols-outlined text-pink-400 text-sm">apps</span>
               <span class="text-[10px] font-black text-white uppercase tracking-widest">Drum Machine</span>
            </div>
            <button (click)="activeView.set('dj')" class="text-slate-500 hover:text-white transition-colors">
               <span class="material-symbols-outlined text-sm">close</span>
            </button>
         </div>
         <div class="flex-grow overflow-hidden">
            <app-drum-machine></app-drum-machine>
         </div>
      </div>
    </main>

    <!-- TRANSPORT CONTROL (FL Style Bottom Bar) -->
    <app-transport-bar class="shrink-0 border-t border-white/5"></app-transport-bar>
  </div>
</div>
