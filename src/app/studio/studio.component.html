<div class="studio-container" [class.header-collapsed]="headerCollapsed()">
  <!-- Main Studio Shell -->
  <div class="studio-shell flex flex-col h-full overflow-hidden bg-slate-950">
    <!-- Elite Unified Header v5 -->
    <header class="elite-header wood-panel z-[1000]">
      <div class="header-section-left flex items-center gap-4">
        <button
          type="button"
          class="tactile-v42 p-2"
          (click)="toggleMobileDrawer()"
          *ngIf="uiService.isCompactMobile()"
        >
          <span class="material-symbols-outlined text-sm">menu</span>
        </button>
        <div class="brand-logo flex items-center gap-2" (click)="newProject()">
          <div
            class="w-2 h-2 rounded-full bg-fl-blue shadow-[0_0_10px_#00e5ff] animate-pulse"
          ></div>
          <span class="neon-text-sm font-black tracking-[0.3em] uppercase"
            >S.M.U.V.E. PRO</span
          >
        </div>
        <div class="v-divider h-6 w-px bg-white/10 hidden md:block"></div>

        <div class="btn-group transport-controls flex gap-1">
          <button
            type="button"
            class="tactile-v42 px-3 py-1 flex items-center"
            [class.active]="audioSession.isPlaying()"
            (click)="audioSession.togglePlay()"
          >
            <span class="material-symbols-outlined text-sm">{{
              audioSession.isPlaying() ? 'pause' : 'play_arrow'
            }}</span>
          </button>
          <button
            type="button"
            class="tactile-v42 px-3 py-1 flex items-center"
            (click)="audioSession.stop()"
          >
            <span class="material-symbols-outlined text-sm">stop</span>
          </button>
          <button
            type="button"
            class="tactile-v42 rec px-3 py-1 flex items-center"
            [class.active]="audioSession.isRecording()"
            (click)="audioSession.toggleRecord()"
          >
            <span class="material-symbols-outlined text-sm"
              >fiber_manual_record</span
            >
          </button>
        </div>
      </div>

      <div class="header-section-center flex-1 flex justify-center">
        <div class="lcd-display" (click)="adjustBpm()">
          <div class="lcd-metric border-r border-white/5 pr-3">
            <span class="lcd-label">TEMPO</span>
            <span class="lcd-value">{{ audioEngine.tempo() }}</span>
          </div>
          <div class="lcd-metric pl-3">
            <span class="lcd-label">BAR</span>
            <span class="lcd-value">{{ currentBar() }}</span>
          </div>
        </div>
      </div>

      <div class="header-section-right flex items-center gap-3">
        <button
          type="button"
          class="tactile-v42 p-2"
          (click)="copyShareLink()"
          title="Share Studio Link"
        >
          <span class="material-symbols-outlined text-sm">share</span>
        </button>

        <div
          class="hardware-status-indicator flex items-center gap-2 px-3 py-1 rounded bg-black/40 border border-white/5 cursor-help"
          [title]="
            hardware.status().activeInterfaceName || 'No Interface Detected'
          "
        >
          <div
            class="w-1.5 h-1.5 rounded-full shadow-[0_0_5px]"
            [class.bg-green-400]="hardware.status().audioInterfaceConnected"
            [class.shadow-green-500]="hardware.status().audioInterfaceConnected"
            [class.bg-red-900]="!hardware.status().audioInterfaceConnected"
          ></div>
          <span
            class="text-[8px] font-black uppercase tracking-tighter"
            [class.text-green-400]="hardware.status().audioInterfaceConnected"
            [class.text-slate-600]="!hardware.status().audioInterfaceConnected"
          >
            {{
              hardware.status().audioInterfaceConnected
                ? 'Interface Ready'
                : 'Analog In'
            }}
          </span>
        </div>
        <div
          class="quality-badge hidden md:flex items-center gap-1.5 px-2 py-1 rounded bg-black/40 border border-white/5"
        >
          <div
            class="w-1 h-1 rounded-full"
            [class.bg-green-500]="audioEngine.performanceTier() === 'ultra'"
          ></div>
          <span class="text-[7px] font-black text-slate-500 uppercase">{{
            audioEngine.performanceTier()
          }}</span>
        </div>
        <button
          type="button"
          class="tactile-v42 p-2"
          [class.active]="collaboration.currentSession()"
          (click)="toggleCollaboration()"
          title="Real-time Collaboration"
        >
          <span
            class="material-symbols-outlined text-sm"
            [style.color]="
              collaboration.currentSession() ? '#22c55e' : 'inherit'
            "
            >group</span
          >
        </button>
        <button
          type="button"
          class="foundry-toggle-btn tactile-v42 p-2"
          (click)="toggleNeuralFoundry()"
          title="Neural Foundry"
        >
          <span class="material-symbols-outlined text-sm">psychology</span>
        </button>
      </div>
    </header>

    <!-- Navigation Drawer (Mobile) -->
    <div
      class="mobile-drawer-overlay"
      *ngIf="mobileDrawerOpen()"
      (click)="toggleMobileDrawer()"
    ></div>
    <aside class="mobile-module-drawer" [class.open]="mobileDrawerOpen()">
      <header class="wood-panel p-4 flex justify-between items-center">
        <span
          class="brand-text neon-text text-[10px] font-black tracking-widest uppercase"
          >Navigation</span
        >
        <button
          type="button"
          class="tactile-v42 p-1"
          (click)="toggleMobileDrawer()"
        >
          <span class="material-symbols-outlined text-sm">close</span>
        </button>
      </header>
      <nav class="drawer-nav p-4 flex flex-col gap-2">
        <button
          *ngFor="let item of bottomNavItems()"
          (click)="setActiveView(item.id)"
          [class.active]="activeView() === item.id"
          class="flex items-center gap-3 p-3 rounded-lg bg-white/5 text-[9px] font-black uppercase"
        >
          <span class="material-symbols-outlined text-sm">{{ item.icon }}</span>
          {{ item.label }}
        </button>
      </nav>
    </aside>

    <div class="studio-main-layout flex-1 flex overflow-hidden">
      <!-- Desktop Navigation Sidebar -->
      <aside
        class="desktop-nav-sidebar wood-panel border-r border-black hidden md:flex flex-col gap-2 p-2 w-[64px] z-[900]"
      >
        <button
          *ngFor="let item of bottomNavItems()"
          (click)="setActiveView(item.id)"
          [class.active]="activeView() === item.id"
          class="nav-icon-btn tactile-v42 flex flex-col items-center justify-center gap-1 p-2 h-[56px] w-full"
          [title]="item.label"
        >
          <span class="material-symbols-outlined text-lg">{{ item.icon }}</span>
          <span class="text-[7px] font-black uppercase tracking-tighter">{{
            item.label
          }}</span>
        </button>
      </aside>

      <!-- Sidebar Browser (Desktop) -->
      <aside
        class="studio-panel studio-browser wood-panel border-r border-black"
        *ngIf="!uiService.isCompactMobile() && !browserCollapsed()"
        [style.width.px]="browserWidth()"
      >
        <header
          class="flex items-center justify-between px-3 py-1.5 bg-black/40 border-b border-white/5"
        >
          <span
            class="text-[8px] font-black text-slate-400 uppercase tracking-widest"
            >Browser</span
          >
          <button
            (click)="toggleBrowser()"
            class="opacity-40 hover:opacity-100"
          >
            <span class="material-symbols-outlined text-[12px]"
              >chevron_left</span
            >
          </button>
        </header>
        <app-sound-browser class="flex-1"></app-sound-browser>
      </aside>

      <!-- Main Workspace -->
      <main
        class="studio-workspace flex-1 flex flex-col min-w-0 bg-[#050507]"
        [ngSwitch]="activeView()"
      >
        <div
          class="view-wrapper flex-1 flex flex-col"
          *ngSwitchCase="'arrangement'"
        >
          <app-arrangement-view class="flex-1"></app-arrangement-view>
        </div>
        <div
          class="view-wrapper flex-1 flex flex-col"
          *ngSwitchCase="'piano-roll'"
        >
          <app-piano-roll class="flex-1"></app-piano-roll>
        </div>
        <div
          class="view-wrapper flex-1 flex flex-col"
          *ngSwitchCase="'drum-machine'"
        >
          <app-drum-machine class="flex-1"></app-drum-machine>
        </div>
        <div class="view-wrapper flex-1 flex flex-col" *ngSwitchCase="'mixer'">
          <app-mixer class="flex-1"></app-mixer>
        </div>
        <div
          class="view-wrapper flex-1 flex flex-col"
          *ngSwitchCase="'performance'"
        >
          <app-performer class="flex-1"></app-performer>
        </div>
        <div
          class="view-wrapper flex-1 flex flex-col"
          *ngSwitchCase="'mastering'"
        >
          <app-mastering-suite class="flex-1"></app-mastering-suite>
        </div>
      </main>

      <!-- Sidebar Inspector (Desktop) -->
      <aside
        class="studio-panel studio-inspector wood-panel border-l border-black"
        *ngIf="!uiService.isCompactMobile() && !inspectorCollapsed()"
        [style.width.px]="inspectorWidth()"
      >
        <header
          class="flex items-center justify-between px-3 py-1.5 bg-black/40 border-b border-white/5"
        >
          <button
            (click)="toggleInspector()"
            class="opacity-40 hover:opacity-100"
          >
            <span class="material-symbols-outlined text-[12px]"
              >chevron_right</span
            >
          </button>
          <span
            class="text-[8px] font-black text-slate-400 uppercase tracking-widest"
            >Inspector</span
          >
        </header>
        <app-track-inspector class="flex-1"></app-track-inspector>
      </aside>
    </div>

    <!-- Mobile Utility Toolbar -->
    <div
      class="mobile-tool-tabs wood-panel border-t border-black flex items-center justify-around px-4 md:hidden"
      *ngIf="uiService.isCompactMobile()"
    >
      <button
        type="button"
        [class.active]="mobilePanel() === 'browser'"
        (click)="toggleMobilePanel('browser')"
      >
        <span class="material-symbols-outlined text-sm">library_music</span>
      </button>
      <button
        type="button"
        [class.active]="mobilePanel() === 'fx-rack'"
        (click)="toggleMobilePanel('fx-rack')"
      >
        <span class="material-symbols-outlined text-sm">blur_on</span>
      </button>
      <button
        type="button"
        [class.active]="mobilePanel() === 'inspector'"
        (click)="toggleMobilePanel('inspector')"
      >
        <span class="material-symbols-outlined text-sm">info</span>
      </button>
    </div>

    <!-- Bottom Nav (Mobile) -->
    <app-bottom-nav
      *ngIf="uiService.isCompactMobile()"
      [items]="bottomNavItems()"
      [activeId]="activeView()"
      (itemClick)="onBottomNavClick($event)"
    ></app-bottom-nav>
  </div>

  <!-- Mobile Drawer Panels (Slide-up) -->
  <div
    class="mobile-utility-overlay fixed inset-0 bg-black/60 backdrop-blur-sm z-[500]"
    *ngIf="mobilePanel()"
    (click)="closeMobilePanel()"
  ></div>
  <section
    class="mobile-utility-drawer fixed bottom-0 left-0 right-0 h-[70dvh] bg-slate-950 z-[501] transition-transform duration-300 rounded-t-3xl border-t border-white/10 overflow-hidden flex flex-col"
    [class.translate-y-0]="mobilePanel()"
    [class.translate-y-full]="!mobilePanel()"
  >
    <header class="p-4 flex items-center justify-between wood-panel">
      <span class="text-[10px] font-black uppercase text-fl-blue">{{
        mobilePanel() | uppercase
      }}</span>
      <button (click)="closeMobilePanel()" class="tactile-v42 p-1">
        <span class="material-symbols-outlined text-sm">close</span>
      </button>
    </header>
    <div
      class="drawer-content flex-1 overflow-y-auto p-4"
      [ngSwitch]="mobilePanel()"
    >
      <app-sound-browser *ngSwitchCase="'browser'"></app-sound-browser>
      <app-track-inspector *ngSwitchCase="'inspector'"></app-track-inspector>
      <app-effects-rack-ui *ngSwitchCase="'fx-rack'"></app-effects-rack-ui>

      <!-- Templates View -->
      <div
        *ngSwitchCase="'templates'"
        class="templates-grid grid grid-cols-2 gap-4 p-2"
      >
        <div
          *ngFor="let t of templateService.templates"
          (click)="applyTemplate(t.id)"
          class="template-card tactile-v42 p-6 rounded-xl border border-white/10 flex flex-col items-center gap-4 hover:border-fl-blue transition-all cursor-pointer group"
        >
          <span
            class="material-symbols-outlined text-3xl text-slate-500 group-hover:text-fl-blue"
            >album</span
          >
          <span class="text-[10px] font-black uppercase text-center">{{
            t.name
          }}</span>
          <span class="text-[8px] text-slate-500">{{ t.bpm }} BPM</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Global Overlays -->
  <app-search-overlay></app-search-overlay>
  <app-snackbar></app-snackbar>
</div>
