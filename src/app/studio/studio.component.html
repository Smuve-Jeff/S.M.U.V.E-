<div class="comp-shell" [class.comp-compact]="uiService.isCompactMobile()" [attr.aria-label]="'S.M.U.V.E. Studio workspace'">
  <!-- ====================== TOP TRANSPORT ====================== -->
  <header class="comp-topbar" role="banner">
    <div class="comp-topbar-left">
      <button
        type="button"
        class="comp-icon-btn md:hidden"
        (click)="toggleMobileDrawer()"
        [attr.aria-label]="'Open navigation menu'"
        [attr.aria-expanded]="mobileDrawerOpen()"
      >
        <span class="material-symbols-outlined">menu</span>
      </button>
      <div class="comp-brand" (click)="newProject()" tabindex="0" role="button" [attr.aria-label]="'S.M.U.V.E. Composer Studio – tap to start new session'">
        <div class="comp-brand-mark" aria-hidden="true">
          <span class="comp-brand-pulse"></span>
        </div>
        <div class="comp-brand-text">
          <span class="comp-brand-name">S.M.U.V.E.</span>
          <span class="comp-brand-tag">Composer</span>
        </div>
      </div>
    </div>

    <app-transport-bar class="comp-topbar-center"></app-transport-bar>

    <div class="comp-topbar-right">
      <button
        type="button"
        class="comp-icon-btn"
        (click)="copyShareLink()"
        title="Share Studio Link"
        [attr.aria-label]="'Share Studio session link'"
      >
        <span class="material-symbols-outlined">share</span>
      </button>
      <button
        type="button"
        class="comp-icon-btn"
        [class.comp-active]="collaboration.currentSession()"
        (click)="toggleCollaboration()"
        [attr.aria-label]="
          collaboration.currentSession() ? 'Leave collaboration session' : 'Start collaboration session'
        "
        [attr.aria-pressed]="!!collaboration.currentSession()"
      >
        <span class="material-symbols-outlined">group</span>
      </button>
      <button
        type="button"
        class="comp-icon-btn comp-ai-btn"
        (click)="toggleAiAssistant()"
        [attr.aria-label]="'Toggle AI Assistant'"
        [attr.aria-expanded]="showAiAssistant()"
      >
        <span class="material-symbols-outlined">auto_awesome</span>
        <span class="comp-ai-pip" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <!-- ====================== MAIN WORKSPACE ====================== -->
  <main class="comp-main" role="main">
    <!-- Desktop view rail (FL Studio side rail pattern) -->
    <nav class="comp-rail" [class.comp-rail-collapsed]="railCollapsed()" aria-label="Studio view selector">
      <button
        *ngFor="let item of bottomNavItems()"
        type="button"
        class="comp-rail-item"
        [class.comp-rail-active]="activeView() === item.id"
        (click)="setActiveView(item.id)"
        [attr.aria-label]="'Switch to ' + item.label + ' view'"
        [attr.aria-pressed]="activeView() === item.id"
      >
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span class="comp-rail-label">{{ item.label }}</span>
      </button>
      <button
        type="button"
        class="comp-rail-item"
        (click)="toggleRail()"
        [attr.aria-label]="railCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
      >
        <span class="material-symbols-outlined">{{ railCollapsed() ? 'chevron_right' : 'chevron_left' }}</span>
        <span class="comp-rail-label">{{ railCollapsed() ? 'Expand' : 'Collapse' }}</span>
      </button>
    </nav>

    <!-- Active view canvas -->
    <section class="comp-canvas" [ngSwitch]="activeView()">
      <div class="comp-view" *ngSwitchCase="'arrangement'">
        <app-arrangement-view></app-arrangement-view>
      </div>
      <div class="comp-view" *ngSwitchCase="'piano-roll'">
        <app-piano-roll></app-piano-roll>
      </div>
      <div class="comp-view" *ngSwitchCase="'drum-machine'">
        <app-drum-machine></app-drum-machine>
      </div>
      <div class="comp-view" *ngSwitchCase="'mixer'">
        <app-mixer></app-mixer>
      </div>
      <div class="comp-view" *ngSwitchCase="'performance'">
        <app-performer></app-performer>
      </div>
      <div class="comp-view" *ngSwitchCase="'mastering'">
        <app-mastering-suite></app-mastering-suite>
      </div>
    </section>
  </main>

  <!-- ====================== BOTTOM TAB BAR (Mobile FL pattern) ====================== -->
  <nav class="comp-bottombar" *ngIf="uiService.isCompactMobile()" role="tablist" aria-label="Studio modules">
    <button
      *ngFor="let item of bottomNavItems()"
      type="button"
      role="tab"
      class="comp-tab"
      [class.comp-tab-active]="activeView() === item.id"
      (click)="setActiveView(item.id)"
      [attr.aria-selected]="activeView() === item.id"
      [attr.aria-label]="'Switch to ' + item.label + ' view'"
    >
      <span class="material-symbols-outlined">{{ item.icon }}</span>
      <span class="comp-tab-label">{{ item.label }}</span>
      <span class="comp-tab-indicator" aria-hidden="true"></span>
    </button>
  </nav>

  <!-- ====================== MOBILE DRAWER (slide-out) ====================== -->
  <aside
    class="comp-drawer"
    [class.comp-drawer-open]="mobileDrawerOpen()"
    *ngIf="uiService.isCompactMobile()"
    role="dialog"
    aria-label="Studio navigation"
  >
    <header class="comp-drawer-header">
      <span class="comp-drawer-title">Workspace</span>
      <button
        type="button"
        class="comp-icon-btn"
        (click)="toggleMobileDrawer()"
        aria-label="Close navigation"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>
    <nav class="comp-drawer-nav" aria-label="Mobile navigation">
      <button
        *ngFor="let item of bottomNavItems()"
        (click)="setActiveView(item.id)"
        [class.comp-drawer-active]="activeView() === item.id"
        class="comp-drawer-item"
      >
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </button>
    </nav>
    <div class="comp-drawer-footer">
      <button
        type="button"
        class="btn-pro btn-pro-primary w-full"
        (click)="newProject(); toggleMobileDrawer()"
      >
        <span class="material-symbols-outlined">add_circle</span>
        New Session
      </button>
    </div>
  </aside>
  <div
    class="comp-backdrop"
    *ngIf="mobileDrawerOpen() && uiService.isCompactMobile()"
    (click)="toggleMobileDrawer()"
    aria-hidden="true"
  ></div>

  <!-- ====================== AI ASSISTANT PANEL (right slide) ====================== -->
  <app-ai-assistant
    [open]="showAiAssistant()"
    (close)="showAiAssistant.set(false)"
  ></app-ai-assistant>

  <!-- ====================== GLOBAL OVERLAYS (legacy) ====================== -->
  <app-search-overlay></app-search-overlay>
  <app-snackbar></app-snackbar>

  <!-- ====================== AI FLOATING ACTION BUTTON (mobile desktop) ====================== -->
  <button
    *ngIf="!showAiAssistant()"
    type="button"
    class="comp-fab"
    (click)="toggleAiAssistant()"
    aria-label="Open AI Assistant"
  >
    <span class="material-symbols-outlined">auto_awesome</span>
  </button>
</div>
