<div
  class="studio-container {{ studioQualityClass() }} retro-flicker"
  [class.holographic]="uiService.holographicMode()"
  [attr.data-theme]="'analog-v42'"
>
  <!-- Scanline Overlay -->
  <div class="scanline-overlay"></div>

  <!-- Main Studio Layout with Sidebars -->
  <div class="studio-layout flex h-full overflow-hidden bg-[#07070a]">

    <!-- Left Sidebar: Sound Browser -->
    <aside class="studio-sidebar w-64 h-full hidden lg:block border-r border-white/5">
      <app-sound-browser></app-sound-browser>
    </aside>

    <!-- Main Content Area -->
    <div class="studio-main-content flex-1 flex flex-col min-w-0">
      <header class="studio-header wood-panel shadow-v42-xl flex items-center justify-between px-6 py-2 border-b border-white/10">
        <h1 class="studio-title neon-text text-lg font-black tracking-tighter">
          SMUVE <span class="neon-accent-secondary">STUDIO PRO</span>
        </h1>
        <div class="header-controls no-scrollbar overflow-x-auto flex gap-2">
          <button
            class="header-btn tactile-v42 glass-v42 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all"
            [class.active]="activeView() === 'dj'"
            (click)="setActiveView('dj')"
          >
            ARRANGEMENT
          </button>
          <button
            class="header-btn tactile-v42 glass-v42 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all"
            [class.active]="activeView() === 'mixer'"
            (click)="setActiveView('mixer')"
          >
            MIXER
          </button>
          <button
            class="header-btn tactile-v42 glass-v42 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all"
            [class.active]="activeView() === 'piano-roll'"
            (click)="setActiveView('piano-roll')"
          >
            PIANO ROLL
          </button>
          <button
            class="header-btn tactile-v42 glass-v42 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all"
            [class.active]="activeView() === 'drum-machine'"
            (click)="setActiveView('drum-machine')"
          >
            DRUMS
          </button>
          <button
            class="header-btn tactile-v42 glass-v42 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all"
            [class.active]="activeView() === 'performer'"
            (click)="setActiveView('performer')"
          >
            PERFORMER
          </button>
        </div>
        <div class="flex items-center gap-3">
           <div class="cpu-meter flex items-center gap-2">
              <span class="text-[8px] font-mono text-slate-500">CPU</span>
              <div class="w-12 h-1 bg-white/5 rounded-full overflow-hidden">
                 <div class="h-full bg-green-500/50 w-1/3"></div>
              </div>
           </div>
        </div>
      </header>

      <app-transport-bar class="holographic-depth"></app-transport-bar>

      <main class="studio-workspace flex-1 overflow-hidden relative">
        <div class="view-wrapper h-full" [class.hidden]="activeView() !== 'dj'">
          <div class="flex flex-col h-full">
            <app-arrangement-view class="flex-1"></app-arrangement-view>
            <app-dj-deck class="h-48 border-t border-white/10"></app-dj-deck>
          </div>
        </div>

        <div class="view-wrapper h-full" [class.hidden]="activeView() !== 'mixer'">
          <app-mixer></app-mixer>
        </div>

        <div class="view-wrapper h-full" [class.hidden]="activeView() !== 'piano-roll'">
          <div class="flex h-full">
            <app-channel-rack class="w-64 border-r border-white/10"></app-channel-rack>
            <app-piano-roll class="flex-1"></app-piano-roll>
          </div>
        </div>

        <div class="view-wrapper h-full" [class.hidden]="activeView() !== 'drum-machine'">
          <app-drum-machine></app-drum-machine>
        </div>

        <div class="view-wrapper h-full" [class.hidden]="activeView() !== 'performer'">
          <app-performer></app-performer>
        </div>

        <div class="view-wrapper h-full" [class.hidden]="activeView() !== 'mastering'">
          <app-mastering-suite></app-mastering-suite>
        </div>
      </main>
    </div>

    <!-- Right Sidebar: Track Inspector -->
    <aside class="studio-sidebar w-64 h-full hidden xl:block border-l border-white/5">
       <app-track-inspector></app-track-inspector>
    </aside>
  </div>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-bottom-nav glass-v42-pro flex lg:hidden absolute bottom-0 w-full" *ngIf="uiService.isCompactMobile()">
    <button class="flex-1 flex flex-col items-center py-2" [class.active]="activeView() === 'dj'" (click)="setActiveView('dj')">
      <span class="material-symbols-outlined">album</span>
      <span class="text-[8px] font-black">DAW</span>
    </button>
    <button class="flex-1 flex flex-col items-center py-2" [class.active]="activeView() === 'mixer'" (click)="setActiveView('mixer')">
      <span class="material-symbols-outlined">tune</span>
      <span class="text-[8px] font-black">MIX</span>
    </button>
    <button class="flex-1 flex flex-col items-center py-2" [class.active]="activeView() === 'piano-roll'" (click)="setActiveView('piano-roll')">
      <span class="material-symbols-outlined">piano</span>
      <span class="text-[8px] font-black">EDIT</span>
    </button>
    <button class="flex-1 flex flex-col items-center py-2" [class.active]="activeView() === 'drum-machine'" (click)="setActiveView('drum-machine')">
       <span class="material-symbols-outlined">drum</span>
       <span class="text-[8px] font-black">DRUMS</span>
    </button>
  </nav>
</div>
