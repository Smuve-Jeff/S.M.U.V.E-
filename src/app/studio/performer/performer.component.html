<div class="performer-container glass-v42 retro-flicker shadow-v42-xl">
  <div class="performer-header wood-panel">
    <div class="header-branding">
      <div class="neon-text-sm neon-text">LIVE PERFORMER v4.2</div>
      <div class="status-badge glass-v42 neon-accent-primary">ACTIVE</div>
    </div>

    <div class="layout-selector glass-v42">
      <button
        [class.active]="layout() === 'keyboard'"
        (click)="setLayout('keyboard')"
        class="executive-glass"
      >
        KEYBOARD
      </button>
      <button
        [class.active]="layout() === 'pads'"
        (click)="setLayout('pads')"
        class="executive-glass"
      >
        PADS
      </button>
    </div>

    <div class="performer-actions">
      <button
        (click)="toggleSmartChords()"
        [class.active]="smartChords()"
        class="executive-glass extreme-glow"
      >
        SMART CHORDS
      </button>
    </div>
  </div>

  <div class="performer-content">
    <div class="scanline-overlay"></div>

    <!-- Keyboard Layout -->
    <div *ngIf="layout() === 'keyboard'" class="keyboard-view">
      <div class="keys-container">
        <div
          *ngFor="let key of keyboardKeys"
          class="perf-key"
          [class.black-key]="isBlackKey(key.midi)"
          [class.active]="activeKeys().has(key.midi)"
          (mousedown)="onKeyDown(key.midi)"
          (mouseup)="onKeyUp(key.midi)"
          (touchstart)="onKeyDown(key.midi); $event.preventDefault()"
          (touchend)="onKeyUp(key.midi); $event.preventDefault()"
        >
          <span class="key-label font-mono">{{ key.name }}</span>
        </div>
      </div>
    </div>

    <!-- Pads Layout -->
    <div *ngIf="layout() === 'pads'" class="pads-view">
      <div class="perf-pads-grid">
        <div
          *ngFor="let pad of performerPads"
          class="perf-pad glass-v42 shadow-v42-xl"
          [class.active]="activeKeys().has(pad.midi)"
          [style.--pad-color]="pad.color"
          (mousedown)="onKeyDown(pad.midi)"
          (mouseup)="onKeyUp(pad.midi)"
          (touchstart)="onKeyDown(pad.midi); $event.preventDefault()"
          (touchend)="onKeyUp(pad.midi); $event.preventDefault()"
        >
          <div class="pad-led" [style.background-color]="pad.color"></div>
          <span class="pad-label neon-text-xs">{{ pad.name }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="performer-footer wood-panel">
    <div class="footer-param glass-v42">
      <label class="neon-text-xs">VELOCITY</label>
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        [(ngModel)]="velocity"
        class="knob-range"
      />
    </div>
    <div class="footer-param glass-v42">
      <label class="neon-text-xs">OCTAVE</label>
      <div class="octave-controls">
        <button (click)="nudgeOctave(-1)" class="executive-glass">-</button>
        <span class="font-mono">{{ octave() }}</span>
        <button (click)="nudgeOctave(1)" class="executive-glass">+</button>
      </div>
    </div>
  </div>
</div>
