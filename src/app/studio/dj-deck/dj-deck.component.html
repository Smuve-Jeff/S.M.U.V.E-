<!-- app/studio/dj-deck/dj-deck.component.html -->
<div class="dj-deck-container" [class.flat-view]="isFlatView()">

  <!-- Global Controls -->
  <div class="deck-global-controls">
    <div class="control-group master-volume">
      <label>MASTER</label>
      <input type="range" min="0" max="1.2" step="0.01" [value]="masterVolume()" (input)="setMasterVolume($event)" />
      <span>{{ masterVolume() | number:'1.0-2' }}</span>
    </div>
    <div class="control-group crossfader">
      <label>XFADE</label>
      <input type="range" min="-1" max="1" step="0.01" [value]="deckService.crossfade()" (input)="updateCrossfader($event)" />
    </div>
    <div class="control-group">
      <button (click)="toggleRecording()" [class.recording]="recording()">
        <span class="material-symbols-outlined">fiber_manual_record</span>
        <span>{{ recording() ? recordingDurationLabel() : 'RECORD' }}</span>
      </button>
    </div>
  </div>

  <!-- Decks -->
  <div class="decks-container">
    <div class="deck" id="deck-a">
      <app-deck-controls [deckId]="'A'"></app-deck-controls>
      <div class="deck-stems">
        <h3>AI STEMS</h3>
        <div class="stem-faders">
          @for(stem of stems; track stem) {
            <div class="stem-fader-group">
              <label>{{stem.toUpperCase()}}</label>
              <input type="range" min="0" max="1.5" step="0.01" value="1" (input)="setStemGain('A', stem, $event)">
              <button class="mute-button">M</button>
            </div>
          }
        </div>
      </div>
    </div>
    <div class="deck" id="deck-b">
      <app-deck-controls [deckId]="'B'"></app-deck-controls>
       <div class="deck-stems">
        <h3>AI STEMS</h3>
        <div class="stem-faders">
          @for(stem of stems; track stem) {
            <div class="stem-fader-group">
              <label>{{stem.toUpperCase()}}</label>
              <input type="range" min="0" max="1.5" step="0.01" value="1" (input)="setStemGain('B', stem, $event)">
               <button class="mute-button">M</button>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>
