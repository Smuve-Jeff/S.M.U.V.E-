<div class="dj-view-container specialized-view h-full flex flex-col p-3 md:p-8 overflow-hidden relative">
  <!-- Top Stats Display (BPM / Key) -->
  <div class="deck-stats flex flex-wrap justify-between items-center gap-3 mb-4 md:mb-6 px-1 md:px-4">
    <div class="deck-info glass-v42 px-4 py-2 rounded-xl border-brand-primary/20">
      <span class="text-[10px] font-black text-brand-primary uppercase tracking-widest">DECK A</span>
      <div class="flex items-baseline gap-2">
        <span class="text-2xl font-black text-white font-mono">{{ deckService.deckA().bpm }}</span>
        <span class="text-[10px] font-bold text-slate-500 uppercase">BPM</span>
      </div>
    </div>

    <div class="sync-hub flex flex-col items-center">
      <button (click)="sync('A'); sync('B')" class="btn-pro btn-pro-primary px-8 py-2 text-xs font-black tracking-[0.3em] uppercase animate-pulse">
        MASTER SYNC
      </button>
      <div class="mt-2 flex gap-1">
        @for (i of [1,2,3,4,5,6,7,8]; track i) {
          <div class="w-2 h-1 rounded-full bg-slate-800" [class.bg-brand-primary]="(currentBeat() % 8) + 1 >= i"></div>
        }
      </div>
    </div>

    <div class="deck-info glass-v42 px-4 py-2 rounded-xl border-brand-secondary/20 text-right">
      <span class="text-[10px] font-black text-brand-secondary uppercase tracking-widest">DECK B</span>
      <div class="flex items-baseline gap-2 justify-end">
        <span class="text-2xl font-black text-white font-mono">{{ deckService.deckB().bpm }}</span>
        <span class="text-[10px] font-bold text-slate-500 uppercase">BPM</span>
      </div>
    </div>
  </div>

  <!-- THE 3D DECKS GRID -->
  <div class="decks-grid-3d flex-grow grid grid-cols-1 lg:grid-cols-[1fr_300px_1fr] gap-4 md:gap-8 items-center perspective-container overflow-y-auto pb-24 md:pb-0">

    <!-- DECK A (3D TRANSFORMED) -->
    <div class="deck-3d-wrapper deck-a-transform">
      <div class="platter-container relative aspect-square">
        <!-- Vinyl Base -->
        <div class="vinyl-platter absolute inset-0 rounded-full shadow-[0_30px_60px_rgba(0,0,0,0.8)] border-[12px] border-[#1a1a1a]"
             [class.animate-spin-vinyl]="deckService.deckA().isPlaying"
             (mousedown)="onPlatterDown('A', $event)" (touchstart)="onPlatterDown('A', $event)">
          <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-black via-slate-900 to-black opacity-90"></div>
          <div class="absolute inset-[10%] rounded-full border border-white/5 opacity-20"></div>
          <div class="absolute inset-[20%] rounded-full border border-white/5 opacity-20"></div>
          <!-- Label -->
          <div class="absolute inset-[30%] rounded-full bg-brand-primary/20 flex items-center justify-center overflow-hidden border-2 border-brand-primary/40">
            <span class="text-[8px] font-black text-white text-center uppercase leading-tight px-4">{{ deckService.deckA().track?.name || 'NO TRACK' }}</span>
          </div>
        </div>
        <!-- Tone Arm -->
        <div class="tone-arm absolute top-0 right-0 w-8 h-48 origin-top pointer-events-none transition-transform duration-1000"
             [style.transform]="deckService.deckA().isPlaying ? 'rotate(12deg)' : 'rotate(-15deg)'">
          <div class="w-1.5 h-full bg-gradient-to-r from-slate-400 to-slate-600 rounded-full shadow-lg"></div>
          <div class="w-4 h-8 bg-slate-800 absolute bottom-0 left-[-6px] rounded-sm border border-white/10"></div>
        </div>
      </div>
      <!-- Deck A Controls (Overlaying the base) -->
      <div class="mt-8 flex justify-center gap-4">
        <button (click)="deckService.togglePlay('A')" class="w-12 h-12 rounded-full bg-slate-900 border border-brand-primary/40 flex items-center justify-center text-brand-primary shadow-lg active:scale-95">
          <i class="fas" [class.fa-play]="!deckService.deckA().isPlaying" [class.fa-pause]="deckService.deckA().isPlaying"></i>
        </button>
        <button (click)="tapBpm('A')" class="w-12 h-12 rounded-full bg-slate-900 border border-white/10 flex items-center justify-center text-slate-400 hover:text-white">
          <span class="text-[8px] font-black tracking-widest">TAP</span>
        </button>
        <button (click)="loadTrackFor('A')" class="w-12 h-12 rounded-full bg-slate-900 border border-white/10 flex items-center justify-center text-slate-500 hover:text-white">
          <i class="fas fa-plus"></i>
        </button>
      </div>
    </div>

    <!-- CENTRAL MIXER (The DiscDj Style) -->
    <div class="central-mixer-console glass-v42 p-4 md:p-6 rounded-[30px] md:rounded-[40px] border-white/10 flex flex-col gap-4 md:gap-6 shadow-2xl titanium-texture">
      <!-- High/Mid/Low Knobs -->
      <div class="mixer-strips flex justify-around">
        <div class="eq-strip flex flex-col gap-4">
          <div class="knob-group"><input type="range" class="knob-range vertical-range h-12 accent-brand-primary" orient="vertical" (input)="setEq('A', 'high', $any($event.target).value)" min="0" max="2" step="0.01" value="1"><span class="label">HI</span></div>
          <div class="knob-group"><input type="range" class="knob-range vertical-range h-12 accent-brand-primary" orient="vertical" (input)="setEq('A', 'mid', $any($event.target).value)" min="0" max="2" step="0.01" value="1"><span class="label">MID</span></div>
          <div class="knob-group"><input type="range" class="knob-range vertical-range h-12 accent-brand-primary" orient="vertical" (input)="setEq('A', 'low', $any($event.target).value)" min="0" max="2" step="0.01" value="1"><span class="label">LOW</span></div>
        </div>
        <div class="eq-strip flex flex-col gap-4">
          <div class="knob-group"><input type="range" class="knob-range vertical-range h-12 accent-brand-secondary" orient="vertical" (input)="setEq('B', 'high', $any($event.target).value)" min="0" max="2" step="0.01" value="1"><span class="label">HI</span></div>
          <div class="knob-group"><input type="range" class="knob-range vertical-range h-12 accent-brand-secondary" orient="vertical" (input)="setEq('B', 'mid', $any($event.target).value)" min="0" max="2" step="0.01" value="1"><span class="label">MID</span></div>
          <div class="knob-group"><input type="range" class="knob-range vertical-range h-12 accent-brand-secondary" orient="vertical" (input)="setEq('B', 'low', $any($event.target).value)" min="0" max="2" step="0.01" value="1"><span class="label">LOW</span></div>
        </div>
      </div>

      <!-- Volume Faders -->
      <div class="volume-faders flex justify-around items-end h-32 md:h-40 pb-2 md:pb-4">
        <div class="fader-wrapper"><input type="range" class="vertical-range h-32 accent-brand-primary" orient="vertical" (input)="setGain('A', $any($event.target).value)" min="0" max="1" step="0.01" value="0.8"></div>
        <div class="master-meter w-8 bg-black/40 rounded-full relative overflow-hidden h-full border border-white/5">
           <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-emerald-500 via-yellow-400 to-red-500 transition-all duration-100" [style.height.%]="getDeckLevel('A') * 100"></div>
        </div>
        <div class="fader-wrapper"><input type="range" class="vertical-range h-32 accent-brand-secondary" orient="vertical" (input)="setGain('B', $any($event.target).value)" min="0" max="1" step="0.01" value="0.8"></div>
      </div>

      <!-- Crossfader -->
      <div class="crossfader-container px-4">
        <input type="range" class="w-full accent-white h-1 bg-white/10 rounded-full appearance-none"
               (input)="setCrossfade($any($event.target).value)" min="-1" max="1" step="0.01" value="0">
        <div class="flex justify-between mt-2 text-[8px] font-black text-slate-500">
          <span>A</span><span>CENTER</span><span>B</span>
        </div>
      </div>

      <div class="flex items-center justify-between gap-3">
        <button
          (click)="applyScratchFx('A', 'brake')"
          class="flex-1 text-[8px] font-black uppercase tracking-widest py-2 rounded-lg border border-brand-primary/30 text-brand-primary hover:bg-brand-primary/10 transition-all"
        >
          Brake A
        </button>
        <button
          (click)="applyScratchFx('A', 'spinback')"
          class="flex-1 text-[8px] font-black uppercase tracking-widest py-2 rounded-lg border border-white/15 text-slate-300 hover:bg-white/5 transition-all"
        >
          Spinback A
        </button>
      </div>
    </div>

    <!-- DECK B (3D TRANSFORMED) -->
    <div class="deck-3d-wrapper deck-b-transform">
      <div class="platter-container relative aspect-square">
        <!-- Vinyl Base -->
        <div class="vinyl-platter absolute inset-0 rounded-full shadow-[0_30px_60px_rgba(0,0,0,0.8)] border-[12px] border-[#1a1a1a]"
             [class.animate-spin-vinyl]="deckService.deckB().isPlaying"
             (mousedown)="onPlatterDown('B', $event)" (touchstart)="onPlatterDown('B', $event)">
          <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-black via-slate-900 to-black opacity-90"></div>
          <div class="absolute inset-[30%] rounded-full bg-brand-secondary/20 flex items-center justify-center overflow-hidden border-2 border-brand-secondary/40">
            <span class="text-[8px] font-black text-white text-center uppercase leading-tight px-4">{{ deckService.deckB().track?.name || 'NO TRACK' }}</span>
          </div>
        </div>
        <!-- Tone Arm -->
        <div class="tone-arm absolute top-0 left-0 w-8 h-48 origin-top pointer-events-none transition-transform duration-1000 scale-x-[-1]"
             [style.transform]="deckService.deckB().isPlaying ? 'rotate(-12deg)' : 'rotate(15deg)'">
          <div class="w-1.5 h-full bg-gradient-to-r from-slate-400 to-slate-600 rounded-full shadow-lg"></div>
          <div class="w-4 h-8 bg-slate-800 absolute bottom-0 left-[-6px] rounded-sm border border-white/10"></div>
        </div>
      </div>
      <div class="mt-8 flex justify-center gap-4">
        <button (click)="loadTrackFor('B')" class="w-12 h-12 rounded-full bg-slate-900 border border-white/10 flex items-center justify-center text-slate-500 hover:text-white">
          <i class="fas fa-plus"></i>
        </button>
        <button (click)="tapBpm('B')" class="w-12 h-12 rounded-full bg-slate-900 border border-white/10 flex items-center justify-center text-slate-400 hover:text-white">
          <span class="text-[8px] font-black tracking-widest">TAP</span>
        </button>
        <button (click)="deckService.togglePlay('B')" class="w-12 h-12 rounded-full bg-slate-900 border border-brand-secondary/40 flex items-center justify-center text-brand-secondary shadow-lg active:scale-95">
          <i class="fas" [class.fa-play]="!deckService.deckB().isPlaying" [class.fa-pause]="deckService.deckB().isPlaying"></i>
        </button>
      </div>
    </div>

  </div>

  <!-- BOTTOM WAVEFORMS (MINI MAP) -->
  <div class="dj-waveform-bar fixed bottom-20 md:bottom-4 left-1/2 -translate-x-1/2 w-[94%] md:w-[90%] max-w-5xl h-14 md:h-16 bg-black/60 rounded-2xl border border-white/10 backdrop-blur-md flex overflow-hidden z-30">
    <canvas #waveformA class="flex-grow h-full opacity-50"></canvas>
    <div class="w-px bg-white/20"></div>
    <canvas #waveformB class="flex-grow h-full opacity-50 scale-x-[-1]"></canvas>
  </div>
</div>

<style>
  .perspective-container {
    perspective: 1200px;
  }
  .deck-a-transform {
    transform: rotateY(25deg) rotateX(10deg);
    transition: transform 0.5s ease;
  }
  .deck-b-transform {
    transform: rotateY(-25deg) rotateX(10deg);
    transition: transform 0.5s ease;
  }
  .deck-a-transform:hover, .deck-b-transform:hover {
    transform: rotateY(0) rotateX(0) scale(1.05);
    z-index: 50;
  }
  .vinyl-platter {
    background: repeating-radial-gradient(
      circle at center,
      #111 0,
      #111 2px,
      #1a1a1a 3px,
      #111 4px
    );
    cursor: grab;
  }
  .vinyl-platter:active { cursor: grabbing; }

  @keyframes spin-vinyl {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .animate-spin-vinyl {
    animation: spin-vinyl 1.8s linear infinite;
  }

  .knob-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .knob-group .label {
    font-size: 7px;
    font-weight: 900;
    color: #475569;
    letter-spacing: 1px;
  }
  .knob-range {
    width: 30px !important;
    height: 30px !important;
    border-radius: 50% !important;
    background: #0f172a !important;
    border: 2px solid #1e293b !important;
  }
  .vertical-range {
    appearance: none;
    background: #020617;
    border-radius: 4px;
    width: 4px;
  }
  .vertical-range::-webkit-slider-thumb {
    appearance: none;
    width: 20px;
    height: 12px;
    background: #e2e8f0;
    border-radius: 2px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }

  @media (max-width: 1024px) {
    .deck-a-transform,
    .deck-b-transform,
    .deck-a-transform:hover,
    .deck-b-transform:hover {
      transform: none;
    }

    .deck-3d-wrapper .platter-container {
      max-width: 78vw;
      margin: 0 auto;
    }

    .central-mixer-console {
      order: 3;
    }
  }
</style>
