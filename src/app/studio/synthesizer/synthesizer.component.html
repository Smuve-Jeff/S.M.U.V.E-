<div class="synth-panel glass-morphism">
  <div class="synth-header flex justify-between items-center mb-6">
    <h3 class="text-xs font-black uppercase tracking-widest text-emerald-500">
      <i class="fas fa-wave-square mr-2"></i> Subtractive Engine: {{ clip?.name }}
    </h3>
    <div class="waveform-selector flex gap-2">
      <button
        *ngFor="let type of ['sine', 'square', 'sawtooth', 'triangle']"
        (click)="updateSynthParam('oscillator', type)"
        [class.active]="synthParams.oscillator === type"
        class="wave-btn"
        [title]="type"
      >
        <i class="fas" [ngClass]="{
          'fa-circle': type === 'sine',
          'fa-square': type === 'square',
          'fa-mountain': type === 'sawtooth',
          'fa-caret-up': type === 'triangle'
        }"></i>
      </button>
    </div>
  </div>

  <div class="controls-layout">
    <div class="envelope-section">
      <h4 class="control-label">ADSR ENVELOPE</h4>
      <div class="knobs-grid">
        <div class="knob-group">
          <input type="range" min="0.01" max="2" step="0.01" [(ngModel)]="synthParams.attack" (ngModelChange)="updateSynthParam('attack', $event)">
          <label>ATTACK</label>
        </div>
        <div class="knob-group">
          <input type="range" min="0.01" max="2" step="0.01" [(ngModel)]="synthParams.decay" (ngModelChange)="updateSynthParam('decay', $event)">
          <label>DECAY</label>
        </div>
        <div class="knob-group">
          <input type="range" min="0" max="1" step="0.01" [(ngModel)]="synthParams.sustain" (ngModelChange)="updateSynthParam('sustain', $event)">
          <label>SUSTAIN</label>
        </div>
        <div class="knob-group">
          <input type="range" min="0.01" max="5" step="0.01" [(ngModel)]="synthParams.release" (ngModelChange)="updateSynthParam('release', $event)">
          <label>RELEASE</label>
        </div>
      </div>
    </div>

    <div class="visualizer-section">
      <!-- Waveform visualizer could go here -->
      <div class="wave-preview">
        <div class="synth-glow"></div>
      </div>
    </div>
  </div>
</div>
