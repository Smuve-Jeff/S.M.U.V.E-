<div class="synth-container">
  <div class="synth-header">
    <div
      style="
        font-weight: 900;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
      "
    >
      Neural Synth v4
    </div>
    <div
      class="synth-patch-name"
      style="color: var(--fl-blue); font-size: 0.7rem; font-weight: 800"
    >
      DEFAULT PATCH
    </div>
  </div>

  <div class="synth-content no-scrollbar">
    <!-- Oscillator -->
    <div class="synth-section oscillator-section">
      <div class="section-title">Oscillator</div>
      <div class="wave-selector">
        <button
          *ngFor="let type of ['sine', 'square', 'sawtooth', 'triangle']"
          (click)="updateSynthParam('oscillator', type)"
          [class.active]="synthParams.oscillator === type"
          class="wave-btn"
        >
          {{ type }}
        </button>
      </div>
      <div class="knob-row">
        <div class="knob-container">
          <div class="large-knob"></div>
          <span class="knob-label">CUTOFF</span>
          <input
            type="range"
            min="20"
            max="15000"
            [(ngModel)]="synthParams.cutoff"
            (ngModelChange)="updateSynthParam('cutoff', $event)"
          />
        </div>
        <div class="knob-container">
          <div class="large-knob" style="width: 40px; height: 40px"></div>
          <span class="knob-label">RESO</span>
          <input
            type="range"
            min="0"
            max="20"
            step="0.1"
            [(ngModel)]="synthParams.q"
            (ngModelChange)="updateSynthParam('q', $event)"
          />
        </div>
      </div>
    </div>

    <!-- Envelope -->
    <div class="synth-section envelope-section">
      <div class="section-title">Amplitude Envelope</div>
      <div class="adsr-grid">
        <div
          *ngFor="let stage of ['attack', 'decay', 'sustain', 'release']"
          class="adsr-fader"
        >
          <div class="fader-well">
            <div
              class="fader-fill"
              [style.height.%]="
                (stage === 'sustain'
                  ? synthParams.sustain
                  : synthParams[stage] / 2) * 100
              "
            ></div>
          </div>
          <input
            type="range"
            orient="vertical"
            min="0"
            [max]="stage === 'sustain' ? 1 : 2"
            step="0.01"
            [(ngModel)]="synthParams[stage]"
            (ngModelChange)="updateSynthParam(stage, $event)"
          />
          <span class="adsr-label">{{
            stage.substring(0, 3).toUpperCase()
          }}</span>
        </div>
      </div>
    </div>

    <!-- Effects -->
    <div class="synth-section effects-section">
      <div class="section-title">Saturation</div>
      <div class="knob-container">
        <div class="large-knob" style="border-color: var(--fl-orange)"></div>
        <span class="knob-label">DRIVE</span>
        <input
          type="range"
          min="0"
          max="1"
          step="0.01"
          [(ngModel)]="synthParams.distortion"
          (ngModelChange)="updateSynthParam('distortion', $event)"
        />
      </div>
      <div class="knob-container" style="margin-top: 1rem">
        <div
          class="large-knob"
          [style.background]="synthParams.subOsc ? 'var(--fl-blue)' : ''"
          (click)="updateSynthParam('subOsc', !synthParams.subOsc)"
        ></div>
        <span class="knob-label">SUB OSC</span>
        <input
          type="range"
          min="0"
          max="1"
          step="0.01"
          [(ngModel)]="synthParams.subGain"
          (ngModelChange)="updateSynthParam('subGain', $event)"
        />
      </div>
    </div>
  </div>
</div>
