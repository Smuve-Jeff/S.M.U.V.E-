<div
  class="inspector-container glass-v42 h-full flex flex-col font-sans overflow-hidden"
>
  <div class="p-3 border-b border-fl-border bg-black/20 wood-panel">
    <h3
      class="text-[10px] font-black uppercase tracking-[0.2em] text-fl-blue neon-text"
    >
      Track Inspector
    </h3>
  </div>

  <div
    class="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-4"
    *ngIf="selectedTrack() as track; else noTrack"
  >
    <div class="track-header-mini">
      <div class="text-[12px] font-black text-white uppercase">
        {{ track.name }}
      </div>
      <div class="text-[8px] font-mono text-slate-500 uppercase">
        {{ track.instrumentId }}
      </div>
    </div>

    <!-- Synth Parameters -->
    <div class="section space-y-3" *ngIf="track.type === 'midi'">
      <div
        class="text-[8px] font-black text-slate-500 uppercase tracking-widest border-b border-fl-border/10 pb-1"
      >
        Synth Engine
      </div>

      <div class="param-row">
        <label class="text-[8px] text-slate-400 uppercase">Oscillator</label>
        <select
          [ngModel]="getParam('type')"
          (ngModelChange)="updateParam('type', $event)"
          class="inspector-select"
        >
          <option value="sine">Sine</option>
          <option value="square">Square</option>
          <option value="sawtooth">Sawtooth</option>
          <option value="triangle">Triangle</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="param-group">
          <label class="text-[7px] text-slate-500 uppercase">Attack</label>
          <input
            type="range"
            min="0.001"
            max="2"
            step="0.01"
            [ngModel]="getParam('attack')"
            (ngModelChange)="updateParam('attack', $event)"
            class="inspector-slider tactile-v42"
          />
        </div>
        <div class="param-group">
          <label class="text-[7px] text-slate-500 uppercase">Release</label>
          <input
            type="range"
            min="0.01"
            max="4"
            step="0.05"
            [ngModel]="getParam('release')"
            (ngModelChange)="updateParam('release', $event)"
            class="inspector-slider tactile-v42"
          />
        </div>
      </div>

      <div class="param-group">
        <label class="text-[7px] text-slate-500 uppercase">Filter Cutoff</label>
        <input
          type="range"
          min="20"
          max="15000"
          step="100"
          [ngModel]="getParam('cutoff')"
          (ngModelChange)="updateParam('cutoff', $event)"
          class="inspector-slider tactile-v42"
        />
        <div class="text-[7px] font-mono text-fl-blue text-right">
          {{ getParam('cutoff') }} Hz
        </div>
      </div>

      <div class="param-group">
        <label class="text-[7px] text-slate-500 uppercase">Resonance (Q)</label>
        <input
          type="range"
          min="0.1"
          max="20"
          step="0.1"
          [ngModel]="getParam('q')"
          (ngModelChange)="updateParam('q', $event)"
          class="inspector-slider tactile-v42"
        />
      </div>
    </div>

    <!-- FX Chain -->
    <div class="section space-y-3">
      <div
        class="text-[8px] font-black text-slate-500 uppercase tracking-widest border-b border-fl-border/10 pb-1"
      >
        FX Chain
      </div>
      <div class="fx-slot-list space-y-1">
        <div
          *ngFor="let slot of track.fxSlots"
          class="fx-slot glass-v42 p-2 flex items-center justify-between rounded border border-white/5"
        >
          <span class="text-[8px] font-black uppercase text-slate-300">{{
            slot.type
          }}</span>
          <div class="flex gap-2">
            <div
              class="w-1.5 h-1.5 rounded-full"
              [class.bg-green-500]="slot.enabled"
              [class.bg-slate-700]="!slot.enabled"
            ></div>
          </div>
        </div>
        <button
          class="w-full py-1.5 border border-dashed border-fl-border/40 rounded text-[7px] font-black text-slate-500 hover:text-fl-blue hover:border-fl-blue transition-all"
        >
          + ADD EFFECT
        </button>
      </div>
    </div>
  </div>

  <ng-template #noTrack>
    <div class="flex-1 flex flex-col items-center justify-center opacity-20">
      <span class="material-symbols-outlined text-4xl mb-2">info</span>
      <div class="text-[10px] font-black uppercase">No Track Selected</div>
    </div>
  </ng-template>
</div>
