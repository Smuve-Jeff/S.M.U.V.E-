<div class="playlist-container glass-v42 shadow-v42-xl">
  <div class="playlist-header wood-panel">
    <div class="view-tabs flex items-center gap-4">
      <button class="tab-btn active neon-text-xs">PRO ARRANGEMENT</button>
    </div>

    <div class="module-transport glass-v42 mx-4">
      <div class="btn-group flex gap-1">
        <button class="m-btn tactile-v42" (click)="audioSession.togglePlay()">
          <span class="material-symbols-outlined text-sm">
            {{ audioSession.isPlaying() ? 'pause' : 'play_arrow' }}
          </span>
        </button>
        <button
          class="m-btn tactile-v42 rec"
          [class.active]="audioSession.isRecording()"
          (click)="audioSession.toggleRecord()"
        >
          <span class="material-symbols-outlined text-sm"
            >fiber_manual_record</span
          >
        </button>
      </div>
    </div>

    <div class="header-actions flex items-center gap-2">
      <div class="edit-tools flex gap-1 mr-4" *ngIf="selectedClipIds().size > 0">
        <button (click)="splitAtPlayhead()" class="mini-btn tactile-v42 executive-glass" title="Split at Playhead">
          <span class="material-symbols-outlined text-[10px]">content_cut</span>
        </button>
        <button (click)="duplicateSelected()" class="mini-btn tactile-v42 executive-glass" title="Duplicate">
          <span class="material-symbols-outlined text-[10px]">content_copy</span>
        </button>
      </div>
      <button
        (click)="toggleSnap()"
        class="mini-btn tactile-v42 executive-glass snap-toggle"
        [class.active-snap]="snapEnabled()"
      >
        {{ snapEnabled() ? 'SNAP 1 BAR' : 'SNAP 1/4 BAR' }}
      </button>
      <button (click)="addTrack()" class="mini-btn tactile-v42 executive-glass">
        + TRACK
      </button>
    </div>
  </div>

  <div class="playlist-content no-scrollbar">
    <div class="track-headers no-scrollbar wood-panel">
      <div
        *ngFor="let track of tracks()"
        class="track-header tactile-v42 glass-v42"
        [style.height.px]="laneHeight"
        [class.selected]="isTrackSelected(track.id)"
        (click)="selectTrack(track.id)"
      >
        <div class="track-top flex items-center p-2">
          <div
            class="track-color-strip w-1 h-8 rounded mr-2"
            [style.background-color]="track.color || '#af25f4'"
          ></div>
          <span class="track-name neon-text-xs truncate">{{
            track.name | uppercase
          }}</span>
        </div>
        <div class="track-controls">
          <button
            type="button"
            class="mini-btn"
            [class.active-mute]="track.mute"
            (click)="toggleMute(track.id, $event)"
          >
            M
          </button>
          <button
            type="button"
            class="mini-btn"
            [class.active-solo]="track.solo"
            (click)="toggleSolo(track.id, $event)"
          >
            S
          </button>
          <button
            type="button"
            class="mini-btn"
            (click)="removeTrack(track.id, $event)"
          >
            <span class="material-symbols-outlined text-[10px]">delete</span>
          </button>
        </div>
      </div>
    </div>

    <div class="grid-viewport no-scrollbar glass-v42" #gridViewport>
      <div
        class="grid-canvas"
        [style.width.px]="gridWidth()"
        [style.height.px]="canvasHeight()"
        [style.background-size]="barWidth + 'px ' + laneHeight + 'px'"
      >
        <div class="scanline-overlay"></div>

        <div class="time-ruler">
          <div
            *ngFor="let bar of bars()"
            class="ruler-bar"
            [style.width.px]="barWidth"
          >
            {{ bar + 1 }}
          </div>
        </div>

        <div
          *ngFor="let track of tracks()"
          class="lane-row relative border-b border-white/5"
          [style.height.px]="laneHeight"
          (pointerdown)="onLanePointerDown($event, track)"
        >
          <div
            *ngFor="let clip of track.clips"
            class="clip-item absolute executive-glass shadow-v42-xl tactile-v42" [class.selected-clip]="selectedClipIds().has(clip.id)"
            [style.left.px]="clip.start * barWidth"
            [style.width.px]="clip.length * barWidth"
            [style.background-color]="
              (clip.color || track.color || '#af25f4') + '33'
            "
            [style.border-color]="clip.color || track.color || '#af25f4'"
            (pointerdown)="onClipPointerDown($event, track.id, clip)"
          >
            <div class="clip-header text-[8px] p-1">
              {{ clipLabel(track, clip) | uppercase }}
            </div>
            <div class="clip-meta text-[8px] px-2 opacity-50">
              {{ clip.length }} bars
            <div class="resize-handle"></div>
            </div>
            <button
              type="button"
              class="clip-remove"
              (click)="removeClip($event, track.id, clip.id)"
            >
              ×
            </button>
          </div>
        </div>

        <div
          *ngIf="audioSession.isRecording()"
          class="recording-overlay absolute inset-0 pointer-events-none bg-red-500/5 overflow-hidden"
        >
          <div
            class="absolute top-4 right-6 flex items-center gap-2 px-3 py-1 bg-red-600 rounded-full animate-pulse z-50 shadow-[0_0_15px_rgba(239,68,68,0.5)]"
          >
            <div class="w-2 h-2 rounded-full bg-white"></div>
            <span
              class="text-[9px] font-black text-white uppercase tracking-widest"
              >Capture_Active</span>
          </div>

          <!-- Real-time Recording Lane Visual -->
          <div class="absolute inset-x-0 bg-red-500/10 pointer-events-none flex flex-col justify-center"
               [style.top.px]="rulerHeight + (musicManager.selectedTrackId() || 0) * laneHeight"
               [style.height.px]="laneHeight">
             <div class="h-1 bg-red-500/40 absolute bottom-0 left-0 transition-all" [style.width.px]="playheadPos()"></div>
             <div class="recording-waveform flex items-center gap-[2px] px-4 overflow-hidden">
                <div *ngFor="let v of [40,60,80,30,90,50,70,40,60,20,50,80]"
                     class="w-1 bg-red-500 rounded-full animate-pulse"
                     [style.height.px]="v * (laneHeight/150)"></div>
             </div>
          </div>
        </div>
        <div
          class="playhead absolute bottom-0 w-px bg-white extreme-glow"
          [style.left.px]="playheadPos()"
          [style.top.px]="rulerHeight"
        ></div>
      </div>
    </div>
  </div>
</div>
