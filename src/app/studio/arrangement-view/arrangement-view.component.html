<div class="playlist-container">
  <div class="playlist-header">
    <div class="view-tabs">
      <button class="tab-btn active">Playlist</button>
      <button class="tab-btn">Automation</button>
    </div>
    <div class="header-actions">
      <button
        (click)="addTrack()"
        class="mini-btn"
        style="width: auto; padding: 0 15px"
      >
        ADD TRACK
      </button>
    </div>
  </div>

  <div class="playlist-content">
    <div class="track-headers no-scrollbar">
      <div
        *ngFor="let track of tracks()"
        class="track-header"
        [class.selected]="isTrackSelected(track.id)"
        (click)="selectTrack(track.id)"
      >
        <div class="track-top">
          <div
            class="track-color-strip"
            [style.background-color]="track.clips[0]?.color || '#00d2ff'"
          ></div>
          <span class="track-name">{{ track.name }}</span>
          <div class="track-controls">
            <button
              class="mini-btn"
              [class.active-solo]="track.solo"
              (click)="toggleSolo(track.id); $event.stopPropagation()"
            >
              S
            </button>
            <button
              class="mini-btn"
              [class.active-mute]="track.mute"
              (click)="toggleMute(track.id); $event.stopPropagation()"
            >
              M
            </button>
          </div>
        </div>
        <div class="track-volume-bar">
          <div class="volume-fill" [style.width.%]="track.mute ? 0 : 75"></div>
        </div>
      </div>
    </div>

    <div class="grid-viewport no-scrollbar">
      <div class="time-ruler">
        <div *ngFor="let bar of [1, 2, 3, 4, 5, 6, 7, 8]" class="ruler-bar">
          BAR {{ bar }}
        </div>
      </div>
      <div
        class="grid-canvas"
        [style.width.px]="gridWidth"
        [style.height.px]="tracks().length * 80"
      >
        <div
          *ngFor="let track of tracks(); let i = index"
          class="lane-row"
          [style.top.px]="i * 80"
          [style.height.px]="80"
        >
          <div
            *ngFor="let clip of track.clips"
            class="clip-item"
            [style.left.px]="clip.start * barWidth"
            [style.width.px]="clip.length * barWidth"
            [style.background-color]="(clip.color || '#00d2ff') + '33'"
            [style.border-color]="clip.color || '#00d2ff'"
            (click)="selectClip(clip.id, $event)"
          >
            <div class="clip-header">{{ clip.name }}</div>
            <div class="clip-waveform">
              <svg
                width="100%"
                height="100%"
                preserveAspectRatio="none"
                viewBox="0 0 1000 100"
              >
                <path
                  d="M0 50 Q 250 10, 500 50 T 1000 50"
                  [attr.stroke]="clip.color || '#00d2ff'"
                  stroke-width="2"
                  fill="none"
                />
              </svg>
            </div>
          </div>
        </div>

        <div class="playhead" [style.left.px]="playheadPos()">
          <div class="playhead-cap"></div>
        </div>
      </div>
    </div>
  </div>
</div>
