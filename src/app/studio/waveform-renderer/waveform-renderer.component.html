<div class="waveform-container bg-black/40 rounded-2xl border border-red-500/20 overflow-hidden relative h-24 flex items-center justify-center">
  <div class="absolute inset-0 bg-gradient-to-t from-red-500/5 to-transparent"></div>

  <div class="flex items-end gap-[1px] h-full w-full px-2" *ngIf="isRecording">
    <div *ngFor="let value of waveform"
         class="waveform-bar flex-grow bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)] rounded-t-[1px]"
         [style.height.%]="10 + Math.abs(value) * 100">
    </div>
  </div>

  <div class="absolute top-2 left-4 flex items-center gap-2">
    <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse shadow-[0_0_10px_#ef4444]"></div>
    <span class="text-[9px] font-black uppercase tracking-widest text-red-500/80">Recording In Progress</span>
  </div>

  <div class="absolute bottom-2 right-4 text-[9px] font-mono text-slate-500 uppercase tracking-tighter">
    Buffer: 44.1kHz / 24bit
  </div>
</div>
